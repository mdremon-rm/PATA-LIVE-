<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pata Live - Premium Login</title>
    
    <!-- Firebase SDKs (Compatibility Mode) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF2D55;
            /* আপনার ইমেজের মতো সঠিক ব্লু-পার্পল গ্রেডিয়েন্ট */
            --bg-gradient: linear-gradient(180deg, #A4C1FF 0%, #E2EDFF 40%, #FFFFFF 100%);
            --input-bg: #FFFFFF;
            --text-gray: #8E8E93;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-gradient); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            overflow-x: hidden;
        }

        #authWrapper {
            width: 100%;
            max-width: 400px;
            padding: 40px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* লোগো সেকশন - ছবির মতো সাইজ */
        .logo-box {
            margin-top: 30px;
            margin-bottom: 5px;
            text-align: center;
        }
        .main-logo {
            width: 160px;
            height: 160px;
            object-fit: contain;
        }
        .welcome-msg {
            font-size: 26px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 35px;
            font-family: 'serif'; /* ছবির ফন্টের সাথে মিল রাখতে */
        }

        /* ইনপুট বক্স - ছবির মতো বর্ডারলেস শ্যাডো লুক */
        .input-group {
            width: 100%;
            background: var(--input-bg);
            height: 58px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            padding: 0 25px;
            margin-bottom: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #F0F0F0;
        }

        .country-part {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-right: 15px;
            border-right: 1.5px solid #EEE;
            margin-right: 15px;
            font-weight: 500;
            color: #333;
            cursor: pointer;
        }
        .flag-img { width: 24px; border-radius: 2px; }

        input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            background: transparent;
            color: #333;
        }
        input::placeholder { color: #BBB; }

        .eye-btn {
            padding-left: 10px;
            cursor: pointer;
            font-size: 20px;
            opacity: 0.6;
        }

        .forgot-pass {
            width: 100%;
            text-align: right;
            font-size: 14px;
            color: #666;
            margin-top: -5px;
            margin-bottom: 35px;
        }

        /* লগইন বাটন - ছবির মতো গ্রে শ্যাডো */
        .login-btn {
            width: 100%;
            height: 58px;
            border-radius: 50px;
            border: none;
            background: #EAEAEA;
            color: #999;
            font-size: 19px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 80px;
        }
        .login-btn.ready {
            background: var(--primary);
            color: white;
            box-shadow: 0 8px 20px rgba(255, 45, 85, 0.25);
        }

        .or-label {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 25px;
            color: #333;
        }

        /* সোশ্যাল আইকন - ছবির মতো ফিক্সড */
        .social-box {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
        }
        .social-circle {
            width: 65px;
            height: 65px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            cursor: pointer;
            border: 1px solid #F5F5F5;
        }
        .social-circle img { width: 32px; height: 32px; }

        /* ফুটার */
        .footer-info {
            font-size: 13px;
            color: #888;
            text-align: center;
            max-width: 85%;
            line-height: 1.6;
        }
        .footer-info span { color: #333; text-decoration: underline; cursor: pointer; font-weight: 500; }

        /* মোবাইল প্রিভিউ ফিক্স */
        @media (max-width: 360px) {
            .main-logo { width: 130px; height: 130px; }
            .welcome-msg { font-size: 22px; }
        }
    </style>
</head>
<body>

<div id="authWrapper">
    <div class="logo-box">
        <!-- লোগো ইমেজ সোর্স ফিক্স করা হয়েছে -->
        <img src="https://i.ibb.co/VYpYmRj/pata-logo.png" alt="Logo" class="main-logo" id="logoImg">
    </div>
    
    <h1 class="welcome-msg">Welcome To Pata Live</h1>

    <div class="input-group">
        <div class="country-part" onclick="alert('Select Country')">
            <img src="https://flagcdn.com/w40/bd.png" class="flag-img" alt="BD">
            <span>+880</span>
            <small style="font-size: 8px; margin-left:2px;">▼</small>
        </div>
        <input type="tel" id="uPhone" placeholder="Please enter phone number" oninput="validate()">
    </div>

    <div class="input-group">
        <input type="password" id="uPass" placeholder="Please enter password" oninput="validate()">
        <span class="eye-btn" onclick="togglePass()">🙈</span>
    </div>

    <div class="forgot-pass">Forget password</div>

    <button id="authBtn" class="login-btn" disabled onclick="doLogin()">Log in</button>

    <div class="or-label">Or</div>

    <div class="social-box">
        <div class="social-circle" onclick="social('google')">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" alt="G">
        </div>
        <div class="social-circle" onclick="social('facebook')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" alt="F">
        </div>
    </div>

    <p class="footer-info">
        By signing up, you agree to our <span onclick="alert('Terms')">Teams of Service</span> & <span onclick="alert('Privacy Policy')">Privacy Policy</span>
    </p>
</div>

<script>
    // বাটন ভ্যালিডেশন
    function validate() {
        const p = document.getElementById('uPhone').value;
        const s = document.getElementById('uPass').value;
        const b = document.getElementById('authBtn');
        
        if(p.length >= 8 && s.length >= 6) {
            b.classList.add('ready');
            b.disabled = false;
        } else {
            b.classList.remove('ready');
            b.disabled = true;
        }
    }

    // পাসওয়ার্ড ভিউ টগল
    function togglePass() {
        const i = document.getElementById('uPass');
        const e = document.querySelector('.eye-btn');
        if(i.type === 'password') {
            i.type = 'text';
            e.innerText = '🐵';
        } else {
            i.type = 'password';
            e.innerText = '🙈';
        }
    }

    function doLogin() {
        const b = document.getElementById('authBtn');
        b.innerText = "Please wait...";
        setTimeout(() => {
            alert("Login Success!");
            b.innerText = "Log in";
        }, 1500);
    }

    function social(t) {
        alert(t.toUpperCase() + " Login is starting...");
    }
    
    // ছবি লোড না হলে অল্টারনেট সোর্স
    document.getElementById('logoImg').onerror = function() {
        this.src = 'https://via.placeholder.com/150?text=PATA+LIVE';
    };
</script>

</body>
</html>
