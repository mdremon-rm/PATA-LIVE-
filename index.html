<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pata Live - Original Master Pro</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF2D55;
            --secondary: #8E24AA;
            --bg: #0b0118;
            --card-bg: #1e1e30;
            --text-gray: #b0b0b0;
            --gold: #FFD700;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }

        /* Auth Screen - Added inside existing structure */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        .auth-card { width: 100%; max-width: 350px; text-align: center; }
        .auth-input { width: 100%; height: 55px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 0 15px; color: white; margin-bottom: 15px; outline: none; }
        .auth-btn { width: 100%; height: 55px; border-radius: 15px; border: none; background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; font-weight: 700; cursor: pointer; }

        .app-shell { display: flex; flex-direction: column; min-height: 100vh; }

        .top-bar { 
            height: 60px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 15px; background: var(--bg); position: sticky; top: 0; z-index: 1000; 
        }
        .header-tabs-container { flex: 1; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .header-tabs { display: flex; gap: 20px; align-items: center; }
        .h-tab { font-size: 15px; color: var(--text-gray); font-weight: 600; cursor: pointer; padding: 8px 0; position: relative; }
        .h-tab.active { color: white; font-size: 17px; }
        .h-tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: var(--primary); border-radius: 10px; }

        .banner-section { padding: 10px 15px; }
        .banner-container { width: 100%; height: 140px; border-radius: 15px; overflow: hidden; }
        .banner-track { display: flex; width: 300%; height: 100%; transition: 0.5s; }
        .banner-track img { width: 33.33%; height: 100%; object-fit: cover; }

        .screen-container { flex: 1; padding: 12px; padding-bottom: 100px; }
        .feed-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .live-card { aspect-ratio: 1/1.25; border-radius: 20px; overflow: hidden; position: relative; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); }
        .live-card img { width: 100%; height: 100%; object-fit: cover; }
        .live-tag { position: absolute; top: 10px; left: 10px; background: var(--primary); font-size: 9px; font-weight: 800; padding: 3px 8px; border-radius: 20px; z-index: 5; }
        .card-footer { position: absolute; bottom: 0; width: 100%; padding: 12px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); }

        .bottom-nav-pro { 
            position: fixed; bottom: 0; width: 100%; height: 80px; 
            background: rgba(15, 2, 31, 0.98); backdrop-filter: blur(20px); 
            display: flex; align-items: center; justify-content: space-evenly; 
            border-top: 1px solid rgba(255, 255, 255, 0.1); z-index: 2000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-gray); font-size: 10px; cursor: pointer; min-width: 50px; }
        .nav-item.active { color: var(--primary); }
        .nav-item span { font-size: 24px; margin-bottom: 4px; }
        
        .nav-mic-btn { 
            width: 65px; height: 65px; background: linear-gradient(45deg, var(--secondary), var(--primary)); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 30px; color: white; position: relative; top: -25px; 
            border: 4px solid var(--bg); box-shadow: 0 8px 25px rgba(255, 45, 85, 0.5); 
            cursor: pointer; z-index: 2001;
        }

        /* Professional Audio Room UI */
        #room-view { position: fixed; inset: 0; background: linear-gradient(180deg, #1e0836 0%, var(--bg) 100%); z-index: 9000; display: none; flex-direction: column; }
        .room-top { padding: 20px; display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .host-info { background: rgba(255,255,255,0.08); padding: 5px 15px 5px 5px; border-radius: 30px; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .host-info img { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--gold); }
        .seats-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 25px; margin-top: 20px; }
        .seat-item { display: flex; flex-direction: column; align-items: center; gap: 8px; position: relative; }
        .seat-circle { width: 80px; height: 80px; border-radius: 22px; background: rgba(255,255,255,0.03); border: 1.5px dashed rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; overflow: visible; }
        .seat-circle.active { border: 2px solid var(--gold); border-style: solid; background: rgba(255,255,255,0.08); }
        .seat-circle img { width: 100%; height: 100%; border-radius: 20px; object-fit: cover; }
        .seat-tag { position: absolute; bottom: -5px; background: var(--primary); font-size: 9px; padding: 2px 8px; border-radius: 10px; font-weight: 700; z-index: 2; }
        .chat-display { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: linear-gradient(transparent, rgba(0,0,0,0.3)); }
        .chat-msg { font-size: 13px; background: rgba(0,0,0,0.2); padding: 8px 15px; border-radius: 15px; width: fit-content; max-width: 85%; }
        .chat-msg b { color: var(--gold); margin-right: 5px; }
        .room-bottom { height: 80px; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: space-around; padding: 0 15px; }
        .action-icon { width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .gift-icon { width: 60px; height: 60px; background: linear-gradient(45deg, var(--primary), var(--secondary)); border-radius: 50%; font-size: 32px; box-shadow: 0 0 20px rgba(255,45,85,0.4); }
    </style>
</head>
<body>

<!-- User Auth -->
<div id="auth-overlay">
    <div class="auth-card">
        <h1 style="font-size: 36px; font-weight: 900; margin-bottom: 10px;">Pata Live</h1>
        <p style="color: var(--text-gray); margin-bottom: 40px;">Voice Party & Earning</p>
        <input type="email" id="logEmail" class="auth-input" placeholder="Email Address">
        <input type="password" id="logPass" class="auth-input" placeholder="Password">
        <button class="auth-btn" onclick="handleAuth()">Sign In / Create Account</button>
    </div>
</div>

<div class="app-shell" id="app-main" style="display:none;">
    <div class="top-bar">
        <div class="header-tabs-container">
            <div class="header-tabs">
                <div class="h-tab">Follow</div>
                <div class="h-tab active">Popular</div>
                <div class="h-tab">New</div>
                <div class="h-tab">Explore</div>
            </div>
        </div>
        <div style="display:flex; gap:15px; font-size:20px; padding-left:10px;">
            <span onclick="alert('Ranking Coming Soon!')">🏆</span>
            <span onclick="updateProfile()">👤</span>
        </div>
    </div>

    <div class="banner-section">
        <div class="banner-container">
            <div class="banner-track" id="bTrack">
                <img src="https://picsum.photos/seed/p1/800/400">
                <img src="https://picsum.photos/seed/p2/800/400">
                <img src="https://picsum.photos/seed/p3/800/400">
            </div>
        </div>
    </div>

    <div class="screen-container">
        <div class="feed-grid" id="gridPopular"></div>
    </div>

    <nav class="bottom-nav-pro">
        <div class="nav-item active">
            <span>🏠</span>
            Home
        </div>
        <div class="nav-item">
            <span>🕒</span>
            History
        </div>
        
        <div class="nav-mic-btn" onclick="startLive()">🎙️</div>
        
        <div class="nav-item">
            <span>💬</span>
            Message
        </div>
        <div class="nav-item" onclick="updateProfile()">
            <span>👤</span>
            Me
        </div>
    </nav>
</div>

<!-- Audio Room View -->
<div id="room-view">
    <div class="room-top">
        <div class="host-info">
            <img id="room-host-img" src="">
            <div>
                <div id="room-name-top" style="font-size: 13px; font-weight: 800;">Loading...</div>
                <div id="room-id-top" style="font-size: 10px; color: var(--gold);">ID: 000000</div>
            </div>
        </div>
        <div style="display:flex; gap:15px; align-items:center;">
            <div style="background:rgba(255,255,255,0.1); padding:4px 12px; border-radius:20px; font-size:11px;">🔥 1.2k</div>
            <div onclick="exitRoom()" style="font-size: 26px; font-weight: 300;">✕</div>
        </div>
    </div>

    <div class="seats-container">
        <script>
            for(let i=1; i<=9; i++) {
                document.write(`
                    <div class="seat-item" onclick="handleSeat(${i})">
                        <div class="seat-circle" id="seat-${i}">
                            <span style="font-size: 28px; opacity: 0.1;">🛋️</span>
                            <div class="seat-tag" id="seat-tag-${i}">Seat ${i}</div>
                        </div>
                        <div id="seat-user-${i}" style="font-size: 10px; color: var(--text-gray); font-weight: 600;">Empty</div>
                    </div>
                `);
            }
        </script>
    </div>

    <div class="chat-display" id="room-chat">
        <div class="chat-msg"><b>System:</b> Welcome! Respect everyone in the room.</div>
    </div>

    <div class="room-bottom">
        <div class="action-icon" onclick="toggleMic()">🎙️</div>
        <div class="action-icon" onclick="sendMsg()">💬</div>
        <div class="gift-icon" onclick="sendGift()">🎁</div>
        <div class="action-icon">🎵</div>
        <div class="action-icon">⚙️</div>
    </div>
</div>

<script>
    // Firebase Setup
    const firebaseConfig = {
        apiKey: "AIzaSyD5vRGyz3qdyqhnt2T9qmlPlTeQKV5Hlbw",
        authDomain: "pata-live.firebaseapp.com",
        databaseURL: "https://pata-live-default-rtdb.firebaseio.com/",
        projectId: "pata-live",
        storageBucket: "pata-live.firebasestorage.app",
        messagingSenderId: "644016212127",
        appId: "1:644016212127:web:214bc06f4677c8188e7aaa"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    let currentUser = null;
    let currentRoomId = null;

    // --- Authentication Logic ---
    async function handleAuth() {
        const email = document.getElementById('logEmail').value;
        const pass = document.getElementById('logPass').value;
        if(!email || !pass) return alert("Please fill details!");
        
        try {
            await auth.signInWithEmailAndPassword(email, pass);
        } catch (e) {
            if(e.code === 'auth/user-not-found') {
                await auth.createUserWithEmailAndPassword(email, pass);
            } else alert(e.message);
        }
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            currentUser = user;
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('app-main').style.display = 'flex';
            initApp();
        } else {
            document.getElementById('auth-overlay').style.display = 'flex';
            document.getElementById('app-main').style.display = 'none';
        }
    });

    function initApp() {
        database.ref('live_rooms').on('value', (snap) => {
            const grid = document.getElementById('gridPopular');
            grid.innerHTML = '';
            snap.forEach(child => {
                const room = child.val();
                grid.innerHTML += `
                    <div class="live-card" onclick="joinRoom('${child.key}')">
                        <img src="${room.hostImg || 'https://picsum.photos/seed/'+child.key+'/400/500'}">
                        <div class="live-tag">LIVE</div>
                        <div class="card-footer">
                            <div style="font-weight:700;">${room.name}</div>
                            <div style="font-size:10px; color:#bbb;">Host: ${room.host}</div>
                        </div>
                    </div>`;
            });
        });
    }

    // --- Profile Management ---
    function updateProfile() {
        const name = prompt("Enter your Name:");
        if(name) {
            database.ref('users/' + currentUser.uid).update({name: name});
            alert("Profile Updated!");
        }
    }

    // --- Room Logic ---
    async function startLive() {
        const title = prompt("Enter Room Title:");
        if(!title) return;
        const rid = Math.floor(100000 + Math.random() * 900000);
        const userRef = await database.ref('users/' + currentUser.uid).once('value');
        const uName = userRef.exists() ? userRef.val().name : "Host_" + rid;
        
        const roomData = {
            name: title,
            host: uName,
            hostUid: currentUser.uid,
            hostImg: "https://i.pravatar.cc/150?u=" + currentUser.uid,
            seats: { 1: { uid: currentUser.uid, name: uName, avatar: "https://i.pravatar.cc/150?u=" + currentUser.uid } }
        };
        await database.ref('live_rooms/' + rid).set(roomData);
        joinRoom(rid);
    }

    function joinRoom(id) {
        currentRoomId = id;
        document.getElementById('room-view').style.display = 'flex';
        database.ref('live_rooms/' + id).on('value', snap => {
            const data = snap.val();
            if(!data) return;
            document.getElementById('room-name-top').innerText = data.name;
            document.getElementById('room-id-top').innerText = "ID: " + id;
            document.getElementById('room-host-img').src = data.hostImg;

            // Sync Seats
            for(let i=1; i<=9; i++) {
                const seat = data.seats ? data.seats[i] : null;
                const circle = document.getElementById('seat-'+i);
                const userLabel = document.getElementById('seat-user-'+i);
                if(seat) {
                    circle.innerHTML = `<img src="${seat.avatar}">`;
                    circle.classList.add('active');
                    userLabel.innerText = seat.name;
                } else {
                    circle.innerHTML = `<span style="font-size: 28px; opacity: 0.1;">🛋️</span><div class="seat-tag">Seat ${i}</div>`;
                    circle.classList.remove('active');
                    userLabel.innerText = "Empty";
                }
            }
        });
    }

    async function handleSeat(num) {
        const seatRef = database.ref('live_rooms/' + currentRoomId + '/seats/' + num);
        const snap = await seatRef.get();
        if(snap.exists()) {
            if(snap.val().uid === currentUser.uid) seatRef.remove();
        } else {
            // Remove from other seats first
            const roomSeats = await database.ref('live_rooms/' + currentRoomId + '/seats').get();
            roomSeats.forEach(child => { if(child.val().uid === currentUser.uid) child.ref.remove(); });
            
            const userSnap = await database.ref('users/' + currentUser.uid).once('value');
            const name = userSnap.exists() ? userSnap.val().name : currentUser.email.split('@')[0];
            
            seatRef.set({
                uid: currentUser.uid,
                name: name,
                avatar: "https://i.pravatar.cc/150?u=" + currentUser.uid
            });
        }
    }

    function sendMsg() {
        const msg = prompt("Message:");
        if(msg) {
            const chatBox = document.getElementById('room-chat');
            chatBox.innerHTML += `<div class="chat-msg"><b>You:</b> ${msg}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }

    function sendGift() {
        alert("Gift Sent! 🎁");
        const chatBox = document.getElementById('room-chat');
        chatBox.innerHTML += `<div class="chat-msg" style="color:var(--primary)"><b>System:</b> You sent a gift 🎁</div>`;
    }

    function toggleMic() {
        const icon = event.currentTarget;
        icon.style.color = icon.style.color === 'red' ? 'white' : 'red';
    }

    function exitRoom() {
        if(currentRoomId) {
            database.ref('live_rooms/' + currentRoomId + '/seats').once('value', snap => {
                snap.forEach(c => { if(c.val().uid === currentUser.uid) c.ref.remove(); });
            });
            database.ref('live_rooms/' + currentRoomId).off();
        }
        document.getElementById('room-view').style.display = 'none';
        currentRoomId = null;
    }

    // Original Banner Logic
    let step = 0;
    setInterval(() => {
        step = (step + 1) % 3;
        const track = document.getElementById('bTrack');
        if(track) track.style.transform = `translateX(-${step * 33.33}%)`;
    }, 3000);
</script>

</body>
</html>
