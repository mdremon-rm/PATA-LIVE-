<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pata Live - Official Master</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- ZegoCloud SDK -->
    <script src="https://unpkg.com/zego-express-engine-webrtc@3.0.0/ZegoExpressWeb-3.0.0.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF2D55;
            --secondary: #8E24AA;
            --bg: #0b0118;
            --card-bg: #1e1e30;
            --text-gray: #b0b0b0;
            --gold: #FFD700;
            --glass: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; overflow-x: hidden; height: 100vh; }

        /* Auth UI */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        .auth-card { width: 100%; max-width: 400px; text-align: center; }
        .auth-logo { font-size: 32px; font-weight: 900; margin-bottom: 40px; color: var(--primary); }
        .input-group { background: var(--card-bg); border-radius: 12px; display: flex; align-items: center; padding: 12px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .country-code { padding-right: 10px; border-right: 1px solid #444; margin-right: 10px; color: var(--gold); font-weight: 700; }
        .input-group input { background: transparent; border: none; color: white; flex: 1; outline: none; font-size: 16px; }
        .btn-main { width: 100%; background: linear-gradient(45deg, var(--primary), var(--secondary)); border: none; padding: 15px; border-radius: 12px; color: white; font-weight: 700; margin-top: 10px; font-size: 16px; cursor: pointer; }
        .social-login { margin-top: 30px; display: flex; gap: 20px; justify-content: center; }
        .social-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--card-bg); display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }

        /* Profile Setup UI */
        #profile-setup { position: fixed; inset: 0; background: var(--bg); z-index: 11000; display: none; flex-direction: column; align-items: center; padding: 40px 20px; }
        .avatar-upload { width: 120px; height: 120px; border-radius: 50%; background: var(--card-bg); border: 2px dashed var(--primary); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; margin-bottom: 20px; }
        .avatar-upload img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

        /* Header Style */
        .top-bar { height: 65px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: var(--bg); position: sticky; top: 0; z-index: 1000; }
        .tabs-wrapper { flex: 1; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .tabs { display: flex; gap: 20px; align-items: center; }
        .tab-item { font-size: 14px; color: var(--text-gray); font-weight: 600; cursor: pointer; padding: 10px 0; position: relative; }
        .tab-item.active { color: white; font-size: 16px; border-bottom: 3.5px solid var(--primary); }
        .header-actions { display: flex; gap: 18px; font-size: 22px; margin-left: 15px; align-items: center; }

        /* Feed Grid */
        .main-content { padding: 12px; padding-bottom: 110px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; height: calc(100vh - 140px); overflow-y: auto; }
        .room-card { aspect-ratio: 1/1.2; border-radius: 18px; overflow: hidden; position: relative; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.06); }
        .room-card img { width: 100%; height: 100%; object-fit: cover; }
        .card-details { position: absolute; bottom: 0; width: 100%; padding: 10px; background: linear-gradient(to top, rgba(0,0,0,0.95), transparent); }
        .live-tag { position: absolute; top: 10px; left: 10px; background: var(--primary); font-size: 9px; font-weight: 900; padding: 3px 8px; border-radius: 10px; z-index: 5; }

        /* Overlays */
        .full-screen-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 8000; display: none; flex-direction: column; animation: fadeIn 0.25s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(1.05); } to { opacity: 1; transform: scale(1); } }
        .glass-top { height: 65px; display: flex; align-items: center; padding: 0 15px; background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .back-arrow { cursor: pointer; margin-right: 15px; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; }
        .back-arrow svg { width: 24px; height: 24px; fill: none; stroke: white; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

        /* Bottom Nav */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: rgba(15, 2, 31, 0.98); display: flex; align-items: center; justify-content: space-evenly; border-top: 1px solid rgba(255,255,255,0.05); z-index: 2000; }
        .nav-link { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: var(--text-gray); cursor: pointer; }
        .nav-link.active { color: white; }
        .mic-btn { width: 62px; height: 62px; background: linear-gradient(45deg, var(--secondary), var(--primary)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; position: relative; top: -18px; border: 4px solid var(--bg); box-shadow: 0 8px 25px rgba(255, 45, 85, 0.4); cursor: pointer; }

        /* Room Interior */
        #room-view { position: fixed; inset: 0; background: linear-gradient(180deg, #1e0836, #0b0118); z-index: 9000; display: none; flex-direction: column; }
        .room-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); }
        .grid-seats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 40px 20px; flex: 1; }
        .seat-unit { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .seat-orb { width: 75px; height: 75px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 2px dashed rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .seat-orb img { width: 100%; height: 100%; object-fit: cover; }
        .seat-orb.occupied { border: 2.5px solid var(--gold); border-style: solid; }
        .speaking { border-color: var(--primary) !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); box-shadow: 0 0 15px var(--primary); } 100% { transform: scale(1); } }
        .room-footer { height: 120px; display: flex; justify-content: center; align-items: center; }
        .mic-control-btn { width: 65px; height: 65px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; }
        .mic-on { background: var(--primary); box-shadow: 0 0 20px var(--primary); }
        #msg-box { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--primary); padding: 10px 20px; border-radius: 20px; font-size: 12px; z-index: 15000; display: none; }
    </style>
</head>
<body>

<div id="msg-box"></div>

<!-- 1. Authentication Screen -->
<div id="auth-screen">
    <div class="auth-card">
        <div class="auth-logo">PATA LIVE</div>
        <div class="input-group">
            <span class="country-code">+880</span>
            <input type="tel" id="auth-phone" placeholder="Phone Number">
        </div>
        <div class="input-group">
            <input type="password" id="auth-pass" placeholder="Password">
        </div>
        <button class="btn-main" onclick="handleLogin()">Login / Sign Up</button>
        
        <div style="margin-top: 25px; color: #666; font-size: 12px;">OR CONTINUE WITH</div>
        <div class="social-login">
            <div class="social-btn">G</div>
            <div class="social-btn" style="color:#1877F2">f</div>
        </div>
    </div>
</div>

<!-- 2. Profile Setup Screen -->
<div id="profile-setup">
    <h2 style="margin-bottom:30px;">Profile Setup</h2>
    <div class="avatar-upload">
        <img src="https://via.placeholder.com/150" id="preview-img">
        <input type="file" id="avatar-input" accept="image/*" onchange="previewAvatar(this)">
    </div>
    <div class="input-group" style="width:100%; max-width:320px;">
        <input type="text" id="user-name-input" placeholder="Enter Your Name">
    </div>
    <button class="btn-main" style="max-width:320px;" onclick="saveProfile()">Save & Start</button>
</div>

<!-- Main App UI -->
<div id="main-app-ui" style="display:none;">
    <div class="top-bar">
        <div class="tabs-wrapper">
            <div class="tabs">
                <div class="tab-item">Follow</div>
                <div class="tab-item active">Popular</div>
                <div class="tab-item">New</div>
                <div class="tab-item">Explore</div>
                <div class="tab-item">Global</div>
            </div>
        </div>
        <div class="header-actions">
            <span>🏆</span>
            <span>🔍</span>
        </div>
    </div>

    <div class="main-content" id="audioGrid"></div>

    <div class="nav-bar">
        <div class="nav-link active"><span>🏠</span>Home</div>
        <div class="nav-link"><span>🕒</span>History</div>
        <div class="mic-btn" onclick="joinAudioRoom('Official Lounge', 'main_01')">🎙️</div>
        <div class="nav-link"><span>💬</span>Message</div>
        <div class="nav-link" id="profile-btn">
            <img src="" id="my-thumb" style="width:24px; height:24px; border-radius:50%;">
            <span>Me</span>
        </div>
    </div>
</div>

<!-- Room View -->
<div id="room-view">
    <div class="room-header">
        <div style="display:flex; align-items:center; gap:12px;">
            <div id="room-avatar" style="background:var(--primary); width:42px; height:42px; border-radius:50%; overflow:hidden;">
                <img src="" id="host-img" style="width:100%; height:100%; object-fit:cover;">
            </div>
            <div>
                <div id="currentRoomName" style="font-weight:800; font-size:15px;">Party Room</div>
                <div id="myPataIDDisplay" style="font-size:10px; color:var(--gold);">ID: Loading...</div>
            </div>
        </div>
        <div onclick="leaveRoom()" style="font-size:26px; padding:5px; cursor:pointer;">✕</div>
    </div>
    <div class="grid-seats" id="seats-container"></div>
    <div class="room-footer">
        <div id="mic-trigger" class="mic-control-btn" onclick="toggleMic()">🎙️</div>
    </div>
</div>

<script>
    const ZEGO_APP_ID = 1958175668; 
    const ZEGO_SERVER_SECRET = "755b86b05e1eb51001015cbbaa994ba53bec16b9f29dc9eaa8583eda083bf59a"; 

    let zg = null, localStream = null, isMicOn = false, mySeat = null, currentRoomID = null;
    let currentUser = { uid: '', pataId: '', name: '', avatar: '' };

    // Initialize
    window.onload = () => {
        initFirebase();
        renderSeats();
        refreshFeed();
    };

    function showMsg(t) {
        const b = document.getElementById('msg-box'); b.innerText = t; b.style.display = 'block';
        setTimeout(()=> b.style.display='none', 3000);
    }

    function initFirebase() {
        try {
            const config = JSON.parse(__firebase_config);
            firebase.initializeApp(config);
            const db = firebase.firestore();
            const auth = firebase.auth();

            auth.onAuthStateChanged(async (user) => {
                if(user) {
                    currentUser.uid = user.uid;
                    loadUserData();
                }
            });
        } catch(e) { console.error("Firebase Config Error"); }
    }

    async function handleLogin() {
        const phone = document.getElementById('auth-phone').value;
        const pass = document.getElementById('auth-pass').value;
        if(phone.length < 10 || pass.length < 6) {
            showMsg("Invalid Phone or Password (min 6 chars)"); return;
        }
        // Anonymous Auth for Demo but logic prepared for Real Auth
        await firebase.auth().signInAnonymously();
    }

    async function loadUserData() {
        const db = firebase.firestore();
        const docRef = db.collection('artifacts').doc(__app_id).collection('users').doc(currentUser.uid);
        const doc = await docRef.get();

        if(doc.exists) {
            currentUser = doc.data();
            startApp();
        } else {
            // New User: Assign Pata ID starting from 258001
            const countRef = db.collection('artifacts').doc(__app_id).collection('metadata').doc('user_count');
            const countDoc = await countRef.get();
            let nextId = 258001;
            if(countDoc.exists) nextId = countDoc.data().val + 1;
            
            currentUser.pataId = nextId.toString();
            await countRef.set({val: nextId});
            
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('profile-setup').style.display = 'flex';
        }
    }

    function previewAvatar(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('preview-img').src = e.target.result;
                currentUser.avatar = e.target.result; // Simple base64 for demo
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function saveProfile() {
        const name = document.getElementById('user-name-input').value;
        if(!name) { showMsg("Please enter your name"); return; }
        currentUser.name = name;
        
        const db = firebase.firestore();
        await db.collection('artifacts').doc(__app_id).collection('users').doc(currentUser.uid).set(currentUser);
        startApp();
    }

    function startApp() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('profile-setup').style.display = 'none';
        document.getElementById('main-app-ui').style.display = 'block';
        document.getElementById('my-thumb').src = currentUser.avatar || 'https://via.placeholder.com/50';
        document.getElementById('myPataIDDisplay').innerText = `ID: ${currentUser.pataId}`;
    }

    // --- Core Room Logic ---
    async function initZego() {
        if(zg) return;
        zg = new ZegoExpressEngine(ZEGO_APP_ID, ZEGO_SERVER_SECRET);
        zg.on('roomStreamUpdate', async (id, type, streams) => {
            if(type === 'ADD') {
                streams.forEach(s => {
                    zg.startPlayingStream(s.streamID).then(st => {
                        const a = new Audio(); a.srcObject = st; a.play();
                    });
                });
            }
        });
    }

    async function joinAudioRoom(name, id) {
        currentRoomID = id;
        document.getElementById('room-view').style.display = 'flex';
        document.getElementById('currentRoomName').innerText = name;
        document.getElementById('host-img').src = currentUser.avatar;
        
        await initZego();
        try {
            await zg.loginRoom(id, "", { userID: currentUser.uid, userName: currentUser.name });
            showMsg("Connected to " + name);
        } catch(e) { console.error(e); }
    }

    async function leaveRoom() {
        if(isMicOn) await toggleMic();
        if(zg) zg.logoutRoom(currentRoomID);
        document.getElementById('room-view').style.display = 'none';
        mySeat = null;
        renderSeats();
    }

    function renderSeats() {
        const container = document.getElementById('seats-container');
        container.innerHTML = '';
        for(let i=1; i<=9; i++) {
            container.innerHTML += `
                <div class="seat-unit" onclick="occupySeat(${i})">
                    <div class="seat-orb" id="orb-${i}">👤</div>
                    <div style="font-size:11px; color:#666;" id="user-label-${i}">Empty</div>
                </div>`;
        }
    }

    async function occupySeat(n) {
        if(mySeat === n) {
            if(isMicOn) await toggleMic();
            mySeat = null; renderSeats();
            document.getElementById('mic-trigger').style.display = 'none';
            return;
        }
        if(mySeat !== null) return;

        mySeat = n;
        const orb = document.getElementById('orb-'+n);
        const label = document.getElementById('user-label-'+n);
        
        orb.innerHTML = `<img src="${currentUser.avatar}">`;
        orb.classList.add('occupied');
        label.innerText = currentUser.name;
        label.style.color = "white";
        
        document.getElementById('mic-trigger').style.display = 'flex';
    }

    async function toggleMic() {
        const btn = document.getElementById('mic-trigger');
        const orb = document.getElementById('orb-'+mySeat);
        if(!isMicOn) {
            try {
                localStream = await zg.createStream({camera: {audio:true, video:false}});
                zg.startPublishingStream(currentUser.uid + "_stream", localStream);
                isMicOn = true; btn.classList.add('mic-on'); orb.classList.add('speaking');
            } catch(e) { showMsg("Mic Error"); }
        } else {
            zg.stopPublishingStream(currentUser.uid + "_stream");
            zg.destroyStream(localStream);
            isMicOn = false; btn.classList.remove('mic-on'); orb.classList.remove('speaking');
        }
    }

    function refreshFeed() {
        const grid = document.getElementById('audioGrid');
        grid.innerHTML = '';
        const rooms = ["Official Lounge", "Pata Adda", "Music Night", "Global Talk"];
        rooms.forEach((r, i) => {
            grid.innerHTML += `
                <div class="room-card" onclick="joinAudioRoom('${r}', 'room_${i}')">
                    <img src="https://picsum.photos/seed/pata${i}/400/500">
                    <div class="live-tag">LIVE</div>
                    <div class="card-details">
                        <div style="font-weight:700; font-size:13px;">${r}</div>
                        <div style="font-size:10px; color:#aaa;">ID: 2580${i+1} | অনলাইন</div>
                    </div>
                </div>`;
        });
    }
</script>
</body>
</html>
