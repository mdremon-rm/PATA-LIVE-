<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pata Live - Poppo Style Professional</title>
    
    <!-- SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF2D55;
            --secondary: #8E24AA;
            --bg: #0b0118;
            --card-bg: #1e1e30;
            --text-gray: #b0b0b0;
            --glass: rgba(255, 255, 255, 0.75);
            --gold: #FFD700;
            --poppo-blue: #4e56ff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }

        /* --- Auth Screen (অরিজিনাল গ্লাস ইফেক্ট ঠিক রাখা হয়েছে) --- */
        #auth-screen { 
            position: fixed; inset: 0; 
            background: linear-gradient(180deg, #A4C1FF 0%, #E2EDFF 40%, #FFFFFF 100%);
            display: flex; flex-direction: column; align-items: center; z-index: 5000;
            padding: 40px 20px;
        }
        .logo-wrapper {
            width: 120px; height: 120px; background: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 10px; border: 3px solid var(--primary);
        }
        .app-name { font-size: 24px; font-weight: 800; color: #111; margin-bottom: 30px; }

        .glass-field {
            width: 100%; max-width: 400px; background: var(--glass); backdrop-filter: blur(10px);
            height: 60px; border-radius: 50px; display: flex; align-items: center; padding: 0 20px; margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .prefix { display: flex; align-items: center; gap: 8px; padding-right: 12px; border-right: 1px solid rgba(0,0,0,0.1); font-weight: 700; color: #333; }
        .prefix img { width: 22px; }
        .glass-field input { flex: 1; border: none; outline: none; font-size: 16px; background: transparent; padding: 0 15px; color: #111; }

        .login-btn {
            width: 100%; max-width: 400px; height: 60px; border-radius: 50px; border: none; 
            background: #D1D1D1; color: #fff; font-size: 18px; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .login-btn.active { background: var(--primary); box-shadow: 0 8px 25px rgba(255, 45, 85, 0.3); }

        .social-row { display: flex; gap: 20px; margin-top: 25px; }
        .social-circle { width: 55px; height: 55px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.08); cursor: pointer; }

        .policy-text { margin-top: 30px; font-size: 11px; color: #666; text-align: center; max-width: 300px; }
        .policy-text span { color: var(--primary); font-weight: 600; }

        /* --- Main App --- */
        .app-shell { display: none; flex-direction: column; min-height: 100vh; }
        .top-bar { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: var(--bg); }
        .header-tabs { display: flex; gap: 20px; overflow-x: auto; scrollbar-width: none; }
        .h-tab { font-size: 15px; color: var(--text-gray); font-weight: 600; white-space: nowrap; cursor: pointer; }
        .h-tab.active { color: white; font-size: 18px; border-bottom: 3px solid var(--primary); }

        .feed-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; padding-bottom: 100px; }
        .live-card { aspect-ratio: 1/1.2; border-radius: 18px; overflow: hidden; position: relative; background: var(--card-bg); }
        .live-card img { width: 100%; height: 100%; object-fit: cover; }
        .live-badge { position: absolute; top: 10px; left: 10px; background: var(--primary); font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 10px; }
        .card-info { position: absolute; bottom: 0; width: 100%; padding: 10px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); }

        /* --- POPPO STYLE CREATE ROOM MODAL --- */
        #create-room-overlay {
            position: fixed; inset: 0; background: linear-gradient(to bottom, #2b0c4a, #0b0118);
            z-index: 5500; display: none; flex-direction: column; padding: 20px;
        }
        .close-create { position: absolute; top: 20px; left: 20px; font-size: 28px; }
        .create-header { margin-top: 50px; background: rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; display: flex; align-items: center; gap: 15px; }
        .host-preview-img { width: 80px; height: 80px; border-radius: 15px; object-fit: cover; border: 2px solid white; }
        .room-title-input { background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.3); color: white; font-size: 20px; font-weight: 700; width: 100%; outline: none; }
        
        .tag-row { display: flex; gap: 10px; margin-top: 20px; overflow-x: auto; scrollbar-width: none; }
        .tag-item { padding: 6px 15px; border-radius: 20px; background: rgba(255,255,255,0.15); font-size: 12px; white-space: nowrap; }
        .tag-item.active { background: white; color: black; font-weight: 600; }

        .mode-toggle { display: flex; background: rgba(0,0,0,0.3); border-radius: 30px; margin-top: auto; margin-bottom: 30px; padding: 5px; align-self: center; }
        .mode-btn { padding: 10px 40px; border-radius: 25px; font-weight: 700; font-size: 14px; }
        .mode-btn.active { background: var(--poppo-blue); color: white; }

        .hold-party-btn { 
            width: 80%; height: 60px; background: var(--poppo-blue); border-radius: 40px; 
            align-self: center; font-size: 18px; font-weight: 800; border: none; color: white;
            box-shadow: 0 10px 30px rgba(78, 86, 255, 0.4); margin-bottom: 20px;
        }

        /* --- PROFESSIONAL ROOM UI (POPPO STYLE) --- */
        #room-view { position: fixed; inset: 0; background: linear-gradient(180deg, #1f0a33 0%, #09011a 100%); z-index: 6000; display: none; flex-direction: column; }
        
        .room-header { height: 80px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; margin-top: 10px; }
        .host-profile { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.3); padding: 6px 15px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); }
        .host-pic { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--gold); }
        .host-meta { display: flex; flex-direction: column; }
        .host-meta span:first-child { font-size: 12px; font-weight: 700; color: white; }
        .host-meta span:last-child { font-size: 10px; color: var(--gold); }

        .seat-section { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .main-seat-area { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 40px; width: 100%; }
        
        .mic-seat { display: flex; flex-direction: column; align-items: center; position: relative; }
        .seat-circle { 
            width: 65px; height: 65px; border-radius: 50%; 
            background: rgba(255,255,255,0.08); border: 2px dashed rgba(255,255,255,0.15); 
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .seat-circle.active { border: 2px solid var(--primary); background: rgba(255, 45, 85, 0.1); animation: pulse 2s infinite; }
        .seat-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .seat-num { position: absolute; bottom: -5px; background: rgba(0,0,0,0.6); font-size: 10px; padding: 1px 6px; border-radius: 10px; color: var(--gold); }
        .seat-name { margin-top: 8px; font-size: 10px; color: #ccc; text-align: center; }

        .room-footer { height: 80px; display: flex; align-items: center; justify-content: space-around; padding: 0 10px; background: rgba(0,0,0,0.4); border-radius: 30px 30px 0 0; }
        .ctrl-btn { width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .gift-btn { width: 60px; height: 60px; background: linear-gradient(45deg, #FFD700, #FFA500); border-radius: 50%; font-size: 30px; box-shadow: 0 5px 15px rgba(255,165,0,0.4); }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 45, 85, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 45, 85, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 45, 85, 0); } }

        /* --- Nav --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #0f021f; display: flex; align-items: center; justify-content: space-evenly; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-gray); font-size: 10px; }
        .nav-item.active { color: var(--primary); }
        .mic-main { width: 60px; height: 60px; background: linear-gradient(45deg, var(--secondary), var(--primary)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; position: relative; top: -15px; border: 4px solid #0b0118; }
    </style>
</head>
<body>

<!-- Login Screen (Original Glass Look) -->
<div id="auth-screen">
    <div class="logo-wrapper"><img src="https://i.ibb.co/VYpYmRj/pata-logo.png" style="width: 80%;"></div>
    <h1 class="app-name">Pata Live</h1>
    <div class="glass-field">
        <div class="prefix"><img src="https://flagcdn.com/w40/pk.png"><span>+92</span></div>
        <input type="tel" id="pInp" placeholder="Enter phone number">
    </div>
    <div class="glass-field"><input type="password" id="passInp" placeholder="Enter password"></div>
    <button class="login-btn active" onclick="alert('Use Google Login')">Log in</button>
    <div style="margin: 20px 0; color: #555; font-weight: 700;">Or login with</div>
    <div class="social-row">
        <div class="social-circle" onclick="gLogin()">
            <svg width="30" height="30" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path></svg>
        </div>
        <div class="social-circle"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" width="30"></div>
    </div>
    <div class="policy-text">By continuing, you agree to Pata Live's <span>Terms</span> and <span>Privacy Policy</span>.</div>
</div>

<!-- Main App -->
<div class="app-shell" id="app-shell">
    <div class="top-bar">
        <div class="header-tabs">
            <div class="h-tab">Follow</div>
            <div class="h-tab active">Popular</div>
            <div class="h-tab">New</div>
            <div class="h-tab">Party</div>
        </div>
        <div style="display:flex; gap:15px; font-size:22px;">🏆🔍</div>
    </div>
    <div id="mainGrid" class="feed-grid"></div>
    <nav class="bottom-nav">
        <div class="nav-item active"><span>🏠</span>Home</div>
        <div class="nav-item"><span>🕒</span>Explore</div>
        <div class="mic-main" onclick="showCreateRoom()">🎙️</div>
        <div class="nav-item"><span>💬</span>Message</div>
        <div class="nav-item"><span>👤</span>Me</div>
    </nav>
</div>

<!-- POPPO STYLE CREATE ROOM OVERLAY (স্ক্রিনশট অনুযায়ী) -->
<div id="create-room-overlay">
    <div class="close-create" onclick="hideCreateRoom()">✕</div>
    <div class="create-header">
        <img id="my-preview-pic" class="host-preview-img" src="">
        <div style="flex:1">
            <input type="text" id="room-name-input" class="room-title-input" placeholder="Give your room a title...">
            <div class="tag-row">
                <div class="tag-item">Chatting</div>
                <div class="tag-item active">Singing</div>
                <div class="tag-item">Dancing</div>
                <div class="tag-item">Gaming</div>
            </div>
        </div>
    </div>

    <div style="margin-top: 40px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; opacity: 0.6;">
        <div style="height:60px; background:rgba(255,255,255,0.1); border-radius:10px;"></div>
        <div style="height:60px; background:rgba(255,255,255,0.1); border-radius:10px;"></div>
        <div style="height:60px; background:white; border-radius:10px;"></div>
        <div style="height:60px; background:rgba(255,255,255,0.1); border-radius:10px;"></div>
    </div>

    <div class="mode-toggle">
        <div class="mode-btn">Video</div>
        <div class="mode-btn active">Voice</div>
    </div>

    <button class="hold-party-btn" onclick="startParty()">Hold a party</button>
    <div style="display:flex; justify-content: center; gap: 40px; color: #aaa; font-size: 14px;">
        <span>Live</span> <span style="color:white; border-bottom: 2px solid white;">Party</span>
    </div>
</div>

<!-- PROFESSIONAL ROOM VIEW -->
<div id="room-view">
    <div class="room-header">
        <div class="host-profile">
            <img id="r-host-pic" class="host-pic" src="">
            <div class="host-meta">
                <span id="r-host-name">Host</span>
                <span id="r-room-id">ID: 0000</span>
            </div>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
            <div style="background:rgba(0,0,0,0.4); padding:4px 12px; border-radius:20px; font-size:11px;">👥 42</div>
            <div onclick="closeRoom()" style="font-size:24px; cursor:pointer;">✕</div>
        </div>
    </div>

    <div class="seat-section">
        <div class="main-seat-area">
            <script>
                for(let i=1; i<=8; i++) {
                    document.write(`
                        <div class="mic-seat">
                            <div class="seat-circle" id="seat-box-${i}">
                                <span style="font-size:18px; opacity:0.3;">🛋️</span>
                                <div class="seat-num">${i}</div>
                            </div>
                            <div class="seat-name" id="seat-user-${i}">Join</div>
                        </div>
                    `);
                }
            </script>
        </div>
    </div>

    <div class="room-footer">
        <div class="ctrl-btn">🎤</div>
        <div class="ctrl-btn">💬</div>
        <div class="gift-btn" onclick="alert('Gifting Store')">🎁</div>
        <div class="ctrl-btn">🎵</div>
        <div class="ctrl-btn">📦</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD5vRGyz3qdyqhnt2T9qmlPlTeQKV5Hlbw",
        authDomain: "pata-live.firebaseapp.com",
        databaseURL: "https://pata-live-default-rtdb.firebaseio.com/",
        projectId: "pata-live",
        storageBucket: "pata-live.firebasestorage.app",
        messagingSenderId: "644016212127",
        appId: "1:644016212127:web:214bc06f4677c8188e7aaa"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    function gLogin() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch(e => alert(e.message));
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-shell').style.display = 'flex';
            document.getElementById('my-preview-pic').src = user.photoURL;
            loadRooms();
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('app-shell').style.display = 'none';
        }
    });

    function loadRooms() {
        db.ref('live_rooms').on('value', snap => {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            const data = snap.val();
            if(data) {
                Object.keys(data).forEach(k => {
                    const r = data[k];
                    grid.innerHTML += `
                        <div class="live-card" onclick="joinRoom('${k}')">
                            <img src="${r.hostAvatar}">
                            <div class="live-badge">LIVE</div>
                            <div class="card-info">
                                <div style="font-weight:700; font-size:13px;">${r.name}</div>
                                <div style="font-size:10px; color:#ccc;">${r.hostName}</div>
                            </div>
                        </div>`;
                });
            }
        });
    }

    function showCreateRoom() { document.getElementById('create-room-overlay').style.display = 'flex'; }
    function hideCreateRoom() { document.getElementById('create-room-overlay').style.display = 'none'; }

    function startParty() {
        const name = document.getElementById('room-name-input').value || "My Party Room";
        const rid = Math.floor(1000 + Math.random() * 9000);
        const user = auth.currentUser;
        db.ref('live_rooms/'+rid).set({
            name: name, hostName: user.displayName, hostAvatar: user.photoURL, id: rid
        });
        hideCreateRoom();
        joinRoom(rid);
    }

    function joinRoom(id) {
        db.ref('live_rooms/'+id).once('value', snap => {
            const r = snap.val();
            document.getElementById('room-view').style.display = 'flex';
            document.getElementById('r-host-pic').src = r.hostAvatar;
            document.getElementById('r-host-name').innerText = r.hostName;
            document.getElementById('r-room-id').innerText = "ID: " + id;
            
            const box = document.getElementById('seat-box-1');
            box.classList.add('active');
            box.innerHTML = `<img src="${r.hostAvatar}"><div class="seat-num">1</div>`;
            document.getElementById('seat-user-1').innerText = r.hostName;
        });
    }

    function closeRoom() {
        document.getElementById('room-view').style.display = 'none';
        for(let i=1; i<=8; i++) {
            const box = document.getElementById('seat-box-' + i);
            box.classList.remove('active');
            box.innerHTML = `<span style="font-size:18px; opacity:0.3;">🛋️</span><div class="seat-num">${i}</div>`;
            document.getElementById('seat-user-' + i).innerText = "Join";
        }
    }
</script>

</body>
</html>
