<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pata Live - Original Master Pro</title>
    
    <!-- Firebase & SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF2D55;
            --secondary: #8E24AA;
            --bg: #0b0118;
            --card-bg: #1e1e30;
            --text-gray: #b0b0b0;
            --gold: #FFD700;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }

        .app-shell { display: flex; flex-direction: column; min-height: 100vh; }

        /* Auth UI Extension */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; }
        .auth-box { width: 100%; max-width: 350px; }
        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .country-code { width: 70px; background: #1a1a2e; border: 1px solid #333; border-radius: 12px; color: white; text-align: center; height: 50px; }
        .auth-input { flex: 1; height: 50px; background: #1a1a2e; border: 1px solid #333; border-radius: 12px; padding: 0 15px; color: white; outline: none; }
        .social-btn { width: 100%; height: 50px; border-radius: 25px; border: 1px solid #444; background: transparent; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; font-weight: 500; }

        .top-bar { 
            height: 60px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 15px; background: var(--bg); position: sticky; top: 0; z-index: 1000; 
        }
        .header-tabs-container { flex: 1; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .header-tabs { display: flex; gap: 20px; align-items: center; }
        .h-tab { font-size: 14px; color: var(--text-gray); font-weight: 600; cursor: pointer; padding: 8px 0; position: relative; }
        .h-tab.active { color: white; font-size: 16px; }
        .h-tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: var(--primary); border-radius: 10px; }

        .banner-section { padding: 10px 15px; }
        .banner-container { width: 100%; height: 140px; border-radius: 15px; overflow: hidden; }
        .banner-track { display: flex; width: 300%; height: 100%; transition: 0.5s; }
        .banner-track img { width: 33.33%; height: 100%; object-fit: cover; }

        .screen-container { flex: 1; padding: 12px; padding-bottom: 100px; }
        .feed-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .live-card { aspect-ratio: 1/1.25; border-radius: 20px; overflow: hidden; position: relative; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); }
        .live-card img { width: 100%; height: 100%; object-fit: cover; }
        .live-tag { position: absolute; top: 10px; left: 10px; background: var(--primary); font-size: 9px; font-weight: 800; padding: 3px 8px; border-radius: 20px; z-index: 5; }
        .card-footer { position: absolute; bottom: 0; width: 100%; padding: 12px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); }

        .bottom-nav-pro { 
            position: fixed; bottom: 0; width: 100%; height: 80px; 
            background: rgba(15, 2, 31, 0.98); backdrop-filter: blur(20px); 
            display: flex; align-items: center; justify-content: space-evenly; 
            border-top: 1px solid rgba(255, 255, 255, 0.1); z-index: 2000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-gray); font-size: 10px; cursor: pointer; min-width: 50px; }
        .nav-item.active { color: var(--primary); }
        .nav-item span { font-size: 24px; margin-bottom: 4px; }
        
        .nav-mic-btn { 
            width: 65px; height: 65px; background: linear-gradient(45deg, var(--secondary), var(--primary)); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 30px; color: white; position: relative; top: -25px; 
            border: 4px solid var(--bg); box-shadow: 0 8px 25px rgba(255, 45, 85, 0.5); 
            cursor: pointer; z-index: 2001;
        }

        /* Room Overlay UI */
        #room-overlay { position: fixed; inset: 0; background: linear-gradient(to bottom, #1e0836, #0b0118); z-index: 6000; display: none; flex-direction: column; }
        .room-header { padding: 20px 15px; display: flex; justify-content: space-between; align-items: center; }
        .host-pill { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.4); padding: 5px 12px 5px 5px; border-radius: 25px; }
        .host-pill img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--gold); }
        .seats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 20px; justify-items: center; }
        .seat { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .seat-circle { width: 75px; height: 75px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 2px dashed #444; display: flex; align-items: center; justify-content: center; position: relative; }
        .seat-circle.occupied { border: 2px solid var(--gold); border-style: solid; }
        .seat-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .seat-name { font-size: 11px; color: #ccc; max-width: 75px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .room-footer { height: 70px; display: flex; justify-content: space-around; align-items: center; background: rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<!-- Auth View -->
<div id="auth-screen">
    <div class="auth-box">
        <h1 style="text-align:center; font-weight:900; margin-bottom:30px; font-size:32px;">Pata Live</h1>
        <div class="input-row">
            <input type="text" class="country-code" value="+880">
            <input type="number" id="phone" class="auth-input" placeholder="Phone Number">
        </div>
        <input type="password" id="pass" class="auth-input" placeholder="Password" style="width:100%; margin-bottom:15px;">
        <button class="social-btn" style="background:var(--primary); border:none; font-weight:bold;" onclick="performLogin()">Login</button>
        
        <div style="text-align:center; margin:20px 0; color:#666;">Or</div>
        
        <button class="social-btn" onclick="performLogin()"><span>G</span> Continue with Google</button>
        <button class="social-btn" onclick="performLogin()"><span>f</span> Continue with Facebook</button>
    </div>
</div>

<div class="app-shell" id="app-content" style="display:none;">
    <div class="top-bar">
        <div class="header-tabs-container">
            <div class="header-tabs">
                <div class="h-tab" onclick="setTab(this)">Follow</div>
                <div class="h-tab active" onclick="setTab(this)">Popular</div>
                <div class="h-tab" onclick="setTab(this)">New</div>
                <div class="h-tab" onclick="setTab(this)">Explore</div>
                <div class="h-tab" onclick="setTab(this)">Global</div>
            </div>
        </div>
        <div style="display:flex; gap:15px; font-size:20px; padding-left:10px; align-items:center;">
            <span onclick="alert('Ranking Board')">🏆</span>
            <span onclick="alert('Search')">🔍</span>
        </div>
    </div>

    <div class="banner-section">
        <div class="banner-container">
            <div class="banner-track" id="bTrack">
                <img src="https://picsum.photos/seed/s1/800/400">
                <img src="https://picsum.photos/seed/s2/800/400">
                <img src="https://picsum.photos/seed/s3/800/400">
            </div>
        </div>
    </div>

    <div class="screen-container">
        <div class="feed-grid" id="gridPopular"></div>
    </div>

    <nav class="bottom-nav-pro">
        <div class="nav-item active"><span>🏠</span>Home</div>
        <div class="nav-item"><span>🕒</span>History</div>
        <div class="nav-mic-btn" onclick="startLive()">🎙️</div>
        <div class="nav-item"><span>💬</span>Message</div>
        <div class="nav-item" onclick="editProfile()"><span>👤</span>Me</div>
    </nav>
</div>

<!-- Professional Room UI -->
<div id="room-overlay">
    <div class="room-header">
        <div class="host-pill">
            <img id="hImg" src="https://i.pravatar.cc/100">
            <div>
                <div id="rName" style="font-size: 13px; font-weight: 700;">Party Room</div>
                <div id="rId" style="font-size: 10px; color: var(--gold);">ID: 000000</div>
            </div>
        </div>
        <div onclick="exitRoom()" style="font-size: 24px; padding: 5px;">✕</div>
    </div>
    
    <div class="seats-grid" id="seats">
        <!-- 3x3 Grid Logic -->
        <script>
            for(let i=1; i<=9; i++){
                document.write(`
                    <div class="seat" onclick="occupySeat(${i})">
                        <div class="seat-circle" id="s-circ-${i}">
                            <span style="font-size:24px; opacity:0.1;">👤</span>
                        </div>
                        <div class="seat-name" id="s-name-${i}">Seat ${i}</div>
                    </div>
                `);
            }
        </script>
    </div>

    <div id="chat-box" style="flex:1; padding:15px; overflow-y:auto; font-size:13px; color:#bbb;">
        <div style="color:var(--gold);">Welcome to Pata Live Room! Enjoy your time.</div>
    </div>

    <div class="room-footer">
        <div style="font-size:24px;">🎙️</div>
        <div style="font-size:24px;" onclick="sendComment()">💬</div>
        <div style="font-size:40px; background:var(--primary); width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center;" onclick="alert('Gift Panel')">🎁</div>
        <div style="font-size:24px;">⚙️</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD5vRGyz3qdyqhnt2T9qmlPlTeQKV5Hlbw",
        authDomain: "pata-live.firebaseapp.com",
        databaseURL: "https://pata-live-default-rtdb.firebaseio.com/",
        projectId: "pata-live",
        storageBucket: "pata-live.firebasestorage.app",
        messagingSenderId: "644016212127",
        appId: "1:644016212127:web:214bc06f4677c8188e7aaa"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    let user = { id: "12345", name: "MD:Ayan", avatar: "https://i.pravatar.cc/150?u=12345" };
    let currentRoom = null;

    // --- Tab Handling ---
    function setTab(el) {
        document.querySelectorAll('.h-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }

    // --- Auth Logic ---
    function performLogin() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'flex';
        initFeed();
    }

    // --- Profile Handling ---
    function editProfile() {
        const n = prompt("আপনার নতুন নাম লিখুন:", user.name);
        if(n) {
            user.name = n;
            alert("নাম আপডেট হয়েছে!");
        }
    }

    // --- Feed Sync ---
    function initFeed() {
        database.ref('live_rooms').on('value', (snap) => {
            const grid = document.getElementById('gridPopular');
            if(!grid) return;
            grid.innerHTML = '';
            const data = snap.val();
            if(data){
                Object.keys(data).forEach(key => {
                    const room = data[key];
                    grid.innerHTML += `
                        <div class="live-card" onclick="joinRoom('${key}')">
                            <img src="https://picsum.photos/seed/${key}/400/500">
                            <div class="live-tag">LIVE</div>
                            <div class="card-footer">
                                <div style="font-weight:700;">${room.name}</div>
                                <div style="font-size:10px; color:#bbb;">Host: ${room.host}</div>
                            </div>
                        </div>`;
                });
            }
        });
    }

    // --- Audio Room Logic ---
    async function startLive() {
        const name = prompt("রুমের নাম:");
        if(name) {
            const rid = "R" + Math.floor(Math.random() * 900000);
            await database.ref('live_rooms/' + rid).set({
                name: name,
                host: user.name,
                hostId: user.id,
                seats: { 1: { name: user.name, avatar: user.avatar } }
            });
            joinRoom(rid);
        }
    }

    function joinRoom(id) {
        currentRoom = id;
        document.getElementById('room-overlay').style.display = 'flex';
        database.ref('live_rooms/' + id).on('value', snap => {
            const data = snap.val();
            if(!data) return;
            document.getElementById('rName').innerText = data.name;
            document.getElementById('rId').innerText = "ID: " + id;
            
            for(let i=1; i<=9; i++){
                const seat = data.seats ? data.seats[i] : null;
                const circ = document.getElementById('s-circ-'+i);
                const name = document.getElementById('s-name-'+i);
                if(seat){
                    circ.innerHTML = `<img src="${seat.avatar}">`;
                    circ.classList.add('occupied');
                    name.innerText = seat.name;
                } else {
                    circ.innerHTML = `<span style="font-size:24px; opacity:0.1;">👤</span>`;
                    circ.classList.remove('occupied');
                    name.innerText = "Empty";
                }
            }
        });
    }

    function occupySeat(num) {
        if(!currentRoom) return;
        database.ref(`live_rooms/${currentRoom}/seats/${num}`).set({
            name: user.name,
            avatar: user.avatar
        });
    }

    function sendComment() {
        const msg = prompt("আপনার বার্তা লিখুন:");
        if(msg) {
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div><b>${user.name}:</b> ${msg}</div>`;
            box.scrollTop = box.scrollHeight;
        }
    }

    function exitRoom() {
        if(currentRoom) database.ref('live_rooms/' + currentRoom).off();
        document.getElementById('room-overlay').style.display = 'none';
        currentRoom = null;
    }

    // --- Banner Animation ---
    let step = 0;
    setInterval(() => {
        step = (step + 1) % 3;
        const track = document.getElementById('bTrack');
        if(track) track.style.transform = `translateX(-${step * 33.33}%)`;
    }, 3000);
</script>

</body>
</html>
