<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pata Live - Original Master Voice</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- ZegoCloud Voice SDK -->
    <script src="https://unpkg.com/zego-express-engine-webrtc@3.0.0/ZegoExpressWeb-3.0.0.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF2D55;
            --secondary: #8E24AA;
            --bg: #0b0118;
            --card-bg: #1e1e30;
            --text-gray: #b0b0b0;
            --gold: #FFD700;
            --glass: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: white; 
            overflow-x: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* Header Style */
        .top-bar { 
            height: 60px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 15px; 
            background: var(--bg); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }
        .tabs-wrapper { 
            flex: 1; 
            overflow-x: auto; 
            white-space: nowrap; 
            scrollbar-width: none; 
        }
        .tabs-wrapper::-webkit-scrollbar { display: none; }
        .tabs { display: flex; gap: 20px; align-items: center; }
        .tab-item { 
            font-size: 14px; 
            color: var(--text-gray); 
            font-weight: 600; 
            cursor: pointer; 
            padding: 10px 0; 
        }
        .tab-item.active { 
            color: white; 
            font-size: 16px; 
            border-bottom: 3px solid var(--primary); 
        }

        .header-actions { display: flex; gap: 18px; font-size: 20px; align-items: center; }

        /* Feed Grid Fixed */
        .main-content { 
            padding: 10px; 
            padding-bottom: 100px; 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
            width: 100%;
        }
        .room-card { 
            border-radius: 15px; 
            overflow: hidden; 
            position: relative; 
            background: var(--card-bg); 
            height: 200px;
        }
        .room-card img { width: 100%; height: 100%; object-fit: cover; }
        .card-details { 
            position: absolute; 
            bottom: 0; 
            width: 100%; 
            padding: 8px; 
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); 
        }
        .live-tag { 
            position: absolute; 
            top: 8px; 
            left: 8px; 
            background: var(--primary); 
            font-size: 8px; 
            font-weight: 900; 
            padding: 2px 6px; 
            border-radius: 10px; 
        }

        /* Overlays - Original Design */
        .full-screen-overlay { 
            position: fixed; 
            inset: 0; 
            background: var(--bg); 
            z-index: 8000; 
            display: none; 
            flex-direction: column; 
        }
        .glass-top { 
            height: 60px; 
            display: flex; 
            align-items: center; 
            padding: 0 15px; 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }
        
        .back-arrow { 
            cursor: pointer; 
            margin-right: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 35px; 
            height: 35px; 
        }
        .back-arrow svg { width: 22px; height: 22px; fill: none; stroke: white; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

        /* Ranking */
        .rank-top { 
            display: flex; 
            align-items: flex-end; 
            justify-content: center; 
            gap: 15px; 
            padding: 30px 10px; 
            background: linear-gradient(180deg, #2a0a45, var(--bg)); 
        }
        .user-podium { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .podium-avatar { border-radius: 50%; border: 2px solid #444; width: 65px; height: 65px; object-fit: cover; }
        .rank-gold .podium-avatar { width: 85px; height: 85px; border-color: var(--gold); }

        /* Bottom Nav Fixed */
        .nav-bar { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            height: 70px; 
            background: rgba(15, 2, 31, 0.95); 
            display: flex; 
            align-items: center; 
            justify-content: space-around; 
            border-top: 1px solid rgba(255,255,255,0.05); 
            z-index: 2000; 
        }
        .nav-link { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: var(--text-gray); cursor: pointer; }
        .nav-link img { width: 20px; height: 20px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); margin-bottom: 2px; }
        .mic-btn { 
            width: 55px; 
            height: 55px; 
            background: linear-gradient(45deg, var(--secondary), var(--primary)); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 24px; 
            margin-top: -25px; 
            border: 4px solid var(--bg); 
            box-shadow: 0 5px 15px rgba(255, 45, 85, 0.3);
        }

        /* Room Interior Fixed */
        #room-view { position: fixed; inset: 0; background: linear-gradient(180deg, #1e0836, #0b0118); z-index: 9000; display: none; flex-direction: column; }
        .grid-seats { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
            padding: 30px 15px; 
            justify-items: center;
        }
        .seat-unit { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .seat-orb { 
            width: 65px; 
            height: 65px; 
            border-radius: 50%; 
            background: rgba(255,255,255,0.05); 
            border: 1.5px dashed rgba(255,255,255,0.2); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }
        .seat-orb.active { border: 2px solid var(--gold); border-style: solid; }
        .seat-orb img { width: 100%; height: 100%; object-fit: cover; }
        .speaking { border-color: var(--primary) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(255, 45, 85, 0.4); } 100% { box-shadow: 0 0 0 10px rgba(255, 45, 85, 0); } }
    </style>
</head>
<body>

<div id="main-app-ui">
    <div class="top-bar">
        <div class="tabs-wrapper">
            <div class="tabs">
                <div class="tab-item" onclick="changeFeedTab(this)">Follow</div>
                <div class="tab-item active" onclick="changeFeedTab(this)">Popular</div>
                <div class="tab-item" onclick="changeFeedTab(this)">New</div>
                <div class="tab-item" onclick="changeFeedTab(this)">Explore</div>
                <div class="tab-item" onclick="toggleGlassOverlay('global-panel', true)">Global</div>
            </div>
        </div>
        <div class="header-actions">
            <span onclick="toggleGlassOverlay('rank-panel', true)">🏆</span>
            <span onclick="toggleGlassOverlay('search-panel', true)">🔍</span>
        </div>
    </div>

    <div class="main-content" id="audioGrid"></div>

    <div class="nav-bar">
        <div class="nav-link"><span>🏠</span>Home</div>
        <div class="nav-link"><span>🕒</span>History</div>
        <div class="mic-btn" onclick="joinAudioRoom('Party Hub')">🎙️</div>
        <div class="nav-link"><span>💬</span>Chat</div>
        <div class="nav-link" onclick="handleProfileEdit()">
            <img src="https://i.pravatar.cc/100?u=guest" id="nav-user-avatar">
            <span id="nav-user-label">Me</span>
        </div>
    </div>
</div>

<!-- All Overlays with Original Design -->
<div id="rank-panel" class="full-screen-overlay">
    <div class="glass-top">
        <div class="back-arrow" onclick="toggleGlassOverlay('rank-panel', false)"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
        <span style="font-weight:700;">Daily Ranking</span>
    </div>
    <div id="extendedRankList" style="flex:1; overflow-y:auto;"></div>
</div>

<div id="search-panel" class="full-screen-overlay">
    <div class="glass-top">
        <div class="back-arrow" onclick="toggleGlassOverlay('search-panel', false)"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
        <input type="text" id="queryInput" placeholder="Search ID" style="flex:1; background:transparent; border:none; color:white; outline:none; font-size:16px;" oninput="executeSearch()">
    </div>
    <div id="searchResults" style="padding:20px;"></div>
</div>

<div id="global-panel" class="full-screen-overlay">
    <div class="glass-top">
        <div class="back-arrow" onclick="toggleGlassOverlay('global-panel', false)"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
        <span style="font-weight:700;">Global Regions</span>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:15px;">
        <div style="background:var(--card-bg); padding:15px; border-radius:10px; text-align:center;">🇧🇩 BD</div>
        <div style="background:var(--card-bg); padding:15px; border-radius:10px; text-align:center;">🇮🇳 India</div>
    </div>
</div>

<!-- Audio Room View -->
<div id="room-view">
    <div style="padding:15px; display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.3);">
        <div style="display:flex; align-items:center; gap:10px;">
            <div style="background:var(--primary); width:35px; height:35px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:12px;">P</div>
            <div>
                <div id="currentRoomName" style="font-weight:700; font-size:14px;">Room</div>
                <div style="font-size:10px; color:var(--gold);" id="room-pata-id">ID: 000000</div>
            </div>
        </div>
        <div onclick="leaveRoom()" style="font-size:22px; padding:5px;">✕</div>
    </div>
    <div class="grid-seats">
        <script>
            for(let i=1; i<=9; i++) {
                document.write(`
                    <div class="seat-unit" onclick="toggleSeat(${i})">
                        <div class="seat-orb" id="orb-${i}">👤</div>
                        <div style="font-size:10px; color:#666;" id="user-${i}">Empty</div>
                    </div>
                `);
            }
        </script>
    </div>
    <div style="margin-top:auto; padding-bottom:40px; display:flex; justify-content:center;">
        <div id="mic-toggle" style="width:55px; height:55px; background:rgba(255,255,255,0.1); border-radius:50%; display:none; align-items:center; justify-content:center; font-size:20px;" onclick="toggleMic()">🎙️</div>
    </div>
</div>

<script>
    /* FINAL MASTER AUTH PROFESSIONAL CONFIG
       (DO NOT ALTER DATES OR IDS)
    */
    const ZEGO_ID = 1958175668;
    const ZEGO_SIGN = '755b86b05e1eb51001015cbbaa994ba53bec16b9f29dc9eaa8583eda083bf59a';
    
    const firebaseConfig = JSON.parse(__firebase_config);
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'pata-live-master';

    let zego = null, activeUser = null, micOn = false, curRoom = null, seatIdx = null;

    window.onload = () => { refreshFeed(); initUser(); };

    async function initUser() {
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const doc = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('profile').doc('info');
                doc.onSnapshot((s) => {
                    if (s.exists) {
                        activeUser = s.data(); activeUser.uid = user.uid;
                        document.getElementById('nav-user-avatar').src = activeUser.avatar;
                        document.getElementById('nav-user-label').innerText = activeUser.name;
                        document.getElementById('room-pata-id').innerText = "ID: " + activeUser.pataId;
                    } else {
                        doc.set({
                            name: "Guest_" + user.uid.slice(0,4),
                            pataId: Math.floor(100000 + Math.random() * 900000).toString(),
                            avatar: `https://i.pravatar.cc/100?u=${user.uid}`,
                            level: 1
                        });
                    }
                });
            } else { auth.signInAnonymously(); }
        });
    }

    async function handleProfileEdit() {
        const n = prompt("নাম পরিবর্তন করুন:", activeUser.name);
        if(n) await db.collection('artifacts').doc(appId).collection('users').doc(activeUser.uid).collection('profile').doc('info').update({name: n});
    }

    /* Voice Logic */
    async function joinAudioRoom(name) {
        document.getElementById('room-view').style.display = 'flex';
        document.getElementById('currentRoomName').innerText = name;
        curRoom = "room_" + name.replace(/\s/g, '');
        if(!zego) zego = new ZegoExpressEngine(ZEGO_ID, ZEGO_SIGN);
        
        zego.on('roomStreamUpdate', async (id, type, streams) => {
            if (type === 'ADD') { for (const s of streams) await zego.startPlayingStream(s.streamID); }
        });

        try { await zego.loginRoom(curRoom, activeUser.uid, { userName: activeUser.name }); } catch(e) {}
    }

    async function leaveRoom() {
        if(micOn) await toggleMic();
        if(seatIdx) toggleSeat(seatIdx);
        await zego.logoutRoom(curRoom);
        document.getElementById('room-view').style.display = 'none';
        curRoom = null;
    }

    function toggleSeat(i) {
        const orb = document.getElementById(`orb-${i}`), name = document.getElementById(`user-${i}`);
        if (seatIdx === i) {
            orb.innerHTML = '👤'; orb.classList.remove('active'); name.innerText = 'Empty';
            name.style.color = '#666'; seatIdx = null;
            document.getElementById('mic-toggle').style.display = 'none';
            if(micOn) toggleMic();
        } else if (!seatIdx) {
            orb.innerHTML = `<img src="${activeUser.avatar}">`;
            orb.classList.add('active'); name.innerText = activeUser.name;
            name.style.color = 'white'; seatIdx = i;
            document.getElementById('mic-toggle').style.display = 'flex';
        }
    }

    async function toggleMic() {
        if (!zego || !seatIdx) return;
        const btn = document.getElementById('mic-toggle'), orb = document.getElementById(`orb-${seatIdx}`);
        if (!micOn) {
            const sid = `stream_${activeUser.uid}`;
            const s = await zego.createStream({ camera: { audio: true, video: false } });
            zego.startPublishingStream(sid, s);
            btn.style.background = 'var(--primary)'; orb.classList.add('speaking');
            micOn = true;
        } else {
            zego.stopPublishingStream(`stream_${activeUser.uid}`);
            btn.style.background = 'rgba(255,255,255,0.1)'; orb.classList.remove('speaking');
            micOn = false;
        }
    }

    /* UI Fixes */
    function refreshFeed() {
        const g = document.getElementById('audioGrid'); g.innerHTML = '';
        for(let i=1; i<=16; i++) {
            g.innerHTML += `
                <div class="room-card" onclick="joinAudioRoom('Premium Room ${i}')">
                    <img src="https://picsum.photos/seed/${i+100}/300/400">
                    <div class="live-tag">LIVE</div>
                    <div class="card-details">
                        <div style="font-weight:700; font-size:12px;">Pata Room ${i}</div>
                        <div style="font-size:9px; color:#ccc;">ID: 200${i} | 152 Online</div>
                    </div>
                </div>`;
        }
    }

    function toggleGlassOverlay(id, s) { 
        document.getElementById(id).style.display = s ? 'flex' : 'none'; 
        if(id === 'rank-panel' && s) {
            let l = document.getElementById('extendedRankList'), h = '';
            for(let i=1; i<=10; i++) h += `<div style="display:flex; align-items:center; padding:15px; border-bottom:1px solid #1a1a2e;"><span style="width:25px;">${i}</span><img src="https://i.pravatar.cc/100?u=r${i}" style="width:35px; border-radius:50%; margin-right:10px;"><span>User_${i}</span></div>`;
            l.innerHTML = h;
        }
    }

    function changeFeedTab(el) {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active'); refreshFeed();
    }
</script>
</body>
</html>
