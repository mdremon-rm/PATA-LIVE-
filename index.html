<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pata Live - অরিজিনাল মাস্টার কোড</title>
    
    <!-- PWA এবং মোবাইল অ্যাপ সাপোর্ট -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0b0118">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Pata%20Live%22,%22short_name%22:%22Pata%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#0b0118%22,%22theme_color%22:%22#FF2D55%22}">

    <!-- প্রয়োজনীয় SDK সমূহ (Firebase & Zego) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/zego-express-engine-webrtc@3.0.0/ZegoExpressWeb-3.0.0.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF2D55;
            --secondary: #8E24AA;
            --bg: #0b0118;
            --card-bg: #1e1e30;
            --glass: rgba(255, 255, 255, 0.08);
            --gold: #FFD700;
            --text-gray: #b0b0b0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; overflow-x: hidden; height: 100vh; }

        /* --- অরিজিনাল টপ বার --- */
        .top-bar { height: 65px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: var(--bg); position: sticky; top: 0; z-index: 1000; }
        .tabs-wrapper { flex: 1; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .tabs { display: flex; gap: 20px; align-items: center; }
        .tab-item { font-size: 14px; color: var(--text-gray); font-weight: 600; cursor: pointer; padding: 10px 0; }
        .tab-item.active { color: white; font-size: 16px; border-bottom: 3px solid var(--primary); }
        .header-actions { display: flex; gap: 18px; font-size: 22px; margin-left: 15px; align-items: center; }

        /* --- অরিজিনাল রুম গ্রিড --- */
        .main-feed { padding: 12px; padding-bottom: 110px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .room-card { aspect-ratio: 1/1.2; border-radius: 18px; overflow: hidden; position: relative; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.06); }
        .room-card img { width: 100%; height: 100%; object-fit: cover; }
        .live-tag { position: absolute; top: 10px; left: 10px; background: var(--primary); font-size: 9px; font-weight: 900; padding: 3px 8px; border-radius: 10px; }
        .card-details { position: absolute; bottom: 0; width: 100%; padding: 10px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); }

        /* --- গ্লাস ইফেক্ট ওভারলে এবং প্রফেশনাল ব্যাক অ্যারো --- */
        .overlay-screen { position: fixed; inset: 0; background: var(--bg); z-index: 8000; display: none; flex-direction: column; }
        .glass-header { height: 65px; display: flex; align-items: center; padding: 0 15px; background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        /* আপনার সেই প্রফেশনাল ব্যাক অ্যারো */
        .back-arrow-btn { cursor: pointer; margin-right: 15px; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; }
        .back-arrow-btn svg { width: 26px; height: 26px; fill: none; stroke: white; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

        /* --- বটম নেভিগেশন --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: rgba(15, 2, 31, 0.98); display: flex; align-items: center; justify-content: space-evenly; border-top: 1px solid rgba(255,255,255,0.05); z-index: 2000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: var(--text-gray); }
        .nav-item img { width: 24px; height: 24px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); }
        .mic-main-btn { width: 62px; height: 62px; background: linear-gradient(45deg, var(--secondary), var(--primary)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; position: relative; top: -18px; border: 4px solid var(--bg); box-shadow: 0 8px 25px rgba(255, 45, 85, 0.4); }

        /* --- অরিজিনাল অডিও রুম ইন্টারিয়র --- */
        #room-view-overlay { position: fixed; inset: 0; background: linear-gradient(180deg, #1e0836, #0b0118); z-index: 9000; display: none; flex-direction: column; }
        .room-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); }
        .grid-seats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 40px 20px; }
        .seat-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .seat-circle { width: 75px; height: 75px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 2px dashed rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .seat-circle.active { border: 2.5px solid var(--gold); border-style: solid; }
        .speaking-glow { border-color: var(--primary) !important; animation: micPulse 1s infinite; }
        @keyframes micPulse { 0% { box-shadow: 0 0 0 0px rgba(255, 45, 85, 0.4); } 100% { box-shadow: 0 0 0 12px rgba(255, 45, 85, 0); } }

        .room-controls { margin-top: auto; padding-bottom: 80px; display: flex; justify-content: center; }
        .mic-toggle { width: 65px; height: 65px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; }
        .mic-active { background: var(--primary); box-shadow: 0 0 20px var(--primary); }
    </style>
</head>
<body>

<div id="app-main-ui">
    <!-- অরিজিনাল টপ ট্যাব -->
    <div class="top-bar">
        <div class="tabs-wrapper">
            <div class="tabs">
                <div class="tab-item active" onclick="switchTab(this)">Popular</div>
                <div class="tab-item" onclick="switchTab(this)">New</div>
                <div class="tab-item" onclick="openOverlay('global-panel')">Global</div>
                <div class="tab-item" onclick="switchTab(this)">Follow</div>
            </div>
        </div>
        <div class="header-actions">
            <span onclick="openOverlay('rank-panel')">🏆</span>
            <span onclick="openOverlay('search-panel')">🔍</span>
        </div>
    </div>

    <!-- অরিজিনাল রুম ফিড -->
    <div class="main-feed" id="roomContainer"></div>

    <!-- অরিজিনাল বটম নেভিগেশন -->
    <div class="bottom-nav">
        <div class="nav-item" onclick="location.reload()">🏠<span>Home</span></div>
        <div class="nav-item">🕒<span>History</span></div>
        <div class="mic-main-btn" onclick="joinAudioRoom('Main Lounge')">🎙️</div>
        <div class="nav-item">💬<span>Message</span></div>
        <div class="nav-item" id="profile-btn">
            <img src="https://i.pravatar.cc/100?u=pata" id="my-thumb">
            <span>Me</span>
        </div>
    </div>
</div>

<!-- Ranking Screen (Glass UI & Pro Arrow) -->
<div id="rank-panel" class="overlay-screen">
    <div class="glass-header">
        <div class="back-arrow-btn" onclick="closeOverlay('rank-panel')">
            <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </div>
        <span style="font-weight:700;">Daily Ranking</span>
    </div>
    <div style="flex:1; padding:20px; text-align:center; color:var(--gold);">লিডারবোর্ড লোড হচ্ছে...</div>
</div>

<!-- Search Screen (Glass UI & Pro Arrow) -->
<div id="search-panel" class="overlay-screen">
    <div class="glass-header">
        <div class="back-arrow-btn" onclick="closeOverlay('search-panel')">
            <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </div>
        <input type="text" placeholder="ID বা রুমের নাম লিখুন..." style="flex:1; background:transparent; border:none; color:white; outline:none; font-size:16px;">
    </div>
</div>

<!-- Global Panel -->
<div id="global-panel" class="overlay-screen">
    <div class="glass-header">
        <div class="back-arrow-btn" onclick="closeOverlay('global-panel')">
            <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </div>
        <span style="font-weight:700;">Global Regions</span>
    </div>
</div>

<!-- অডিও রুম ইন্টারিয়র (অরিজিনাল ডিজাইন) -->
<div id="room-view-overlay">
    <div class="room-header">
        <div style="display:flex; align-items:center; gap:12px;">
            <div style="background:var(--primary); width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900;">P</div>
            <div>
                <div id="activeRoomName" style="font-weight:800; font-size:15px;">Party Room</div>
                <div style="font-size:10px; color:var(--gold);" id="pata-id-text">ID: Loading...</div>
            </div>
        </div>
        <div onclick="leaveAudioRoom()" style="font-size:26px; cursor:pointer; padding:5px;">✕</div>
    </div>
    <div class="grid-seats">
        <script>
            for(let i=1; i<=9; i++) {
                document.write(`
                    <div class="seat-item" onclick="takeSeat(${i})">
                        <div class="seat-circle" id="seat-orb-${i}">👤</div>
                        <div style="font-size:11px; color:#555;" id="seat-name-${i}">Empty</div>
                    </div>
                `);
            }
        </script>
    </div>
    <div class="room-controls">
        <div id="room-mic-btn" class="mic-toggle" onclick="toggleMicStatus()">🎙️</div>
    </div>
</div>

<script>
    // --- আপনার ZegoCloud ক্রেডেনশিয়াল ---
    const APP_ID = 1958175668; 
    const APP_SIGN = '755b86b05e1eb51001015cbbaa994ba53bec16b9f29dc9eaa8583eda083bf59a';
    
    let db, auth, zg = null;
    let user = { name: "Guest User", avatar: "https://i.pravatar.cc/100?u=pata", uid: null };
    let currentSeat = null, micOn = false;

    // Firebase Initialization
    window.onload = () => {
        initRoomFeed();
        try {
            const firebaseConfig = JSON.parse(__firebase_config);
            firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore();
            setupAuth();
        } catch(e) { console.warn("Firebase not connected"); }
    };

    function setupAuth() {
        auth.onAuthStateChanged(async (u) => {
            if (u) {
                user.uid = u.uid;
                const pid = u.uid.slice(0,6).toUpperCase();
                document.getElementById('pata-id-text').innerText = "ID: " + pid;
                document.getElementById('my-thumb').src = `https://i.pravatar.cc/100?u=${u.uid}`;
            } else { auth.signInAnonymously(); }
        });
    }

    // ফিড লোড করা
    function initRoomFeed() {
        const container = document.getElementById('roomContainer');
        for(let i=1; i<=12; i++) {
            container.innerHTML += `
                <div class="room-card" onclick="joinAudioRoom('Party Room ${i}')">
                    <img src="https://picsum.photos/seed/${i+300}/400/500">
                    <div class="live-tag">LIVE</div>
                    <div class="card-details">
                        <div style="font-weight:700;">পার্টি রুম ${i}</div>
                        <div style="font-size:10px; color:var(--text-gray);">ID: 1000${i}</div>
                    </div>
                </div>`;
        }
    }

    // অডিও রুম ফাংশনালিটি
    async function joinAudioRoom(roomName) {
        document.getElementById('room-view-overlay').style.display = 'flex';
        document.getElementById('activeRoomName').innerText = roomName;
        if(window.ZegoExpressEngine && !zg) {
            zg = new ZegoExpressEngine(APP_ID, APP_SIGN);
        }
    }

    function leaveAudioRoom() {
        if(currentSeat) takeSeat(currentSeat);
        document.getElementById('room-view-overlay').style.display = 'none';
    }

    function takeSeat(n) {
        const orb = document.getElementById('seat-orb-'+n);
        const label = document.getElementById('seat-name-'+n);
        if(currentSeat === n) {
            orb.innerHTML = '👤'; orb.classList.remove('active'); label.innerText = 'Empty';
            currentSeat = null; document.getElementById('room-mic-btn').style.display = 'none';
        } else if(!currentSeat) {
            orb.innerHTML = `<img src="${user.avatar}" style="width:100%; border-radius:50%;">`;
            orb.classList.add('active'); label.innerText = "Me"; label.style.color = "white";
            currentSeat = n; document.getElementById('room-mic-btn').style.display = 'flex';
        }
    }

    function toggleMicStatus() {
        micOn = !micOn;
        const btn = document.getElementById('room-mic-btn');
        const orb = document.getElementById('seat-orb-'+currentSeat);
        if(micOn) {
            btn.classList.add('mic-active'); orb.classList.add('speaking-glow');
        } else {
            btn.classList.remove('mic-active'); orb.classList.remove('speaking-glow');
        }
    }

    // UI কন্ট্রোল
    function openOverlay(id) { document.getElementById(id).style.display = 'flex'; }
    function closeOverlay(id) { document.getElementById(id).style.display = 'none'; }
    function switchTab(el) {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }
</script>
</body>
</html>
