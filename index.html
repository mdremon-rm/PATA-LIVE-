<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Earning Platform - UI Pro</title>
    <style>
        /* মূল ব্যাকগ্রাউন্ড এবং টাইপোগ্রাফি */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* গ্লাস-মর্ফিজম কন্টেইনার */
        .glass-container {
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1); /* Border Glow Effect */
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            padding: 20px;
            position: relative;
        }

        /* প্রফেশনাল ব্যাক বাটন ও হেডার */
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }

        .back-button {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 12px;
            padding: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s ease;
            margin-right: 15px;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(-3px);
        }

        .back-button svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }

        /* র‍্যাঙ্কিং বোর্ড ডিজাইন */
        .ranking-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 15px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            transition: transform 0.3s ease;
            border: 0.5px solid rgba(255, 255, 255, 0.05);
        }

        .ranking-card:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.12);
        }

        .rank-number {
            font-weight: bold;
            font-size: 1.2rem;
            margin-right: 15px;
            color: #4ade80; /* Earning Green */
        }

        /* অডিও ভিজ্যুয়ালাইজার সিমুলেশন */
        .visualizer {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 30px;
            margin-left: auto;
        }

        .bar {
            width: 3px;
            background: linear-gradient(to top, #7928CA, #FF0080);
            border-radius: 2px;
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { height: 5px; }
            50% { height: 25px; }
        }

        /* সার্চ বার */
        .search-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 12px 15px;
            width: 100%;
            box-sizing: border-box;
            color: white;
            outline: none;
            margin-bottom: 20px;
        }

    </style>
</head>
<body>

    <div class="glass-container">
        <div class="header">
            <button class="back-button">
                <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </button>
            <h2 style="margin: 0; font-size: 1.2rem;">Ranking Board</h2>
        </div>

        <input type="text" class="search-box" placeholder="Search creators...">

        <div class="ranking-card">
            <div class="rank-number">01</div>
            <div class="user-info">
                <div style="font-weight: 500;">Tanvir Ahmed</div>
                <div style="font-size: 0.8rem; color: #94a3b8;">Earned: $450.00</div>
            </div>
            <div class="visualizer">
                <div class="bar" style="animation-delay: 0.1s;"></div>
                <div class="bar" style="animation-delay: 0.3s;"></div>
                <div class="bar" style="animation-delay: 0.2s;"></div>
                <div class="bar" style="animation-delay: 0.4s;"></div>
            </div>
        </div>

        <div class="ranking-card">
            <div class="rank-number">02</div>
            <div class="user-info">
                <div style="font-weight: 500;">Rahat Kabir</div>
                <div style="font-size: 0.8rem; color: #94a3b8;">Earned: $320.50</div>
            </div>
            <div class="visualizer">
                <div class="bar" style="animation-delay: 0.5s;"></div>
                <div class="bar" style="animation-delay: 0.2s;"></div>
                <div class="bar" style="animation-delay: 0.4s;"></div>
                <div class="bar" style="animation-delay: 0.1s;"></div>
            </div>
        </div>

    </div>

</body>
</html>
