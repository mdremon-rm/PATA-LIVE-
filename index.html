<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pata Live - Original Master Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF2D55;
            --secondary: #8E24AA;
            --bg: #0b0118;
            --card-bg: #1e1e30;
            --text-gray: #b0b0b0;
            --gold: #FFD700;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }

        /* Auth Overlay */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .auth-input { width: 100%; max-width: 320px; height: 50px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 0 20px; color: white; margin-bottom: 15px; outline: none; }
        .auth-btn { width: 100%; max-width: 320px; height: 50px; border-radius: 25px; border: none; background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; font-weight: 700; cursor: pointer; }

        .app-shell { display: flex; flex-direction: column; min-height: 100vh; }

        .top-bar { 
            height: 60px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 15px; background: var(--bg); position: sticky; top: 0; z-index: 1000; 
        }
        .header-tabs-container { flex: 1; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .header-tabs { display: flex; gap: 20px; align-items: center; }
        .h-tab { font-size: 15px; color: var(--text-gray); font-weight: 600; cursor: pointer; padding: 8px 0; position: relative; }
        .h-tab.active { color: white; font-size: 17px; }
        .h-tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: var(--primary); border-radius: 10px; }

        .banner-section { padding: 10px 15px; }
        .banner-container { width: 100%; height: 140px; border-radius: 15px; overflow: hidden; }
        .banner-track { display: flex; width: 300%; height: 100%; transition: 0.5s; }
        .banner-track img { width: 33.33%; height: 100%; object-fit: cover; }

        .screen-container { flex: 1; padding: 12px; padding-bottom: 100px; }
        .feed-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .live-card { aspect-ratio: 1/1.25; border-radius: 20px; overflow: hidden; position: relative; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); }
        .live-card img { width: 100%; height: 100%; object-fit: cover; }
        .live-tag { position: absolute; top: 10px; left: 10px; background: var(--primary); font-size: 9px; font-weight: 800; padding: 3px 8px; border-radius: 20px; z-index: 5; }
        .card-footer { position: absolute; bottom: 0; width: 100%; padding: 12px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); }

        .bottom-nav-pro { 
            position: fixed; bottom: 0; width: 100%; height: 80px; 
            background: rgba(15, 2, 31, 0.98); backdrop-filter: blur(20px); 
            display: flex; align-items: center; justify-content: space-evenly; 
            border-top: 1px solid rgba(255, 255, 255, 0.1); z-index: 2000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-gray); font-size: 10px; cursor: pointer; min-width: 50px; }
        .nav-item.active { color: var(--primary); }
        .nav-item span { font-size: 24px; margin-bottom: 4px; }
        
        .nav-mic-btn { 
            width: 65px; height: 65px; background: linear-gradient(45deg, var(--secondary), var(--primary)); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 30px; color: white; position: relative; top: -25px; 
            border: 4px solid var(--bg); box-shadow: 0 8px 25px rgba(255, 45, 85, 0.5); 
            cursor: pointer; z-index: 2001;
        }

        /* --- Professional Audio Room Look --- */
        #room-overlay { position: fixed; inset: 0; background: linear-gradient(to bottom, #1e0836, #0b0118); z-index: 9000; display: none; flex-direction: column; }
        .room-header { height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; margin-top: 10px; }
        .room-host-pill { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.3); padding: 5px 15px 5px 5px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .room-host-pill img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--gold); }
        
        .seats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 30px 20px; margin: 0 auto; width: 100%; max-width: 400px; }
        .seat-unit { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .seat-circle { 
            width: 75px; height: 75px; border-radius: 50%; 
            background: rgba(255,255,255,0.05); border: 1.5px dashed rgba(255,255,255,0.2); 
            display: flex; align-items: center; justify-content: center; position: relative;
            transition: 0.3s;
        }
        .seat-circle.active { border: 2.5px solid var(--gold); border-style: solid; box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }
        .seat-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .seat-index { position: absolute; bottom: -5px; background: #000; font-size: 10px; padding: 1px 7px; border-radius: 10px; border: 0.5px solid var(--gold); color: var(--gold); font-weight: bold; }
        .seat-name { font-size: 11px; color: var(--text-gray); font-weight: 500; text-align: center; width: 80px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

        .room-chat { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .chat-row { font-size: 13px; background: rgba(0,0,0,0.2); padding: 6px 12px; border-radius: 12px; width: fit-content; max-width: 85%; }
        .chat-row b { color: var(--gold); margin-right: 5px; }

        .room-footer { height: 80px; display: flex; align-items: center; justify-content: space-around; padding: 0 15px; background: rgba(0,0,0,0.3); }
        .room-action { width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .room-gift { width: 60px; height: 60px; background: linear-gradient(45deg, var(--primary), var(--secondary)); border-radius: 50%; font-size: 32px; box-shadow: 0 0 20px rgba(255,45,85,0.4); }
    </style>
</head>
<body>

<!-- Login -->
<div id="auth-overlay">
    <div style="margin-bottom:40px;">
        <h1 style="font-size:38px; font-weight:900;">Pata Live</h1>
        <p style="color:var(--text-gray);">Professional Audio Party</p>
    </div>
    <input type="email" id="email" class="auth-input" placeholder="Email Address">
    <input type="password" id="pass" class="auth-input" placeholder="Password">
    <button class="auth-btn" onclick="handleAuth()">Login / Sign Up</button>
</div>

<!-- Main App -->
<div class="app-shell" id="main-app" style="display:none;">
    <div class="top-bar">
        <div class="header-tabs-container">
            <div class="header-tabs">
                <div class="h-tab">Follow</div>
                <div class="h-tab active">Popular</div>
                <div class="h-tab">New</div>
                <div class="h-tab">Explore</div>
            </div>
        </div>
        <div style="display:flex; gap:15px; font-size:20px; padding-left:10px;">
            <span>🏆</span>
            <span onclick="editProfile()">👤</span>
        </div>
    </div>

    <div class="banner-section">
        <div class="banner-container">
            <div class="banner-track" id="bTrack">
                <img src="https://picsum.photos/seed/pata1/800/400">
                <img src="https://picsum.photos/seed/pata2/800/400">
                <img src="https://picsum.photos/seed/pata3/800/400">
            </div>
        </div>
    </div>

    <div class="screen-container">
        <div class="feed-grid" id="gridPopular"></div>
    </div>

    <nav class="bottom-nav-pro">
        <div class="nav-item active"><span>🏠</span>Home</div>
        <div class="nav-item"><span>🕒</span>History</div>
        <div class="nav-mic-btn" onclick="createRoom()">🎙️</div>
        <div class="nav-item"><span>💬</span>Message</div>
        <div class="nav-item" onclick="editProfile()"><span>👤</span>Me</div>
    </nav>
</div>

<!-- Professional Audio Room Overlay -->
<div id="room-overlay">
    <div class="room-header">
        <div class="room-host-pill">
            <img id="host-avatar" src="">
            <div>
                <div id="room-title-ui" style="font-size:12px; font-weight:800;">Party Room</div>
                <div id="room-id-ui" style="font-size:9px; color:var(--gold);">ID: 000000</div>
            </div>
        </div>
        <div style="display:flex; gap:15px; align-items:center;">
            <div style="background:rgba(255,255,255,0.1); padding:4px 12px; border-radius:20px; font-size:11px;">👥 1.5k</div>
            <div onclick="exitRoom()" style="font-size:26px; padding:5px;">✕</div>
        </div>
    </div>

    <div class="seats-grid">
        <script>
            for(let i=1; i<=9; i++) {
                document.write(`
                    <div class="seat-unit" onclick="toggleSeat(${i})">
                        <div class="seat-circle" id="seat-${i}">
                            <span style="font-size:28px; opacity:0.1;">👤</span>
                            <div class="seat-index">${i}</div>
                        </div>
                        <div class="seat-name" id="name-${i}">Empty</div>
                    </div>
                `);
            }
        </script>
    </div>

    <div class="room-chat" id="chat-box">
        <div class="chat-row"><b>System:</b> Welcome! Be respectful and have fun!</div>
    </div>

    <div class="room-footer">
        <div class="room-action" onclick="toggleMic()">🎙️</div>
        <div class="room-action" onclick="sendChat()">💬</div>
        <div class="room-gift" onclick="alert('Gifting Panel Coming Soon!')">🎁</div>
        <div class="room-action">🎵</div>
        <div class="room-action">⚙️</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD5vRGyz3qdyqhnt2T9qmlPlTeQKV5Hlbw",
        authDomain: "pata-live.firebaseapp.com",
        databaseURL: "https://pata-live-default-rtdb.firebaseio.com/",
        projectId: "pata-live",
        storageBucket: "pata-live.firebasestorage.app",
        messagingSenderId: "644016212127",
        appId: "1:644016212127:web:214bc06f4677c8188e7aaa"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    let userData = null;
    let activeRoomId = null;

    // --- Auth Logic ---
    async function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        if(!email || !pass) return alert("Fill all fields");
        try {
            await auth.signInWithEmailAndPassword(email, pass);
        } catch (e) {
            if(e.code === 'auth/user-not-found') {
                await auth.createUserWithEmailAndPassword(email, pass);
            } else alert(e.message);
        }
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            database.ref('users/' + user.uid).on('value', snap => {
                if(!snap.exists()){
                    const initData = { name: "User_" + user.uid.slice(0,4), avatar: "https://i.pravatar.cc/150?u="+user.uid, uid: user.uid };
                    database.ref('users/' + user.uid).set(initData);
                }
                userData = snap.val();
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                loadRooms();
            });
        } else {
            document.getElementById('auth-overlay').style.display = 'flex';
            document.getElementById('main-app').style.display = 'none';
        }
    });

    function loadRooms() {
        database.ref('live_rooms').on('value', snap => {
            const grid = document.getElementById('gridPopular');
            grid.innerHTML = '';
            snap.forEach(child => {
                const room = child.val();
                grid.innerHTML += `
                    <div class="live-card" onclick="joinRoom('${child.key}')">
                        <img src="${room.hostAvatar || 'https://picsum.photos/seed/'+child.key+'/400/500'}">
                        <div class="live-tag">LIVE</div>
                        <div class="card-footer">
                            <div style="font-weight:700;">${room.name}</div>
                            <div style="font-size:10px; color:#bbb;">Host: ${room.host}</div>
                        </div>
                    </div>`;
            });
        });
    }

    // --- Profile ---
    function editProfile() {
        const n = prompt("আপনার নাম দিন:", userData.name);
        if(n) database.ref('users/' + auth.currentUser.uid).update({name: n});
    }

    // --- Room Logic ---
    async function createRoom() {
        const title = prompt("রুমের টাইটেল দিন:");
        if(!title) return;
        const rid = Math.floor(100000 + Math.random() * 900000);
        await database.ref('live_rooms/' + rid).set({
            name: title,
            host: userData.name,
            hostAvatar: userData.avatar,
            hostUid: userData.uid,
            seats: { 1: { uid: userData.uid, name: userData.name, avatar: userData.avatar } }
        });
        joinRoom(rid);
    }

    function joinRoom(id) {
        activeRoomId = id;
        document.getElementById('room-overlay').style.display = 'flex';
        database.ref('live_rooms/' + id).on('value', snap => {
            const data = snap.val();
            if(!data) return;
            document.getElementById('room-title-ui').innerText = data.name;
            document.getElementById('room-id-ui').innerText = "ID: " + id;
            document.getElementById('host-avatar').src = data.hostAvatar;

            for(let i=1; i<=9; i++) {
                const seat = data.seats ? data.seats[i] : null;
                const circle = document.getElementById('seat-'+i);
                const nameTxt = document.getElementById('name-'+i);
                if(seat) {
                    circle.innerHTML = `<img src="${seat.avatar}"><div class="seat-index">${i}</div>`;
                    circle.classList.add('active');
                    nameTxt.innerText = seat.name;
                } else {
                    circle.innerHTML = `<span style="font-size:28px; opacity:0.1;">👤</span><div class="seat-index">${i}</div>`;
                    circle.classList.remove('active');
                    nameTxt.innerText = "Empty";
                }
            }
        });
    }

    async function toggleSeat(num) {
        const ref = database.ref('live_rooms/' + activeRoomId + '/seats/' + num);
        const snap = await ref.get();
        if(snap.exists()) {
            if(snap.val().uid === userData.uid) ref.remove();
        } else {
            // Remove from other seats
            const all = await database.ref('live_rooms/' + activeRoomId + '/seats').get();
            all.forEach(c => { if(c.val().uid === userData.uid) c.ref.remove(); });
            // Sit
            ref.set({ uid: userData.uid, name: userData.name, avatar: userData.avatar });
        }
    }

    function sendChat() {
        const m = prompt("কি বলতে চান?");
        if(m) {
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div class="chat-row"><b>${userData.name}:</b> ${m}</div>`;
            box.scrollTop = box.scrollHeight;
        }
    }

    function toggleMic() {
        const btn = event.currentTarget;
        btn.style.color = btn.style.color === 'red' ? 'white' : 'red';
    }

    function exitRoom() {
        if(activeRoomId) {
            database.ref('live_rooms/' + activeRoomId + '/seats').once('value', snap => {
                snap.forEach(c => { if(c.val().uid === auth.currentUser.uid) c.ref.remove(); });
            });
            database.ref('live_rooms/' + activeRoomId).off();
        }
        document.getElementById('room-overlay').style.display = 'none';
        activeRoomId = null;
    }

    // Original Banner Animation
    let step = 0;
    setInterval(() => {
        step = (step + 1) % 3;
        const track = document.getElementById('bTrack');
        if(track) track.style.transform = `translateX(-${step * 33.33}%)`;
    }, 3000);
</script>

</body>
</html>
