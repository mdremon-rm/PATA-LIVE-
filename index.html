<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pata Live - Original Recovery</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- ZegoCloud Voice SDK -->
    <script src="https://unpkg.com/zego-express-engine-webrtc@3.0.0/ZegoExpressWeb-3.0.0.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF2D55;
            --secondary: #8E24AA;
            --bg: #0b0118;
            --card-bg: #1e1e30;
            --text-gray: #b0b0b0;
            --gold: #FFD700;
            --glass: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }

        /* Header Style */
        .top-bar { height: 65px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: var(--bg); position: sticky; top: 0; z-index: 1000; }
        .tabs-wrapper { flex: 1; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .tabs { display: flex; gap: 20px; align-items: center; }
        .tab-item { font-size: 14px; color: var(--text-gray); font-weight: 600; cursor: pointer; padding: 10px 0; position: relative; }
        .tab-item.active { color: white; font-size: 16px; border-bottom: 3.5px solid var(--primary); }

        .header-actions { display: flex; gap: 18px; font-size: 22px; margin-left: 15px; align-items: center; }

        /* Feed Grid */
        .main-content { padding: 12px; padding-bottom: 100px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .room-card { aspect-ratio: 1/1.2; border-radius: 18px; overflow: hidden; position: relative; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.06); cursor: pointer; }
        .room-card img { width: 100%; height: 100%; object-fit: cover; }
        .card-details { position: absolute; bottom: 0; width: 100%; padding: 10px; background: linear-gradient(to top, rgba(0,0,0,0.95), transparent); }
        .live-tag { position: absolute; top: 10px; left: 10px; background: var(--primary); font-size: 9px; font-weight: 900; padding: 3px 8px; border-radius: 10px; }

        /* Original Professional Overlays (Glass UI) */
        .full-screen-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 8000; display: none; flex-direction: column; animation: fadeIn 0.25s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(1.05); } to { opacity: 1; transform: scale(1); } }
        
        .glass-top { height: 65px; display: flex; align-items: center; padding: 0 15px; background: var(--glass); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        /* প্রফেশনাল ব্যাক বাটন স্টাইল */
        .back-arrow { cursor: pointer; margin-right: 15px; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; transition: background 0.2s; }
        .back-arrow:active { background: rgba(255,255,255,0.1); }
        .back-arrow svg { width: 24px; height: 24px; fill: none; stroke: white; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

        /* Ranking Design */
        .rank-top { display: flex; align-items: flex-end; justify-content: center; gap: 15px; padding: 40px 10px; background: linear-gradient(180deg, #300c50, var(--bg)); }
        .user-podium { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .podium-avatar { border-radius: 50%; border: 3px solid #555; width: 75px; height: 75px; object-fit: cover; }
        .rank-gold .podium-avatar { width: 95px; height: 95px; border-color: var(--gold); box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }

        /* Global Menu Design */
        .global-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .country-item { background: var(--card-bg); padding: 18px; border-radius: 16px; display: flex; align-items: center; gap: 12px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .country-item:active { background: rgba(255,255,255,0.1); }

        /* Bottom Nav */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: rgba(15, 2, 31, 0.98); display: flex; align-items: center; justify-content: space-evenly; border-top: 1px solid rgba(255,255,255,0.05); z-index: 2000; }
        .nav-link { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: var(--text-gray); }
        .nav-link img { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.2); }
        .mic-btn { width: 62px; height: 62px; background: linear-gradient(45deg, var(--secondary), var(--primary)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; position: relative; top: -18px; border: 4px solid var(--bg); box-shadow: 0 8px 25px rgba(255, 45, 85, 0.4); cursor: pointer; }

        /* Room Interior */
        #room-view { position: fixed; inset: 0; background: linear-gradient(180deg, #1e0836, #0b0118); z-index: 9000; display: none; flex-direction: column; }
        .grid-seats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 40px 20px; }
        .seat-unit { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .seat-orb { width: 75px; height: 75px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 2px dashed rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; overflow: hidden; transition: 0.2s; }
        .seat-orb img { width: 100%; height: 100%; object-fit: cover; }
        .seat-orb.active { border: 2px solid var(--gold) !important; border-style: solid !important; }
        .speaking { border-color: var(--primary) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(255, 45, 85, 0.4); } 100% { box-shadow: 0 0 0 12px rgba(255, 45, 85, 0); } }
    </style>
</head>
<body>

<!-- Main Interface -->
<div id="main-app-ui">
    <div class="top-bar">
        <div class="tabs-wrapper">
            <div class="tabs">
                <div class="tab-item" onclick="changeFeedTab(this)">Follow</div>
                <div class="tab-item" onclick="changeFeedTab(this)">Popular</div>
                <div class="tab-item" onclick="changeFeedTab(this)">New</div>
                <div class="tab-item" onclick="changeFeedTab(this)">Explore</div>
                <div class="tab-item active" onclick="toggleGlassOverlay('global-panel', true)">Global</div>
            </div>
        </div>
        <div class="header-actions">
            <span onclick="toggleGlassOverlay('rank-panel', true)">🏆</span>
            <span onclick="toggleGlassOverlay('search-panel', true)">🔍</span>
        </div>
    </div>

    <div class="main-content" id="audioGrid">
        <!-- JS-Generated 16 Cards -->
    </div>

    <div class="nav-bar">
        <div class="nav-link" onclick="location.reload()"><span>🏠</span>Home</div>
        <div class="nav-link"><span>🕒</span>History</div>
        <div class="mic-btn" onclick="joinAudioRoom('Main Party Room')">🎙️</div>
        <div class="nav-link"><span>💬</span>Message</div>
        <div class="nav-link" onclick="handleProfileEdit()">
            <img src="https://i.pravatar.cc/100?u=guest" id="my-avatar">
            <span id="my-name">Me</span>
        </div>
    </div>
</div>

<!-- Original Ranking Panel -->
<div id="rank-panel" class="full-screen-overlay">
    <div class="glass-top">
        <div class="back-arrow" onclick="toggleGlassOverlay('rank-panel', false)">
            <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </div>
        <span style="font-weight:700; font-size:18px;">Daily Ranking</span>
    </div>
    <div style="flex:1; overflow-y:auto;">
        <div class="rank-top">
            <div class="user-podium"><img src="https://i.pravatar.cc/100?u=a2" class="podium-avatar"><span>User_2</span></div>
            <div class="user-podium rank-gold"><img src="https://i.pravatar.cc/100?u=a1" class="podium-avatar"><span>TOP_ONE</span></div>
            <div class="user-podium"><img src="https://i.pravatar.cc/100?u=a3" class="podium-avatar"><span>User_3</span></div>
        </div>
        <div id="extendedRankList" style="padding:10px;"></div>
    </div>
</div>

<!-- Original Search Panel -->
<div id="search-panel" class="full-screen-overlay">
    <div class="glass-top">
        <div class="back-arrow" onclick="toggleGlassOverlay('search-panel', false)">
            <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </div>
        <input type="text" id="queryInput" placeholder="Search by ID (e.g. 1001)" 
               style="flex:1; background:transparent; border:none; color:white; outline:none; font-size:16px;" 
               oninput="executeSearch()">
    </div>
    <div id="searchResults" style="padding:20px;"></div>
</div>

<!-- Global Region Panel -->
<div id="global-panel" class="full-screen-overlay">
    <div class="glass-top">
        <div class="back-arrow" onclick="toggleGlassOverlay('global-panel', false)">
            <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </div>
        <span style="font-weight:700; font-size:18px;">Global Regions</span>
    </div>
    <div class="global-grid">
        <div class="country-item" onclick="filterByRegion('Bangladesh')">🇧🇩 Bangladesh</div>
        <div class="country-item" onclick="filterByRegion('India')">🇮🇳 India</div>
        <div class="country-item" onclick="filterByRegion('Turkey')">🇹🇷 Turkey</div>
        <div class="country-item" onclick="filterByRegion('USA')">🇺🇸 USA</div>
        <div class="country-item" onclick="filterByRegion('Saudi Arabia')">🇸🇦 Saudi Arabia</div>
        <div class="country-item" onclick="filterByRegion('Indonesia')">🇮🇩 Indonesia</div>
        <div class="country-item" onclick="filterByRegion('Pakistan')">🇵🇰 Pakistan</div>
        <div class="country-item" onclick="filterByRegion('Vietnam')">🇻🇳 Vietnam</div>
    </div>
</div>

<!-- Audio Room Panel -->
<div id="room-view">
    <div style="padding:20px; display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.2);">
        <div style="display:flex; align-items:center; gap:12px;">
            <div style="background:var(--primary); width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900;">P</div>
            <div>
                <div id="currentRoomName" style="font-weight:800; font-size:15px;">Party Room</div>
                <div style="font-size:10px; color:var(--gold);" id="pata-id-show">ID: 000000</div>
            </div>
        </div>
        <div onclick="leaveRoom()" style="font-size:26px; padding:5px; cursor:pointer;">✕</div>
    </div>
    <div class="grid-seats">
        <script>
            for(let i=1; i<=9; i++) {
                document.write(`
                    <div class="seat-unit" onclick="occupySeat(${i})">
                        <div class="seat-orb" id="orb-${i}">👤</div>
                        <div style="font-size:11px; color:#555;" id="user-${i}">Empty</div>
                    </div>
                `);
            }
        </script>
    </div>
    <div style="margin-top:auto; padding-bottom:50px; display:flex; justify-content:center;">
        <div id="mic-box" style="width:65px; height:65px; background:rgba(255,255,255,0.1); border-radius:50%; display:none; align-items:center; justify-content:center; font-size:26px; cursor:pointer;" onclick="toggleMic()">🎙️</div>
    </div>
</div>

<script>
    // --- INTEGRATION CONSTANTS ---
    const Z_ID = 1958175668;
    const Z_SIGN = '755b86b05e1eb51001015cbbaa994ba53bec16b9f29dc9eaa8583eda083bf59a';
    
    // Firebase Setup
    const firebaseConfig = JSON.parse(__firebase_config);
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'pata-live-recovery-final';

    let zEngine = null, currentUser = null, isMicActive = false, roomID = null, mySeat = null;

    // App Logic Initializer
    window.onload = () => {
        refreshFeed();
        startAuthentication();
    };

    // --- AUTHENTICATION & PROFILE ---
    async function startAuthentication() {
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const userRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('profile').doc('info');
                userRef.onSnapshot((doc) => {
                    if (doc.exists) {
                        currentUser = doc.data(); currentUser.uid = user.uid;
                        document.getElementById('my-avatar').src = currentUser.avatar;
                        document.getElementById('my-name').innerText = currentUser.name;
                        document.getElementById('pata-id-show').innerText = "ID: " + currentUser.pataId;
                    } else {
                        const newProfile = {
                            name: "User_" + user.uid.slice(0,4),
                            pataId: Math.floor(100000 + Math.random() * 900000).toString(),
                            avatar: `https://i.pravatar.cc/100?u=${user.uid}`,
                            wealth: 0
                        };
                        userRef.set(newProfile);
                    }
                });
            } else {
                auth.signInAnonymously();
            }
        });
    }

    async function handleProfileEdit() {
        const n = prompt("Enter New Name:", currentUser.name);
        if(n) await db.collection('artifacts').doc(appId).collection('users').doc(currentUser.uid).collection('profile').doc('info').update({name: n});
    }

    // --- VOICE ENGINE & SEATING ---
    async function joinAudioRoom(name) {
        document.getElementById('room-view').style.display = 'flex';
        document.getElementById('currentRoomName').innerText = name;
        roomID = "room_" + name.replace(/\s/g, '');

        if(!zEngine) {
            zEngine = new ZegoExpressEngine(Z_ID, Z_SIGN);
            zEngine.on('roomStreamUpdate', async (id, type, streams) => {
                if (type === 'ADD') { for (const s of streams) await zEngine.startPlayingStream(s.streamID); }
            });
        }

        try { await zEngine.loginRoom(roomID, currentUser.uid, { userName: currentUser.name }); } catch(e) {}
    }

    async function leaveRoom() {
        if(isMicActive) await toggleMic();
        if(mySeat) occupySeat(mySeat); // Reset seat on exit
        await zEngine.logoutRoom(roomID);
        document.getElementById('room-view').style.display = 'none';
        roomID = null;
    }

    function occupySeat(n) {
        const orb = document.getElementById('orb-'+n);
        const name = document.getElementById('user-'+n);
        
        if (mySeat === n) {
            // Leave Seat
            orb.innerHTML = '👤'; orb.classList.remove('active'); name.innerText = 'Empty';
            name.style.color = '#555'; mySeat = null;
            document.getElementById('mic-box').style.display = 'none';
            if(isMicActive) toggleMic();
        } else if (!mySeat) {
            // Join Seat
            orb.innerHTML = `<img src="${currentUser.avatar}">`;
            orb.classList.add('active'); name.innerText = currentUser.name;
            name.style.color = "white"; mySeat = n;
            document.getElementById('mic-box').style.display = 'flex';
        }
    }

    async function toggleMic() {
        if (!zEngine || !mySeat) return;
        const btn = document.getElementById('mic-box'), orb = document.getElementById(`orb-${mySeat}`);
        if (!isMicActive) {
            const sid = `stream_${currentUser.uid}`;
            const s = await zEngine.createStream({ camera: { audio: true, video: false } });
            zEngine.startPublishingStream(sid, s);
            btn.style.background = 'var(--primary)'; orb.classList.add('speaking');
            isMicActive = true;
        } else {
            zEngine.stopPublishingStream(`stream_${currentUser.uid}`);
            btn.style.background = 'rgba(255,255,255,0.1)'; orb.classList.remove('speaking');
            isMicActive = false;
        }
    }

    // --- UI HELPERS ---
    function refreshFeed() {
        const grid = document.getElementById('audioGrid');
        grid.innerHTML = '';
        for(let i=1; i<=16; i++) {
            grid.innerHTML += `
                <div class="room-card" onclick="joinAudioRoom('Premium Room ${i}')">
                    <img src="https://picsum.photos/seed/${i+200}/400/500">
                    <div class="live-tag">LIVE</div>
                    <div class="card-details">
                        <div style="font-weight:700; font-size:13px;">Pata Room ${i}</div>
                        <div style="font-size:10px; color:#aaa;">ID: 100${i} | 1.2K Online</div>
                    </div>
                </div>`;
        }
    }

    function toggleGlassOverlay(id, status) {
        document.getElementById(id).style.display = status ? 'flex' : 'none';
        if(id === 'rank-panel' && status) buildRankings();
    }

    function buildRankings() {
        const list = document.getElementById('extendedRankList');
        let content = '';
        for(let i=4; i<=25; i++) {
            content += `
                <div style="display:flex; align-items:center; padding:15px; border-bottom:1px solid #1a1a2e;">
                    <span style="width:35px; font-weight:900; color:#333;">${i}</span>
                    <img src="https://i.pravatar.cc/100?u=id${i}" style="width:42px; height:42px; border-radius:50%; margin-right:15px; border:1px solid #333;">
                    <div style="flex:1; font-weight:600;">Global_User_${i}</div>
                    <div style="color:var(--gold); font-weight:800;">${(30-i)*50} XP</div>
                </div>`;
        }
        list.innerHTML = content;
    }

    function executeSearch() {
        const val = document.getElementById('queryInput').value;
        const out = document.getElementById('searchResults');
        if(!val) { out.innerHTML = ''; return; }
        out.innerHTML = `
            <div style="background:var(--card-bg); padding:18px; border-radius:18px; display:flex; align-items:center; gap:15px; border:1px solid rgba(255,255,255,0.05);">
                <img src="https://i.pravatar.cc/100?u=search${val}" style="width:55px; height:55px; border-radius:50%;">
                <div style="flex:1;">
                    <div style="font-weight:700;">User_Result_${val}</div>
                    <div style="font-size:11px; color:#555;">Level 24 | Bangladesh</div>
                </div>
                <button style="background:var(--primary); border:none; color:white; padding:8px 18px; border-radius:25px; font-weight:700; font-size:12px;">FOLLOW</button>
            </div>`;
    }

    function changeFeedTab(el) {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        refreshFeed();
    }

    function filterByRegion(region) {
        toggleGlassOverla
