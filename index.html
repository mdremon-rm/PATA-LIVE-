<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pata Live - Original Premium</title>
    
    <!-- Firebase Legacy SDKs for maximum compatibility -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF2D55;
            --accent: #8E24AA;
            --bg: #0b0118;
            --glass: rgba(255, 255, 255, 0.1);
            --gold: #FFD700;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; overflow: hidden; height: 100vh; }

        /* --- লগইন স্ক্রিন --- */
        #auth-screen { 
            position: fixed; inset: 0; 
            background: linear-gradient(180deg, #1a0b2e 0%, #0b0118 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; padding: 30px;
        }
        .logo-box {
            width: 110px; height: 110px; background: white; border-radius: 30px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; box-shadow: 0 0 30px rgba(255, 45, 85, 0.4);
            border: 4px solid var(--primary);
        }
        .input-group { width: 100%; max-width: 350px; margin-bottom: 15px; }
        .input-group input {
            width: 100%; height: 55px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
            background: var(--glass); color: white; padding: 0 20px; font-size: 16px; outline: none;
        }
        .btn-primary {
            width: 100%; max-width: 350px; height: 55px; border-radius: 15px; border: none;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            color: white; font-weight: 700; font-size: 16px; cursor: pointer;
        }

        /* --- অ্যাপ ইউআই --- */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; }
        .header h1 { font-size: 24px; font-weight: 800; background: linear-gradient(to right, #fff, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .banner-slider { padding: 0 20px; margin-bottom: 20px; }
        .banner { width: 100%; height: 150px; border-radius: 20px; background: linear-gradient(45deg, #4158D0, #C850C0); overflow: hidden; position: relative; }

        .room-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; overflow-y: auto; height: calc(100vh - 250px); padding-bottom: 100px; }
        .room-card { 
            background: var(--glass); border-radius: 20px; overflow: hidden; position: relative; 
            border: 1px solid rgba(255,255,255,0.05); aspect-ratio: 1/1.2;
        }
        .room-card img { width: 100%; height: 100%; object-fit: cover; }
        .room-meta { position: absolute; bottom: 0; width: 100%; padding: 12px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); }

        /* বটম নেভিগেশন */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; height: 85px; 
            background: rgba(15, 2, 31, 0.95); backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: space-around;
            border-top: 1px solid rgba(255,255,255,0.08); z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; color: #888; font-size: 11px; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 24px; }
        .mic-btn { 
            width: 60px; height: 60px; border-radius: 50%; 
            background: linear-gradient(45deg, var(--primary), var(--accent));
            display: flex; align-items: center; justify-content: center;
            margin-top: -40px; border: 5px solid var(--bg); font-size: 28px;
            box-shadow: 0 10px 20px rgba(255,45,85,0.3);
        }

        /* অডিও রুম ভিউ */
        #room-view { position: fixed; inset: 0; background: #120227; z-index: 9000; display: none; flex-direction: column; }
        .room-top { display: flex; justify-content: space-between; padding: 20px; align-items: center; }
        .host-info { background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 30px; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .host-info img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--gold); }
        
        .seats-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; 
            padding: 30px; flex: 1; align-content: flex-start;
        }
        .seat { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .seat-circle { 
            width: 80px; height: 80px; border-radius: 20px; background: rgba(255,255,255,0.03); 
            border: 1.5px dashed rgba(255,255,255,0.1); display: flex; align-items: center; 
            justify-content: center; position: relative; transition: 0.3s;
        }
        .seat-circle.active { border: 2px solid var(--gold); border-style: solid; background: rgba(255,255,255,0.08); }
        .seat-circle img { width: 100%; height: 100%; border-radius: 18px; object-fit: cover; }
        .crown { position: absolute; top: -12px; width: 25px; }
        
        .chat-area { height: 150px; padding: 15px; overflow-y: auto; background: linear-gradient(transparent, rgba(0,0,0,0.4)); }
        .msg { font-size: 13px; margin-bottom: 5px; color: #ddd; }
        .msg b { color: var(--gold); }

        .room-actions { height: 80px; display: flex; align-items: center; justify-content: space-around; padding: 0 15px; }
        .act-btn { width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        #error-popup {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #ff4d4d; color: white; padding: 12px 25px; border-radius: 10px;
            z-index: 11000; display: none; font-size: 14px; font-weight: 600;
        }
    </style>
</head>
<body>

<div id="error-popup">Network Error! Please check Firebase Settings.</div>

<!-- Auth Section -->
<div id="auth-screen">
    <div class="logo-box"><img src="https://i.ibb.co/VYpYmRj/pata-logo.png" width="80"></div>
    <h1 style="margin-bottom: 30px; font-weight: 800;">Pata Live</h1>
    <div class="input-group"><input type="email" id="email" placeholder="Email Address"></div>
    <div class="input-group"><input type="password" id="pass" placeholder="Password"></div>
    <button class="btn-primary" onclick="handleLogin()">Sign In / Sign Up</button>
    <p style="margin-top: 20px; color: #666; font-size: 12px;">Secure Authentication by Firebase</p>
</div>

<!-- Main App -->
<div id="main-app" style="display:none;">
    <div class="header">
        <h1>Pata Live</h1>
        <div style="display:flex; gap:15px; font-size:20px;">🔍 🏆</div>
    </div>

    <div class="banner-slider">
        <div class="banner">
            <div style="padding:20px;">
                <h2 style="font-weight:800;">WEEKLY<br>RANKING</h2>
                <button style="margin-top:10px; padding:5px 15px; border-radius:10px; border:none; background:white; color:black; font-weight:700; font-size:12px;">Check Now</button>
            </div>
        </div>
    </div>

    <div id="rooms-list" class="room-grid">
        <!-- Rooms Load Here -->
    </div>

    <div class="bottom-nav">
        <div class="nav-item active"><i>🏠</i><span>Home</span></div>
        <div class="nav-item"><i>🌍</i><span>Explore</span></div>
        <div class="mic-btn" onclick="createNewRoom()">🎙️</div>
        <div class="nav-item"><i>💬</i><span>Chat</span></div>
        <div class="nav-item"><i>👤</i><span>Me</span></div>
    </div>
</div>

<!-- Audio Room -->
<div id="room-view">
    <div class="room-top">
        <div class="host-info">
            <img id="room-host-img" src="">
            <div>
                <div id="room-title" style="font-size:12px; font-weight:700;">Party Room</div>
                <div id="room-id-display" style="font-size:10px; color:var(--gold);">ID: 000000</div>
            </div>
        </div>
        <div onclick="exitRoom()" style="font-size:24px; padding:10px;">✕</div>
    </div>

    <div class="seats-grid">
        <script>
            for(let i=1; i<=9; i++) {
                document.write(`
                    <div class="seat" onclick="toggleSeat(${i})">
                        <div class="seat-circle" id="seat-${i}">
                            <img src="https://i.ibb.co/h97p68X/crown.png" class="crown" style="display:none">
                            <span style="font-size:24px; opacity:0.1;">🛋️</span>
                        </div>
                        <div style="font-size:10px; color:#666;" id="seat-name-${i}">Seat ${i}</div>
                    </div>
                `);
            }
        </script>
    </div>

    <div class="chat-area" id="chat-box">
        <div class="msg"><b>System:</b> Welcome! No spamming allowed.</div>
    </div>

    <div class="room-actions">
        <div class="act-btn">🎙️</div>
        <div class="act-btn">💬</div>
        <div class="act-btn" style="background:var(--primary); width:60px; height:60px; font-size:30px;">🎁</div>
        <div class="act-btn">🎵</div>
        <div class="act-btn">⚙️</div>
    </div>
</div>

<script>
    // Firebase Config (Confirmed from your screenshots)
    const firebaseConfig = {
        apiKey: "AIzaSyD5vRGyz3qdyqhnt2T9qmlPlTeQKV5Hlbw",
        authDomain: "pata-live.firebaseapp.com",
        databaseURL: "https://pata-live-default-rtdb.firebaseio.com/",
        projectId: "pata-live",
        storageBucket: "pata-live.firebasestorage.app",
        messagingSenderId: "644016212127",
        appId: "1:644016212127:web:214bc06f4677c8188e7aaa"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let currentRoomId = null;

    // Error Shower
    function showError(text) {
        const p = document.getElementById('error-popup');
        p.innerText = text;
        p.style.display = 'block';
        setTimeout(() => p.style.display = 'none', 4000);
    }

    // Login logic with error catch
    async function handleLogin() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        if(!email || !pass) return showError("Please enter Email & Password");

        try {
            await auth.signInWithEmailAndPassword(email, pass);
        } catch (e) {
            if(e.code === 'auth/user-not-found') {
                try {
                    await auth.createUserWithEmailAndPassword(email, pass);
                } catch (err) { showError(err.message); }
            } else { showError(e.message); }
        }
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            listenRooms();
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('main-app').style.display = 'none';
        }
    });

    function listenRooms() {
        db.ref('rooms').on('value', snap => {
            const list = document.getElementById('rooms-list');
            list.innerHTML = '';
            snap.forEach(child => {
                const data = child.val();
                list.innerHTML += `
                    <div class="room-card" onclick="enterRoom('${child.key}')">
                        <img src="${data.hostImg || 'https://via.placeholder.com/150'}">
                        <div class="room-meta">
                            <div style="font-weight:600; font-size:14px;">${data.title}</div>
                            <div style="font-size:10px; color:#ccc;">Host: ${data.hostName}</div>
                        </div>
                    </div>`;
            });
        });
    }

    function createNewRoom() {
        const user = auth.currentUser;
        const rid = Math.floor(100000 + Math.random() * 899999);
        db.ref('rooms/' + rid).set({
            title: user.email.split('@')[0] + "'s Party",
            hostName: user.email.split('@')[0],
            hostImg: "https://i.pravatar.cc/150?u=" + user.uid,
            hostUid: user.uid,
            createdAt: Date.now()
        });
        enterRoom(rid);
    }

    function enterRoom(id) {
        currentRoomId = id;
        document.getElementById('room-view').style.display = 'flex';
        
        db.ref('rooms/' + id).on('value', snap => {
            const data = snap.val();
            if(!data) return;
            document.getElementById('room-host-img').src = data.hostImg;
            document.getElementById('room-title').innerText = data.title;
            document.getElementById('room-id-display').innerText = "ID: " + id;

            // Sync Seats
            for(let i=1; i<=9; i++) {
                const seatData = data.seats ? data.seats[i] : null;
                const circle = document.getElementById('seat-'+i);
                const nameLabel = document.getElementById('seat-name-'+i);
                
                if(seatData) {
                    circle.innerHTML = `<img src="${seatData.img}" class="user-img"><img src="https://i.ibb.co/h97p68X/crown.png" class="crown" style="display:block">`;
                    circle.classList.add('active');
                    nameLabel.innerText = seatData.name;
                } else {
                    circle.innerHTML = `<span style="font-size:24px; opacity:0.1;">🛋️</span>`;
                    circle.classList.remove('active');
                    nameLabel.innerText = "Seat " + i;
                }
            }
        });
    }

    function toggleSeat(num) {
        const user = auth.currentUser;
        const seatRef = db.ref('rooms/' + currentRoomId + '/seats/' + num);
        
        seatRef.once('value', snap => {
            if(snap.exists()) {
                if(snap.val().uid === user.uid) seatRef.remove();
            } else {
                seatRef.set({
                    uid: user.uid,
                    name: user.email.split('@')[0],
                    img: "https://i.pravatar.cc/150?u=" + user.uid
                });
            }
        });
    }

    function exitRoom() {
        if(currentRoomId) db.ref('rooms/' + currentRoomId).off();
        document.getElementById('room-view').style.display = 'none';
        currentRoomId = null;
    }
</script>

</body>
</html>
