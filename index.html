<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pata Live - Edit Profile</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF2D55;
            --secondary: #8E24AA;
            --bg: #0b0118;
            --glass: rgba(255, 255, 255, 0.1);
            --gold: #FFD700;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }

        /* Auth Screen */
        #authScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a0136 0%, #0b0118 100%);
            z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; text-align: center;
        }
        .auth-input {
            width: 100%; max-width: 300px; padding: 15px; margin: 10px 0;
            background: var(--glass); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 15px; color: white; outline: none;
        }
        .auth-btn {
            width: 100%; max-width: 300px; padding: 15px; margin-top: 20px;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            border: none; border-radius: 15px; color: white; font-weight: 700; cursor: pointer;
        }

        /* Top Bar */
        .top-bar { 
            height: 65px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 15px; background: rgba(11, 1, 24, 0.85); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--glass);
        }

        /* Overlay Pages */
        .overlay-page { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg); z-index: 9000; display: none; overflow-y: auto;
        }
        .page-header { 
            height: 75px; display: flex; align-items: center; padding: 0 20px; 
            background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border-bottom: 1px solid var(--glass);
        }
        .back-btn { 
            font-size: 22px; width: 40px; height: 40px; background: var(--glass); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        /* Profile Section */
        .profile-container {
            padding: 20px; text-align: center;
        }
        .profile-img-wrap {
            position: relative; width: 110px; height: 110px; margin: 0 auto 20px;
        }
        .profile-img { 
            width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover;
        }
        .edit-img-btn {
            position: absolute; bottom: 0; right: 0; background: var(--primary);
            width: 32px; height: 32px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 16px; border: 3px solid var(--bg);
        }
        .profile-card {
            background: var(--glass); padding: 25px; border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px;
        }
        .edit-input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass);
            padding: 12px; border-radius: 12px; color: white; margin-top: 10px; display: none;
        }

        /* Navigation */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; height: 85px; 
            background: rgba(15, 2, 31, 0.95); backdrop-filter: blur(30px); 
            display: flex; align-items: center; justify-content: space-around; 
            border-top: 1px solid var(--glass); z-index: 2000;
        }
        .nav-mic-btn { 
            width: 68px; height: 68px; background: linear-gradient(45deg, var(--secondary), var(--primary)); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 32px; position: relative; top: -28px; border: 6px solid var(--bg);
            box-shadow: 0 10px 25px rgba(255, 45, 85, 0.4);
        }

    </style>
</head>
<body>

<!-- লগইন স্ক্রিন -->
<div id="authScreen">
    <h1 style="font-size: 32px; margin-bottom: 10px;">PATA LIVE</h1>
    <p style="color: #aaa; margin-bottom: 30px;">আপনার অডিও যাত্রা শুরু করুন</p>
    <input type="text" id="authName" class="auth-input" placeholder="আপনার নাম">
    <input type="email" id="authEmail" class="auth-input" placeholder="ইমেইল">
    <input type="password" id="authPass" class="auth-input" placeholder="পাসওয়ার্ড">
    <button class="auth-btn" onclick="handleAuth()">প্রবেশ করুন</button>
    <p id="authMsg" style="margin-top: 15px; font-size: 13px; color: var(--primary);"></p>
</div>

<!-- হোম পেজ -->
<div id="homePage">
    <div class="top-bar">
        <div style="font-weight: 900; font-size: 20px; color: var(--primary);">PATA</div>
        <div style="display:flex; gap:15px; align-items:center;">
            <div style="background:var(--glass); padding:5px 12px; border-radius:20px; color:var(--gold); font-weight:700;">💎 <span id="coinDisplay">0</span></div>
            <span onclick="togglePage('rankPage', true)" style="font-size:24px; cursor:pointer;">🏆</span>
        </div>
    </div>

    <div style="padding: 15px;">
        <div id="roomGrid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <!-- লাইভ রুম লিস্ট -->
        </div>
    </div>

    <nav class="bottom-nav">
        <div onclick="togglePage('homePage')">🏠<br>হোম</div>
        <div class="nav-mic-btn" onclick="goLive()">🎙️</div>
        <div onclick="togglePage('profilePage', true)">👤<br>প্রোফাইল</div>
    </nav>
</div>

<!-- প্রোফাইল পেজ -->
<div id="profilePage" class="overlay-page">
    <div class="page-header">
        <div class="back-btn" onclick="togglePage('profilePage', false)">⬅️</div>
        <h2 style="margin-left: 15px;">প্রোফাইল</h2>
    </div>
    
    <div class="profile-container">
        <div class="profile-img-wrap">
            <img id="userImg" class="profile-img" src="https://i.pravatar.cc/150">
            <label for="imgUpload" class="edit-img-btn">📷</label>
            <input type="file" id="imgUpload" style="display:none" onchange="uploadPhoto(this)">
        </div>

        <div class="profile-card">
            <div style="display:flex; justify-content:center; align-items:center; gap:10px;">
                <h2 id="userNameDisplay">ইউজার নেম</h2>
                <span onclick="enableEditName()" style="cursor:pointer; font-size:14px;">✏️</span>
            </div>
            <input type="text" id="nameEditInput" class="edit-input" placeholder="নতুন নাম লিখুন">
            <button id="saveNameBtn" onclick="saveNewName()" style="display:none; margin:10px auto; background:var(--primary); border:none; color:white; padding:5px 15px; border-radius:10px;">সেভ করুন</button>
            
            <p id="userEmailDisplay" style="color: #888; font-size: 14px; margin-top: 5px;">user@email.com</p>
            
            <div style="display: flex; justify-content: space-around; margin-top: 25px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05);">
                <div><b id="userCoins">0</b><br><small style="color:#888">কয়েন</small></div>
                <div><b id="userLevel">1</b><br><small style="color:#888">লেভেল</small></div>
                <div><b id="userGifts">0</b><br><small style="color:#888">উপহার</small></div>
            </div>
        </div>

        <button onclick="logout()" style="width:100%; padding:15px; background:var(--glass); border:1px solid rgba(255,0,0,0.2); color:#ff5e5e; border-radius:15px; font-weight:700;">লগ আউট</button>
    </div>
</div>

<!-- র‍্যাঙ্কিং পেজ -->
<div id="rankPage" class="overlay-page">
    <div class="page-header">
        <div class="back-btn" onclick="togglePage('rankPage', false)">⬅️</div>
        <h2 style="margin-left: 15px;">লিডারবোর্ড</h2>
    </div>
    <div id="rankContent" style="padding: 20px;"></div>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyD5vRGyz3qdyqhnt2T9qmlPlTeQKV5Hlbw",
        authDomain: "pata-live.firebaseapp.com",
        databaseURL: "https://pata-live-default-rtdb.firebaseio.com/",
        projectId: "pata-live",
        storageBucket: "pata-live.firebasestorage.app",
        messagingSenderId: "644016212127",
        appId: "1:644016212127:web:214bc06f4677c8188e7aaa"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let currentUserData = null;

    // ১. অথেনটিকেশন
    function handleAuth() {
        const name = document.getElementById('authName').value;
        const email = document.getElementById('authEmail').value;
        const pass = document.getElementById('authPass').value;
        const msg = document.getElementById('authMsg');

        if(!email || !pass) return msg.innerText = "সবগুলো ঘর পূরণ করুন";

        auth.createUserWithEmailAndPassword(email, pass).then((res) => {
            const user = res.user;
            db.ref('users/' + user.uid).set({
                name: name || "New User",
                email: email,
                coins: 500,
                level: 1,
                gifts: 0,
                photo: "https://i.pravatar.cc/150?u=" + user.uid
            });
        }).catch(err => {
            auth.signInWithEmailAndPassword(email, pass).catch(e => {
                msg.innerText = "ভুল তথ্য দিয়েছেন";
            });
        });
    }

    // ২. প্রোফাইল এডিট লজিক
    function enableEditName() {
        document.getElementById('userNameDisplay').style.display = 'none';
        document.getElementById('nameEditInput').style.display = 'block';
        document.getElementById('saveNameBtn').style.display = 'block';
        document.getElementById('nameEditInput').value = currentUserData.name;
    }

    function saveNewName() {
        const newName = document.getElementById('nameEditInput').value;
        if(newName.trim() === "") return;
        
        db.ref('users/' + auth.currentUser.uid).update({
            name: newName
        }).then(() => {
            document.getElementById('userNameDisplay').style.display = 'block';
            document.getElementById('nameEditInput').style.display = 'none';
            document.getElementById('saveNameBtn').style.display = 'none';
            alert("নাম আপডেট হয়েছে!");
        });
    }

    function uploadPhoto(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                // এখানে ছবির Base64 ডেটা পাওয়া যাবে। বড় অ্যাপের জন্য Firebase Storage দরকার।
                // আপাতত ইউজার ইন্টারফেস আপডেট এবং ডিবিতে লিঙ্ক সেভ করা হচ্ছে।
                const photoData = e.target.result;
                document.getElementById('userImg').src = photoData;
                db.ref('users/' + auth.currentUser.uid).update({
                    photo: photoData
                });
                alert("ছবি আপডেট হয়েছে!");
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // ৩. সিঙ্ক্রোনাইজেশন
    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('authScreen').style.display = 'none';
            db.ref('users/' + user.uid).on('value', snap => {
                currentUserData = snap.val();
                if(currentUserData) updateUI();
            });
        } else {
            document.getElementById('authScreen').style.display = 'flex';
        }
    });

    function updateUI() {
        document.getElementById('userNameDisplay').innerText = currentUserData.name;
        document.getElementById('userEmailDisplay').innerText = currentUserData.email;
        document.getElementById('coinDisplay').innerText = currentUserData.coins;
        document.getElementById('userCoins').innerText = currentUserData.coins;
        document.getElementById('userLevel').innerText = currentUserData.level;
        document.getElementById('userGifts').innerText = currentUserData.gifts;
        document.getElementById('userImg').src = currentUserData.photo;
    }

    function togglePage(id, show) {
        if(id === 'homePage') {
            document.getElementById('profilePage').style.display = 'none';
            document.getElementById('rankPage').style.display = 'none';
        } else {
            document.getElementById(id).style.display = show ? 'block' : 'none';
        }
    }

    function logout() { auth.signOut(); }

    // রুম লিস্ট
    db.ref('live_rooms').on('value', snap => {
        const grid = document.getElementById('roomGrid');
        grid.innerHTML = '';
        const rooms = snap.val();
        if(rooms) {
            Object.keys(rooms).forEach(id => {
                const r = rooms[id];
                grid.innerHTML += `
                    <div style="background:var(--glass); border-radius:20px; overflow:hidden; position:relative; aspect-ratio:1/1.2;">
                        <img src="https://picsum.photos/seed/${id}/300/400" style="width:100%; height:100%; object-fit:cover;">
                        <div style="position:absolute; bottom:0; width:100%; padding:10px; background:linear-gradient(transparent, black);">
                            <b>${r.name}</b><br><small>${r.host}</small>
                        </div>
                    </div>`;
            });
        }
    });

    function goLive() {
        const rName = prompt("রুমের নাম:");
        if(!rName) return;
        const ref = db.ref('live_rooms').push();
        ref.set({ name: rName, host: currentUserData.name, hostId: auth.currentUser.uid });
        ref.onDisconnect().remove();
    }
</script>

</body>
</html>
