<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pata Live - Original Master Pro</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF2D55;
            --secondary: #8E24AA;
            --bg: #0b0118;
            --card-bg: #1e1e30;
            --text-gray: #b0b0b0;
            --gold: #FFD700;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; overflow-x: hidden; height: 100vh; }

        /* --- AUTH & PROFILE SCREENS --- */
        #auth-screen, #profile-setup {
            position: fixed; inset: 0; background: var(--bg); z-index: 5000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px;
        }
        .glass-input {
            width: 100%; max-width: 320px; height: 50px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 0 15px;
            color: white; margin-bottom: 15px; outline: none;
        }
        .btn-main {
            width: 100%; max-width: 320px; height: 50px; border-radius: 12px; border: none;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white; font-weight: 700; cursor: pointer;
        }

        /* --- UI SHELL --- */
        .app-shell { display: flex; flex-direction: column; min-height: 100vh; }

        .top-bar { 
            height: 60px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 15px; background: var(--bg); position: sticky; top: 0; z-index: 1000; 
        }
        .header-tabs-container { flex: 1; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .header-tabs { display: flex; gap: 20px; align-items: center; }
        .h-tab { font-size: 15px; color: var(--text-gray); font-weight: 600; cursor: pointer; padding: 8px 0; position: relative; }
        .h-tab.active { color: white; font-size: 17px; }
        .h-tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: var(--primary); border-radius: 10px; }

        .banner-section { padding: 10px 15px; }
        .banner-container { width: 100%; height: 140px; border-radius: 15px; overflow: hidden; }
        .banner-track { display: flex; width: 300%; height: 100%; transition: 0.5s; }
        .banner-track img { width: 33.33%; height: 100%; object-fit: cover; }

        .screen-container { flex: 1; padding: 12px; padding-bottom: 100px; overflow-y: auto; }
        .feed-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .live-card { aspect-ratio: 1/1.25; border-radius: 20px; overflow: hidden; position: relative; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); }
        .live-card img { width: 100%; height: 100%; object-fit: cover; }
        .live-tag { position: absolute; top: 10px; left: 10px; background: var(--primary); font-size: 9px; font-weight: 800; padding: 3px 8px; border-radius: 20px; z-index: 5; }
        .card-footer { position: absolute; bottom: 0; width: 100%; padding: 12px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); }

        /* --- BOTTOM NAV --- */
        .bottom-nav-pro { 
            position: fixed; bottom: 0; width: 100%; height: 80px; 
            background: rgba(15, 2, 31, 0.98); backdrop-filter: blur(20px); 
            display: flex; align-items: center; justify-content: space-evenly; 
            border-top: 1px solid rgba(255, 255, 255, 0.1); z-index: 2000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-gray); font-size: 10px; cursor: pointer; min-width: 50px; }
        .nav-item.active { color: var(--primary); }
        .nav-item span { font-size: 24px; margin-bottom: 4px; }
        
        .nav-mic-btn { 
            width: 65px; height: 65px; background: linear-gradient(45deg, var(--secondary), var(--primary)); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 30px; color: white; position: relative; top: -25px; 
            border: 4px solid var(--bg); box-shadow: 0 8px 25px rgba(255, 45, 85, 0.5); 
            cursor: pointer; z-index: 2001;
        }

        /* --- AUDIO ROOM UI (Poppo Style) --- */
        #audio-room {
            position: fixed; inset: 0; background: linear-gradient(to bottom, #1e0836, #0b0118);
            z-index: 6000; display: none; flex-direction: column;
        }
        .room-header { height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; margin-top: 10px; }
        .host-pill { background: rgba(0,0,0,0.3); border-radius: 30px; padding: 5px 12px; display: flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,0.1); }
        .host-pill img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--gold); }
        
        .seats-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; 
            padding: 20px; max-width: 400px; margin: 0 auto;
        }
        .seat-box { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .seat-circle { 
            width: 80px; height: 80px; border-radius: 18px; background: rgba(255,255,255,0.05); 
            border: 1.5px dashed rgba(255,255,255,0.15); display: flex; align-items: center; 
            justify-content: center; position: relative; overflow: visible;
        }
        .seat-circle.active { border: 2.5px solid var(--gold); border-style: solid; background: rgba(0,0,0,0.2); }
        .seat-circle img.user-avatar { width: 100%; height: 100%; border-radius: 15px; object-fit: cover; }
        .crown-icon { position: absolute; top: -15px; width: 30px; display: none; }
        .seat-circle.active .crown-icon { display: block; }
        .seat-num { position: absolute; bottom: -5px; background: rgba(0,0,0,0.8); font-size: 10px; padding: 1px 7px; border-radius: 8px; border: 0.5px solid rgba(255,255,255,0.2); }

        .chat-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .chat-bubble { background: rgba(0,0,0,0.2); padding: 8px 15px; border-radius: 15px; font-size: 13px; max-width: 85%; }
        .chat-bubble b { color: var(--gold); margin-right: 5px; }

        .room-footer { height: 80px; display: flex; align-items: center; justify-content: space-around; padding: 0 10px; background: rgba(0,0,0,0.4); }
        .room-btn { width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .gift-btn { width: 60px; height: 60px; background: linear-gradient(45deg, var(--primary), var(--secondary)); border-radius: 50%; font-size: 30px; box-shadow: 0 0 20px rgba(255,45,85,0.4); }
    </style>
</head>
<body>

<!-- Login Screen -->
<div id="auth-screen">
    <div style="margin-bottom:30px; text-align:center;">
        <h1 style="font-size:32px; font-weight:900;">Pata Live</h1>
        <p style="color:var(--text-gray);">Join the Voice Party</p>
    </div>
    <input type="email" id="email" class="glass-input" placeholder="Email Address">
    <input type="password" id="pass" class="glass-input" placeholder="Password">
    <button class="btn-main" onclick="handleAuth()">Login / Sign Up</button>
</div>

<!-- Profile Setup -->
<div id="profile-setup" style="display:none;">
    <h2 style="margin-bottom:20px;">Complete Profile</h2>
    <input type="text" id="username" class="glass-input" placeholder="Display Name">
    <button class="btn-main" onclick="saveProfile()">Start Now</button>
</div>

<!-- Main App Shell -->
<div class="app-shell" id="main-ui" style="display:none;">
    <div class="top-bar">
        <div class="header-tabs-container">
            <div class="header-tabs">
                <div class="h-tab">Follow</div>
                <div class="h-tab active">Popular</div>
                <div class="h-tab">New</div>
                <div class="h-tab">Explore</div>
            </div>
        </div>
        <div style="display:flex; gap:15px; font-size:20px; padding-left:10px;">
            <span onclick="alert('Ranking Board Coming Soon!')">🏆</span>
            <span onclick="alert('Search Coming Soon!')">🔍</span>
        </div>
    </div>

    <div class="banner-section">
        <div class="banner-container">
            <div class="banner-track" id="bTrack">
                <img src="https://picsum.photos/seed/pata1/800/400">
                <img src="https://picsum.photos/seed/pata2/800/400">
                <img src="https://picsum.photos/seed/pata3/800/400">
            </div>
        </div>
    </div>

    <div class="screen-container">
        <div class="feed-grid" id="gridPopular"></div>
    </div>

    <nav class="bottom-nav-pro">
        <div class="nav-item active">
            <span>🏠</span>
            Home
        </div>
        <div class="nav-item">
            <span>🕒</span>
            History
        </div>
        
        <div class="nav-mic-btn" onclick="startLive()">🎙️</div>
        
        <div class="nav-item">
            <span>💬</span>
            Message
        </div>
        <div class="nav-item" onclick="showProfileEditor()">
            <span>👤</span>
            Me
        </div>
    </nav>
</div>

<!-- Audio Room UI -->
<div id="audio-room">
    <div class="room-header">
        <div class="host-pill">
            <img id="room-host-img" src="">
            <div>
                <div id="room-name-display" style="font-size:12px; font-weight:700;">Party Room</div>
                <div id="room-id-display" style="font-size:9px; color:var(--gold);">ID: 00000</div>
            </div>
        </div>
        <div style="display:flex; align-items:center; gap:12px;">
            <div style="background:rgba(255,255,255,0.15); padding:4px 12px; border-radius:20px; font-size:11px;">👥 1.2k</div>
            <div onclick="exitRoom()" style="font-size:24px; padding:5px;">✕</div>
        </div>
    </div>

    <div class="seats-grid">
        <script>
            for(let i=1; i<=9; i++) {
                document.write(`
                    <div class="seat-box" onclick="handleSeat(${i})">
                        <div class="seat-circle" id="seat-${i}">
                            <img src="https://i.ibb.co/h97p68X/crown.png" class="crown-icon">
                            <span style="font-size:26px; opacity:0.15;">🛋️</span>
                            <div class="seat-num">${i}</div>
                        </div>
                        <div id="seat-name-${i}" style="font-size:10px; color:var(--text-gray);">Wait</div>
                    </div>
                `);
            }
        </script>
    </div>

    <div class="chat-container" id="room-chat">
        <div class="chat-bubble"><b>System:</b> Welcome! Respect others and enjoy.</div>
    </div>

    <div class="room-footer">
        <div class="room-btn" onclick="toggleMic()">🎙️</div>
        <div class="room-btn" onclick="sendMsg()">💬</div>
        <div class="gift-btn" onclick="alert('Gifting panel coming soon!')">🎁</div>
        <div class="room-btn">🎵</div>
        <div class="room-btn">⚙️</div>
    </div>
</div>

<script>
    // Firebase Initial
    const firebaseConfig = {
        apiKey: "AIzaSyD5vRGyz3qdyqhnt2T9qmlPlTeQKV5Hlbw",
        authDomain: "pata-live.firebaseapp.com",
        databaseURL: "https://pata-live-default-rtdb.firebaseio.com/",
        projectId: "pata-live",
        storageBucket: "pata-live.firebasestorage.app",
        messagingSenderId: "644016212127",
        appId: "1:644016212127:web:214bc06f4677c8188e7aaa"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    let currentUserData = null;
    let currentRoomId = null;

    // --- AUTH LOGIC ---
    async function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        if(!email || !pass) return alert("Enter details!");
        
        try {
            await auth.signInWithEmailAndPassword(email, pass);
        } catch (e) {
            if(e.code === 'auth/user-not-found') {
                try {
                    await auth.createUserWithEmailAndPassword(email, pass);
                } catch (err) { alert(err.message); }
            } else { alert(e.message); }
        }
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            database.ref('users/' + user.uid).once('value', snap => {
                if(snap.exists()) {
                    currentUserData = snap.val();
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('profile-setup').style.display = 'none';
                    document.getElementById('main-ui').style.display = 'flex';
                    loadRooms();
                } else {
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('profile-setup').style.display = 'flex';
                }
            });
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('main-ui').style.display = 'none';
        }
    });

    async function saveProfile() {
        const name = document.getElementById('username').value;
        if(!name) return alert("Enter name!");
        const user = auth.currentUser;
        const profile = {
            name: name,
            avatar: "https://i.pravatar.cc/150?u=" + user.uid,
            uid: user.uid,
            id: Math.floor(100000 + Math.random() * 900000)
        };
        await database.ref('users/' + user.uid).set(profile);
        currentUserData = profile;
        document.getElementById('profile-setup').style.display = 'none';
        document.getElementById('main-ui').style.display = 'flex';
    }

    function showProfileEditor() {
        const newName = prompt("নতুন নাম লিখুন:", currentUserData.name);
        if(newName) {
            database.ref('users/' + auth.currentUser.uid).update({name: newName});
            currentUserData.name = newName;
            alert("প্রোফাইল আপডেট হয়েছে!");
        }
    }

    // --- ROOMS LOGIC ---
    function loadRooms() {
        database.ref('live_rooms').on('value', (snap) => {
            const grid = document.getElementById('gridPopular');
            grid.innerHTML = '';
            snap.forEach(child => {
                const room = child.val();
                grid.innerHTML += `
                    <div class="live-card" onclick="enterRoom('${child.key}')">
                        <img src="${room.hostAvatar || 'https://picsum.photos/seed/'+child.key+'/400/500'}">
                        <div class="live-tag">LIVE</div>
                        <div class="card-footer">
                            <div style="font-weight:700;">${room.name}</div>
                            <div style="font-size:10px; color:#bbb;">Host: ${room.host}</div>
                        </div>
                    </div>`;
            });
        });
    }

    async function startLive() {
        const title = prompt("রুমের টাইটেল দিন:");
        if(!title) return;
        const rid = Math.floor(100000 + Math.random() * 900000);
        const roomData = {
            name: title,
            host: currentUserData.name,
            hostAvatar: currentUserData.avatar,
            hostUid: currentUserData.uid,
            roomId: rid,
            seats: { 1: { uid: currentUserData.uid, name: currentUserData.name, avatar: currentUserData.avatar } }
        };
        await database.ref('live_rooms/' + rid).set(roomData);
        enterRoom(rid);
    }

    function enterRoom(id) {
        currentRoomId = id;
        document.getElementById('audio-room').style.display = 'flex';
        database.ref('live_rooms/' + id).on('value', snap => {
            const data = snap.val();
            if(!data) return;
            document.getElementById('room-name-display').innerText = data.name;
            document.getElementById('room-id-display').innerText = "ID: " + id;
            document.getElementById('room-host-img').src = data.hostAvatar;

            for(let i=1; i<=9; i++) {
                const s = data.seats ? data.seats[i] : null;
                const circle = document.getElementById('seat-'+i);
                const nameLbl = document.getElementById('seat-name-'+i);
                if(s) {
                    circle.innerHTML = `<img src="https://i.ibb.co/h97p68X/crown.png" class="crown-icon" style="display:block"><img src="${s.avatar}" class="user-avatar"><div class="seat-num">${i}</div>`;
                    circle.classList.add('active');
                    nameLbl.innerText = s.name.split(' ')[0];
                } else {
                    circle.innerHTML = `<span style="font-size:26px; opacity:0.15;">🛋️</span><div class="seat-num">${i}</div>`;
                    circle.classList.remove('active');
                    nameLbl.innerText = "Wait";
                }
            }
        });
    }

    async function handleSeat(num) {
        const ref = database.ref('live_rooms/' + currentRoomId + '/seats/' + num);
        const snap = await ref.get();
        if(snap.exists()) {
            if(snap.val().uid === currentUserData.uid) ref.remove();
        } else {
            // Remove from any other seat first
            const allSeats = await database.ref('live_rooms/' + currentRoomId + '/seats').get();
            allSeats.forEach(child => { if(child.val().uid === currentUserData.uid) child.ref.remove(); });
            // Sit here
            ref.set({ uid: currentUserData.uid, name: currentUserData.name, avatar: currentUserData.avatar });
        }
    }

    function toggleMic() {
        const btn = event.currentTarget;
        btn.style.color = btn.style.color === 'red' ? 'white' : 'red';
        btn.innerText = btn.innerText === '🎙️' ? '🔇' : '🎙️';
    }

    function sendMsg() {
        const m = prompt("কি বলতে চান?");
        if(m) {
            const chat = document.getElementById('room-chat');
            chat.innerHTML += `<div class="chat-bubble"><b>${currentUserData.name}:</b> ${m}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    }

    function exitRoom() {
        if(currentRoomId) {
            database.ref('live_rooms/' + currentRoomId + '/seats').once('value', snap => {
                snap.forEach(c => { if(c.val().uid === auth.currentUser.uid) c.ref.remove(); });
            });
            database.ref('live_rooms/' + currentRoomId).off();
        }
        document.getElementById('audio-room').style.display = 'none';
        currentRoomId = null;
    }

    // Banner Logic
    let step = 0;
    setInterval(() => {
        step = (step + 1) % 3;
        const track = document.getElementById('bTrack');
        if(track) track.style.transform = `translateX(-${step * 33.33}%)`;
    }, 3000);
</scrip
