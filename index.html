<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pata Live - Official</title>
    
    <!-- PWA Setup -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0b0118">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Pata%20Live%22,%22short_name%22:%22Pata%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#0b0118%22,%22theme_color%22:%22#FF2D55%22}">

    <!-- SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/zego-express-engine-webrtc@3.0.0/ZegoExpressWeb-3.0.0.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF2D55;
            --bg: #0b0118;
            --glass: rgba(255, 255, 255, 0.08);
            --gold: #FFD700;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* Navigation Tab Style */
        .top-bar { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tabs { display: flex; gap: 15px; }
        .tab { font-size: 14px; color: #888; font-weight: 600; cursor: pointer; }
        .tab.active { color: white; border-bottom: 2px solid var(--primary); padding-bottom: 4px; }

        /* Room Grid */
        .feed-container { height: calc(100vh - 135px); overflow-y: auto; padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .room-card { aspect-ratio: 1/1.2; border-radius: 15px; background: #1a1a2e; overflow: hidden; position: relative; }
        .room-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .room-info { position: absolute; bottom: 0; padding: 8px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); width: 100%; }

        /* Professional Glass Overlays */
        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: none; flex-direction: column; }
        .glass-header { height: 60px; display: flex; align-items: center; padding: 0 15px; background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        /* Your Professional Back Arrow */
        .back-btn { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-right: 10px; }
        .back-btn svg { width: 24px; height: 24px; fill: none; stroke: white; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

        /* Bottom Menu */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #0f021f; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #777; }
        .main-action { width: 55px; height: 55px; background: linear-gradient(45deg, #8E24AA, var(--primary)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-top: -30px; border: 4px solid var(--bg); box-shadow: 0 5px 15px rgba(255, 45, 85, 0.4); }

        /* Room Interior */
        #room-ui { position: fixed; inset: 0; background: linear-gradient(180deg, #1e0836, #0b0118); z-index: 6000; display: none; flex-direction: column; }
        .seat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 30px; flex: 1; }
        .seat { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .seat-circle { width: 70px; height: 70px; border-radius: 50%; background: rgba(255,255,255,0.03); border: 2px dashed rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; }
        .seat-circle.active { border: 2px solid var(--gold); border-style: solid; }
        .speaking { border-color: var(--primary) !important; box-shadow: 0 0 15px var(--primary); }
    </style>
</head>
<body>

<div id="home-screen">
    <div class="top-bar">
        <div class="tabs">
            <span class="tab active">Popular</span>
            <span class="tab" onclick="openOverlay('global-screen')">Global</span>
        </div>
        <div style="display:flex; gap:15px;">
            <span onclick="openOverlay('rank-screen')">🏆</span>
            <span onclick="openOverlay('search-screen')">🔍</span>
        </div>
    </div>
    <div class="feed-container" id="roomGrid"></div>
</div>

<!-- Overlays with Glass Effect & Professional Back Arrows -->
<div id="rank-screen" class="overlay">
    <div class="glass-header">
        <div class="back-btn" onclick="closeOverlay('rank-screen')">
            <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </div>
        <span style="font-weight:700;">Leaderboard</span>
    </div>
    <div style="padding:20px; text-align:center; color:var(--gold);">Ranking will update daily at 00:00</div>
</div>

<div id="search-screen" class="overlay">
    <div class="glass-header">
        <div class="back-btn" onclick="closeOverlay('search-screen')">
            <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </div>
        <input type="text" placeholder="Search ID or Room..." style="background:transparent; border:none; color:white; outline:none; width:100%;">
    </div>
</div>

<div id="global-screen" class="overlay">
    <div class="glass-header">
        <div class="back-btn" onclick="closeOverlay('global-screen')">
            <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </div>
        <span style="font-weight:700;">Global Regions</span>
    </div>
</div>

<!-- Room Interior -->
<div id="room-ui">
    <div style="padding:15px; display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.2);">
        <div style="font-weight:800;" id="roomTitle">Party Room</div>
        <div onclick="exitRoom()" style="font-size:24px;">✕</div>
    </div>
    <div class="seat-grid">
        <script>
            for(let i=1; i<=9; i++) {
                document.write(`
                    <div class="seat" onclick="takeSeat(${i})">
                        <div class="seat-circle" id="s-orb-${i}">👤</div>
                        <div style="font-size:10px; color:#666;" id="s-name-${i}">Empty</div>
                    </div>
                `);
            }
        </script>
    </div>
    <div style="height:100px; display:flex; justify-content:center; align-items:center;">
        <div id="mic-trigger" style="width:60px; height:60px; background:rgba(255,255,255,0.1); border-radius:50%; display:none; align-items:center; justify-content:center; font-size:24px;" onclick="toggleMic()">🎙️</div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item">🏠<span>Home</span></div>
    <div class="nav-item">🕒<span>History</span></div>
    <div class="main-action" onclick="enterRoom('My Party')">🎙️</div>
    <div class="nav-item">💬<span>Chat</span></div>
    <div class="nav-item"><img src="https://i.pravatar.cc/30" style="border-radius:50%;"><span>Me</span></div>
</div>

<script>
    // --- গুরুত্বপূর্ণ: এখানে আপনার ZegoCloud থেকে পাওয়া আইডি বসান ---
    const ZEGO_APP_ID = 000000000; // আপনার AppID দিন (নম্বর)
    const ZEGO_SERVER_SECRET = "আপনার_সার্ভার_সিক্রেট_এখানে_দিন"; 
    
    let zEngine = null, mySeat = null, micOn = false, currentUser = {name: "Guest", avatar: "https://i.pravatar.cc/100"};

    window.onload = () => {
        // রুম গ্রিড তৈরি
        const grid = document.getElementById('roomGrid');
        for(let i=1; i<=10; i++) {
            grid.innerHTML += `
                <div class="room-card" onclick="enterRoom('Pata Room ${i}')">
                    <img src="https://picsum.photos/seed/${i+20}/300/400">
                    <div class="room-info">
                        <div style="font-size:12px; font-weight:700;">Live Party ${i}</div>
                        <div style="font-size:9px; color:var(--gold);">ID: 1000${i}</div>
                    </div>
                </div>
            `;
        }
    };

    async function enterRoom(name) {
        document.getElementById('room-ui').style.display = 'flex';
        document.getElementById('roomTitle').innerText = name;
        // ZegoCloud Initialization এখানে হবে
    }

    function exitRoom() {
        if(mySeat) takeSeat(mySeat);
        document.getElementById('room-ui').style.display = 'none';
    }

    function takeSeat(n) {
        const orb = document.getElementById('s-orb-'+n);
        const nameLabel = document.getElementById('s-name-'+n);
        if(mySeat === n) {
            orb.innerHTML = '👤'; orb.classList.remove('active'); nameLabel.innerText = 'Empty';
            mySeat = null; document.getElementById('mic-trigger').style.display = 'none';
        } else if(!mySeat) {
            orb.innerHTML = `<img src="${currentUser.avatar}" style="width:100%; border-radius:50%;">`;
            orb.classList.add('active'); nameLabel.innerText = currentUser.name;
            mySeat = n; document.getElementById('mic-trigger').style.display = 'flex';
        }
    }

    function toggleMic() {
        micOn = !micOn;
        const btn = document.getElementById('mic-trigger');
        const orb = document.getElementById('s-orb-'+mySeat);
        btn.style.background = micOn ? 'var(--primary)' : 'rgba(255,255,255,0.1)';
        micOn ? orb.classList.add('speaking') : orb.classList.remove('speaking');
    }

    function openOverlay(id) { document.getElementById(id).style.display = 'flex'; }
    function closeOverlay(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
