<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pata Live - Professional Fix</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF2D55;
            --secondary: #8E24AA;
            --bg: #0b0118;
            --card-bg: #1e1e30;
            --text-gray: #b0b0b0;
            --gold: #FFD700;
            --glass: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }

        /* Header & Tabs */
        .header { height: 65px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: sticky; top: 0; background: var(--bg); z-index: 1000; }
        .tabs-container { flex: 1; overflow-x: auto; scrollbar-width: none; }
        .tabs { display: flex; gap: 20px; align-items: center; }
        .tab { font-size: 14px; color: var(--text-gray); font-weight: 600; cursor: pointer; padding: 10px 0; position: relative; }
        .tab.active { color: white; font-size: 16px; border-bottom: 3.5px solid var(--primary); }

        .top-icons { display: flex; gap: 18px; font-size: 22px; margin-left: 15px; cursor: pointer; }

        /* Feed Grid */
        .feed-container { padding: 12px; padding-bottom: 100px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .room-card { aspect-ratio: 1/1.2; border-radius: 18px; overflow: hidden; position: relative; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.06); }
        .room-card img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { position: absolute; bottom: 0; width: 100%; padding: 10px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); }

        /* Professional Overlays (Glass UI) */
        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 8000; display: none; flex-direction: column; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .overlay-header { height: 65px; display: flex; align-items: center; padding: 0 15px; background: var(--glass); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.08); }
        .back-icon { font-size: 26px; cursor: pointer; margin-right: 15px; display: flex; align-items: center; }

        /* Search Input */
        .search-bar { flex: 1; background: rgba(255,255,255,0.05); border: none; border-radius: 20px; padding: 10px 15px; color: white; outline: none; font-size: 15px; }

        /* Ranking UI */
        .podium { display: flex; align-items: flex-end; justify-content: center; gap: 15px; padding: 30px 10px; background: linear-gradient(180deg, #2a0845, var(--bg)); }
        .podium-user { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .p-img { border-radius: 50%; border: 3px solid #666; width: 70px; height: 70px; object-fit: cover; }
        .rank-1 .p-img { width: 90px; height: 90px; border-color: var(--gold); }

        /* Bottom Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: rgba(15, 2, 31, 0.98); display: flex; align-items: center; justify-content: space-evenly; border-top: 1px solid rgba(255,255,255,0.1); z-index: 2000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: var(--text-gray); cursor: pointer; }
        .nav-mic { width: 60px; height: 60px; background: linear-gradient(45deg, var(--secondary), var(--primary)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; position: relative; top: -15px; border: 4px solid var(--bg); box-shadow: 0 5px 20px rgba(255, 45, 85, 0.4); }

        /* Audio Room Interior */
        #audio-room { position: fixed; inset: 0; background: linear-gradient(180deg, #1e0836, #0b0118); z-index: 9000; display: none; flex-direction: column; }
        .seats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 40px 20px; }
        .seat { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .seat-circle { width: 70px; height: 70px; border-radius: 50%; background: rgba(255,255,255,0.06); border: 2px dashed rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; }
        .seat-circle img { width: 100%; height: 100%; border-radius: 50%; }
    </style>
</head>
<body>

<!-- Main App -->
<div id="main-app">
    <div class="header">
        <div class="tabs-container">
            <div class="tabs">
                <div class="tab">Follow</div>
                <div class="tab">Popular</div>
                <div class="tab">New</div>
                <div class="tab">Explore</div>
                <div class="tab active">Global</div>
            </div>
        </div>
        <div class="top-icons">
            <span onclick="toggleOverlay('ranking-overlay', true)">🏆</span>
            <span onclick="toggleOverlay('search-overlay', true)">🔍</span>
        </div>
    </div>

    <div class="feed-container" id="roomFeed">
        <!-- JS দ্বারা ১৬টি রুম তৈরি হবে -->
    </div>

    <div class="bottom-nav">
        <div class="nav-item"><span>🏠</span>Home</div>
        <div class="nav-item"><span>🕒</span>History</div>
        <div class="nav-mic">🎙️</div>
        <div class="nav-item"><span>💬</span>Message</div>
        <div class="nav-item"><span>👤</span>Me</div>
    </div>
</div>

<!-- Professional Ranking Overlay -->
<div id="ranking-overlay" class="overlay">
    <div class="overlay-header">
        <span class="back-icon" onclick="toggleOverlay('ranking-overlay', false)">←</span>
        <span style="font-weight:700;">Daily Ranking</span>
    </div>
    <div style="flex:1; overflow-y:auto;">
        <div class="podium">
            <div class="podium-user"><img src="https://i.pravatar.cc/100?u=2" class="p-img"><span>King_02</span></div>
            <div class="podium-user rank-1"><img src="https://i.pravatar.cc/100?u=1" class="p-img"><span>TOP_ONE</span></div>
            <div class="podium-user"><img src="https://i.pravatar.cc/100?u=3" class="p-img"><span>Star_03</span></div>
        </div>
        <div id="rankList" style="padding:10px;"></div>
    </div>
</div>

<!-- Professional Search Overlay -->
<div id="search-overlay" class="overlay">
    <div class="overlay-header">
        <span class="back-icon" onclick="toggleOverlay('search-overlay', false)">←</span>
        <input type="text" class="search-bar" placeholder="Search ID (e.g. 101)" id="searchIn" oninput="liveSearch()">
    </div>
    <div id="searchRes" style="padding:20px;"></div>
</div>

<!-- Audio Room View -->
<div id="audio-room">
    <div style="padding:20px; display:flex; justify-content:space-between; align-items:center;">
        <div style="font-weight:800; font-size:16px;" id="activeTitle">Room Name</div>
        <div onclick="exitRoom()" style="font-size:24px;">✕</div>
    </div>
    <div class="seats-grid">
        <script>
            for(let i=1; i<=9; i++) {
                document.write(`
                    <div class="seat" onclick="takeSeat(${i})">
                        <div class="seat-circle" id="s-${i}">👤</div>
                        <div style="font-size:10px; color:#666;" id="n-${i}">Empty</div>
                    </div>
                `);
            }
        </script>
    </div>
</div>

<script>
    // App Initialization
    window.onload = function() {
        loadRooms();
    };

    function loadRooms() {
        const feed = document.getElementById('roomFeed');
        feed.innerHTML = '';
        for(let i=1; i<=16; i++) {
            feed.innerHTML += `
                <div class="room-card" onclick="joinRoom('Premium Room ${i}')">
                    <img src="https://picsum.photos/seed/${i+100}/400/500">
                    <div class="card-info">
                        <div style="font-weight:700; font-size:13px;">Audio Room ${i}</div>
                        <div style="font-size:10px; color:var(--text-gray);">Host: User_${i}00</div>
                    </div>
                </div>`;
        }
    }

    function toggleOverlay(id, show) {
        document.getElementById(id).style.display = show ? 'flex' : 'none';
        if(id === 'ranking-overlay' && show) renderRankList();
    }

    function renderRankList() {
        const list = document.getElementById('rankList');
        let html = '';
        for(let i=4; i<=20; i++) {
            html += `
                <div style="display:flex; align-items:center; padding:12px; border-bottom:1px solid #1a1a2e;">
                    <span style="width:30px; font-weight:bold; color:#444;">${i}</span>
                    <img src="https://i.pravatar.cc/100?u=${i}" style="width:40px; border-radius:50%; margin-right:15px;">
                    <div style="flex:1;">Global_User_${i}</div>
                    <div style="color:var(--gold); font-weight:800;">${(20-i)*100} XP</div>
                </div>`;
        }
        list.innerHTML = html;
    }

    function liveSearch() {
        const val = document.getElementById('searchIn').value;
        const res = document.getElementById('searchRes');
        if(!val) { res.innerHTML = ''; return; }
        res.innerHTML = `
            <div style="background:var(--card-bg); padding:15px; border-radius:15px; display:flex; align-items:center; gap:15px;">
                <img src="https://i.pravatar.cc/100?u=${val}" style="width:50px; border-radius:50%;">
                <div style="flex:1;">User_ID_${val}</div>
                <button style="background:var(--primary); border:none; color:white; padding:6px 15px; border-radius:20px;">Follow</button>
            </div>`;
    }

    function joinRoom(name) {
        document.getElementById('audio-room').style.display = 'flex';
        document.getElementById('activeTitle').innerText = name;
    }

    function exitRoom() { document.getElementById('audio-room').style.display = 'none'; }

    function takeSeat(i) {
        const s = document.getElementById('s-'+i);
        const n = document.getElementById('n-'+i);
        s.innerHTML = `<img src="https://i.pravatar.cc/100?u=me">`;
        s.style.border = "2px solid var(--gold)";
        n.innerText = "Ayan_King";
        n.style.color = "white";
    }
</script>
</body>
</html>
