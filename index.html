<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pata Live - Poppo Professional UI</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF2D55;
            --secondary: #8E24AA;
            --bg: #0b0118;
            --poppo-purple: #1a0b2e;
            --glass: rgba(255, 255, 255, 0.75);
            --gold: #FFD700;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; overflow: hidden; height: 100vh; }

        /* --- লগইন স্ক্রিন (আপনার অরিজিনাল গ্লাস ইফেক্ট অক্ষত রাখা হয়েছে) --- */
        #auth-screen { 
            position: fixed; inset: 0; 
            background: linear-gradient(180deg, #A4C1FF 0%, #E2EDFF 40%, #FFFFFF 100%);
            display: flex; flex-direction: column; align-items: center; z-index: 5000;
            padding: 40px 20px;
        }
        .logo-wrapper {
            width: 100px; height: 100px; background: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 10px; border: 3px solid var(--primary);
        }
        .app-name { font-size: 24px; font-weight: 800; color: #111; margin-bottom: 30px; }
        .glass-field {
            width: 100%; max-width: 400px; background: var(--glass); backdrop-filter: blur(10px);
            height: 55px; border-radius: 50px; display: flex; align-items: center; padding: 0 20px; margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .prefix { display: flex; align-items: center; gap: 8px; padding-right: 12px; border-right: 1px solid rgba(0,0,0,0.1); font-weight: 700; color: #333; }
        .glass-field input { flex: 1; border: none; outline: none; font-size: 15px; background: transparent; padding: 0 15px; color: #111; }
        .login-btn { width: 100%; max-width: 400px; height: 55px; border-radius: 50px; border: none; background: var(--primary); color: #fff; font-size: 16px; font-weight: 700; margin-top: 10px; }
        .social-row { display: flex; gap: 20px; margin-top: 20px; }
        .social-circle { width: 50px; height: 50px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }

        /* --- মেইন অ্যাপ --- */
        .app-shell { display: none; flex-direction: column; height: 100vh; }
        .feed-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .live-card { aspect-ratio: 1/1.2; border-radius: 15px; overflow: hidden; position: relative; background: #1e1e30; }
        .live-card img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { position: absolute; bottom: 0; width: 100%; padding: 8px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); }

        /* --- অডিও রুম ইন্টারফেস (স্ক্রিনশট অনুযায়ী) --- */
        #room-view { 
            position: fixed; inset: 0; 
            background: linear-gradient(180deg, #2b0c4a 0%, #09011a 100%); 
            z-index: 6000; display: none; flex-direction: column;
        }
        
        /* রুম হেডার */
        .r-header { height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; margin-top: 10px; }
        .r-host-box { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); padding: 5px 12px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .r-host-img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--gold); }
        .r-host-id { font-size: 10px; color: var(--gold); }

        /* সিট গ্রিড (৩x৩ লেআউট - স্ক্রিনশট অনুযায়ী) */
        .seat-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 15px; padding: 20px; width: 100%; max-width: 400px; 
            margin: 20px auto;
        }
        .seat { display: flex; flex-direction: column; align-items: center; position: relative; }
        .seat-frame { 
            width: 75px; height: 75px; border-radius: 12px; 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center; position: relative;
            transition: 0.3s;
        }
        .seat-frame.occupied { border: 2px solid var(--gold); background: rgba(255,215,0,0.05); }
        .seat-frame img { width: 100%; height: 100%; border-radius: 10px; object-fit: cover; }
        .seat-crown { position: absolute; top: -15px; width: 30px; display: none; }
        .seat-frame.occupied .seat-crown { display: block; }
        
        .seat-tag { position: absolute; bottom: -5px; background: rgba(0,0,0,0.7); font-size: 9px; padding: 2px 6px; border-radius: 8px; color: white; }
        .seat-name { margin-top: 10px; font-size: 11px; color: #bbb; text-align: center; width: 80px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

        /* চ্যাট এরিয়া */
        .room-chat { flex: 1; padding: 15px; overflow-y: auto; font-size: 13px; display: flex; flex-direction: column; gap: 8px; }
        .chat-msg { background: rgba(0,0,0,0.2); padding: 6px 12px; border-radius: 15px; width: fit-content; max-width: 80%; }
        .chat-msg span { color: var(--gold); font-weight: 600; margin-right: 5px; }

        /* রুম ফুটার কন্ট্রোল */
        .r-footer { height: 70px; display: flex; align-items: center; justify-content: space-around; padding: 0 10px; background: rgba(0,0,0,0.5); }
        .icon-btn { width: 42px; height: 42px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .gift-btn { width: 55px; height: 55px; background: linear-gradient(45deg, #f32c56, #8e24aa); border-radius: 50%; font-size: 28px; box-shadow: 0 4px 15px rgba(243, 44, 86, 0.4); }

        /* নিচের নেভিগেশন */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #0f021f; display: flex; align-items: center; justify-content: space-around; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-item { color: #888; font-size: 10px; text-align: center; }
        .nav-item.active { color: var(--primary); }
        .mic-trigger { width: 55px; height: 55px; background: linear-gradient(45deg, #8E24AA, #FF2D55); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-top: -30px; border: 4px solid var(--bg); }
    </style>
</head>
<body>

<!-- Login Screen (অরিজিনাল গ্লাস ইফেক্ট) -->
<div id="auth-screen">
    <div class="logo-wrapper"><img src="https://i.ibb.co/VYpYmRj/pata-logo.png" width="70"></div>
    <h1 class="app-name">Pata Live</h1>
    <div class="glass-field">
        <div class="prefix">🇧🇩<span>+880</span></div>
        <input type="tel" placeholder="Phone Number">
    </div>
    <div class="glass-field"><input type="password" placeholder="Password"></div>
    <button class="login-btn" onclick="alert('Please login with Google')">Log in</button>
    <div style="margin: 20px 0; color: #666; font-size: 14px;">Or login with</div>
    <div class="social-row">
        <div class="social-circle" onclick="googleLogin()"><img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" width="25"></div>
        <div class="social-circle"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" width="25"></div>
    </div>
</div>

<!-- Main App -->
<div class="app-shell" id="app-shell">
    <div style="padding: 15px; font-size: 20px; font-weight: 800;">Pata Live</div>
    <div id="roomList" class="feed-grid"></div>
    <div class="bottom-nav">
        <div class="nav-item active">🏠<br>Home</div>
        <div class="nav-item">🕒<br>Explore</div>
        <div class="mic-trigger" onclick="createRoom()">🎙️</div>
        <div class="nav-item">💬<br>Chat</div>
        <div class="nav-item">👤<br>Me</div>
    </div>
</div>

<!-- PROFESSIONAL AUDIO ROOM (স্ক্রিনশট অনুযায়ী সংশোধিত) -->
<div id="room-view">
    <div class="r-header">
        <div class="r-host-box">
            <img id="host-img" class="r-host-img" src="">
            <div style="display:flex; flex-direction:column;">
                <span id="host-name" style="font-size:12px; font-weight:700;">Host Name</span>
                <span id="room-id-label" class="r-host-id">ID: 00000</span>
            </div>
        </div>
        <div style="display:flex; gap:12px; align-items:center;">
            <div style="background:rgba(255,255,255,0.1); padding:4px 10px; border-radius:20px; font-size:12px;">👥 1.2k</div>
            <div onclick="exitRoom()" style="font-size:24px; padding:5px;">✕</div>
        </div>
    </div>

    <!-- ৩x৩ সিট গ্রিড -->
    <div class="seat-grid" id="seatGrid">
        <script>
            for(let i=1; i<=9; i++) {
                document.write(`
                    <div class="seat" onclick="toggleSeat(${i})">
                        <div class="seat-frame" id="seat-${i}">
                            <img src="https://i.ibb.co/h97p68X/crown.png" class="seat-crown">
                            <span style="font-size:20px; opacity:0.2;">🛋️</span>
                            <div class="seat-tag">${i}</div>
                        </div>
                        <div class="seat-name" id="name-${i}">Empty</div>
                    </div>
                `);
            }
        </script>
    </div>

    <div class="room-chat" id="chatBox">
        <div class="chat-msg"><span>System:</span> Welcome to Pata Live! Follow the rules and enjoy.</div>
    </div>

    <div class="r-footer">
        <div class="icon-btn" onclick="toggleMic()">🎙️</div>
        <div class="icon-btn">💬</div>
        <div class="gift-btn" onclick="alert('Opening Gift Shop...')">🎁</div>
        <div class="icon-btn">🎮</div>
        <div class="icon-btn">⚙️</div>
    </div>
</div>

<script>
    // Firebase Configuration (আপনার প্রজেক্ট আইডি অনুযায়ী)
    const firebaseConfig = {
        apiKey: "AIzaSyD5vRGyz3qdyqhnt2T9qmlPlTeQKV5Hlbw",
        authDomain: "pata-live.firebaseapp.com",
        databaseURL: "https://pata-live-default-rtdb.firebaseio.com/",
        projectId: "pata-live",
        storageBucket: "pata-live.firebasestorage.app",
        messagingSenderId: "644016212127",
        appId: "1:644016212127:web:214bc06f4677c8188e7aaa"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let currentRoomId = null;
    let mySeat = null;

    // Google Login
    function googleLogin() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider);
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-shell').style.display = 'flex';
            listenRooms();
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('app-shell').style.display = 'none';
        }
    });

    function listenRooms() {
        db.ref('audio_rooms').on('value', snap => {
            const list = document.getElementById('roomList');
            list.innerHTML = '';
            snap.forEach(child => {
                const r = child.val();
                list.innerHTML += `
                    <div class="live-card" onclick="joinRoom('${child.key}')">
                        <img src="${r.hostAvatar}">
                        <div class="card-info">
                            <div style="font-weight:700;">${r.roomName}</div>
                            <div style="font-size:10px; color:#ccc;">${r.hostName}</div>
                        </div>
                    </div>`;
            });
        });
    }

    function createRoom() {
        const user = auth.currentUser;
        const rid = Math.floor(10000 + Math.random() * 90000);
        db.ref('audio_rooms/' + rid).set({
            roomName: user.displayName + "'s Room",
            hostName: user.displayName,
            hostAvatar: user.photoURL,
            seats: { 1: { uid: user.uid, name: user.displayName, avatar: user.photoURL } }
        });
        joinRoom(rid);
    }

    function joinRoom(id) {
        currentRoomId = id;
        document.getElementById('room-view').style.display = 'flex';
        db.ref('audio_rooms/' + id).on('value', snap => {
            const r = snap.val();
            if(!r) return;
            document.getElementById('host-img').src = r.hostAvatar;
            document.getElementById('host-name').innerText = r.hostName;
            document.getElementById('room-id-label').innerText = "ID: " + id;

            // সিট আপডেট
            for(let i=1; i<=9; i++) {
                const sData = r.seats ? r.seats[i] : null;
                const frame = document.getElementById('seat-'+i);
                const nameLabel = document.getElementById('name-'+i);
                
                if(sData) {
                    frame.innerHTML = `<img src="https://i.ibb.co/h97p68X/crown.png" class="seat-crown" style="display:block"><img src="${sData.avatar}" style="border-radius:10px;"><div class="seat-tag">${i}</div>`;
                    frame.classList.add('occupied');
                    nameLabel.innerText = sData.name;
                } else {
                    frame.innerHTML = `<span style="font-size:20px; opacity:0.2;">🛋️</span><div class="seat-tag">${i}</div>`;
                    frame.classList.remove('occupied');
                    nameLabel.innerText = "Empty";
                }
            }
        });
    }

    function toggleSeat(seatNum) {
        const user = auth.currentUser;
        const roomRef = db.ref('audio_rooms/' + currentRoomId + '/seats/' + seatNum);
        
        roomRef.once('value', snap => {
            if(snap.exists()) {
                if(snap.val().uid === user.uid) {
                    roomRef.remove(); // সিট ছেড়ে দেওয়া
                }
            } else {
                // অন্য সব সিট থেকে আগে নিজেকে রিমুভ করা
                db.ref('audio_rooms/' + currentRoomId + '/seats').once('value', sSnap => {
                    sSnap.forEach(c => { if(c.val().uid === user.uid) c.ref.remove(); });
                    roomRef.set({ uid: user.uid, name: user.displayName, avatar: user.photoURL });
                });
            }
        });
    }

    function toggleMic() {
        const btn = event.currentTarget;
        btn.style.color = btn.style.color === 'red' ? 'white' : 'red';
        // এখানে অডিও স্ট্রিম লজিক অ্যাড করা যাবে
    }

    function exitRoom() {
        if(currentRoomId) {
            db.ref('audio_rooms/' + currentRoomId + '/seats').once('value', snap => {
                snap.forEach(c => { if(c.val().uid === auth.currentUser.uid) c.ref.remove(); });
            });
            db.ref('audio_rooms/' + currentRoomId).off();
        }
        document.getElementById('room-view').style.display = 'none';
    }
</script>

</body>
</html>
