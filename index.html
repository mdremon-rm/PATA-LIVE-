<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pata Live - Professional Audio Room</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF2D55;
            --secondary: #8E24AA;
            --bg: #0b0118;
            --glass: rgba(255, 255, 255, 0.75);
            --gold: #FFD700;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; overflow: hidden; height: 100vh; width: 100vw; }

        /* --- লগইন স্ক্রিন (অরিজিনাল গ্লাস ইফেক্ট অক্ষত) --- */
        #auth-screen { 
            position: fixed; inset: 0; 
            background: linear-gradient(180deg, #A4C1FF 0%, #E2EDFF 40%, #FFFFFF 100%);
            display: flex; flex-direction: column; align-items: center; z-index: 9999;
            padding: 40px 20px;
        }
        .logo-wrapper {
            width: 100px; height: 100px; background: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 10px; border: 3px solid var(--primary);
        }
        .app-name { font-size: 24px; font-weight: 800; color: #111; margin-bottom: 30px; }
        .glass-field {
            width: 100%; max-width: 400px; background: var(--glass); backdrop-filter: blur(10px);
            height: 55px; border-radius: 50px; display: flex; align-items: center; padding: 0 20px; margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .prefix { display: flex; align-items: center; gap: 8px; padding-right: 12px; border-right: 1px solid rgba(0,0,0,0.1); font-weight: 700; color: #333; }
        .glass-field input { flex: 1; border: none; outline: none; font-size: 15px; background: transparent; padding: 0 15px; color: #111; }
        .login-btn { width: 100%; max-width: 400px; height: 55px; border-radius: 50px; border: none; background: var(--primary); color: #fff; font-size: 16px; font-weight: 700; margin-top: 10px; box-shadow: 0 5px 15px rgba(255,45,85,0.3); }
        .social-row { display: flex; gap: 20px; margin-top: 25px; }
        .social-circle { width: 50px; height: 50px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.08); cursor: pointer; }

        /* --- মেইন অ্যাপ হোম স্ক্রিন --- */
        .app-shell { display: none; flex-direction: column; height: 100vh; background: var(--bg); }
        .top-nav-home { padding: 15px; font-size: 22px; font-weight: 800; background: var(--bg); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .feed-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; flex: 1; overflow-y: auto; padding-bottom: 100px; }
        .live-card { aspect-ratio: 1/1.2; border-radius: 18px; overflow: hidden; position: relative; background: #1e1e30; border: 1px solid rgba(255,255,255,0.05); }
        .live-card img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { position: absolute; bottom: 0; width: 100%; padding: 10px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); }

        /* --- অডিও রুম ইন্টারফেস (Poppo Style) --- */
        #room-view { 
            position: fixed; inset: 0; 
            background: linear-gradient(to bottom, #1a0b2e, #0b0118); 
            z-index: 8000; display: none; flex-direction: column;
        }
        
        .r-header { height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; margin-top: 5px; }
        .r-host-box { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.4); padding: 5px 15px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); }
        .r-host-img { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--gold); }
        .r-host-info span:first-child { font-size: 13px; font-weight: 700; color: white; display: block; }
        .r-host-info span:last-child { font-size: 10px; color: var(--gold); font-weight: 600; }

        /* সিট গ্রিড (৩x৩ লেআউট) */
        .seat-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 20px; padding: 20px; width: 100%; max-width: 380px; 
            margin: 20px auto; flex-shrink: 0;
        }
        .seat { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .seat-frame { 
            width: 75px; height: 75px; border-radius: 15px; 
            background: rgba(255,255,255,0.06); border: 2px dashed rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center; position: relative;
            transition: all 0.2s ease;
        }
        .seat-frame.occupied { border: 2.5px solid var(--gold); background: rgba(255, 215, 0, 0.1); border-style: solid; box-shadow: 0 0 15px rgba(255,215,0,0.2); }
        .seat-frame img.user-pic { width: 100%; height: 100%; border-radius: 12px; object-fit: cover; }
        .crown-icon { position: absolute; top: -18px; width: 35px; z-index: 2; display: none; }
        .seat-frame.occupied .crown-icon { display: block; }
        
        .seat-index { position: absolute; bottom: -5px; background: rgba(0,0,0,0.8); font-size: 10px; padding: 2px 7px; border-radius: 10px; color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .seat-name { margin-top: 12px; font-size: 11px; color: #ccc; font-weight: 500; text-align: center; width: 85px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

        /* চ্যাট এরিয়া */
        .room-chat { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .chat-bubble { background: rgba(0,0,0,0.3); padding: 8px 15px; border-radius: 18px; width: fit-content; max-width: 85%; font-size: 13px; border-left: 3px solid var(--primary); }
        .chat-bubble b { color: var(--gold); margin-right: 5px; }

        /* ফুটার কন্ট্রোল */
        .r-footer { height: 80px; display: flex; align-items: center; justify-content: space-around; padding: 0 10px; background: rgba(0,0,0,0.6); border-top: 1px solid rgba(255,255,255,0.05); }
        .ctrl-icon { width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; }
        .gift-box-btn { width: 65px; height: 65px; background: linear-gradient(45deg, #FF2D55, #8E24AA); border-radius: 50%; font-size: 32px; box-shadow: 0 6px 20px rgba(255, 45, 85, 0.5); }

        /* বটম ন্যাভ */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: #0f021f; display: flex; align-items: center; justify-content: space-around; border-top: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .nav-link { color: #888; font-size: 10px; text-align: center; font-weight: 600; text-decoration: none; }
        .nav-link.active { color: var(--primary); }
        .mic-btn-center { width: 62px; height: 62px; background: linear-gradient(45deg, #8E24AA, #FF2D55); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-top: -35px; border: 5px solid var(--bg); box-shadow: 0 8px 20px rgba(255,45,85,0.4); cursor: pointer; }
    </style>
</head>
<body>

<!-- Login Screen -->
<div id="auth-screen">
    <div class="logo-wrapper"><img src="https://i.ibb.co/VYpYmRj/pata-logo.png" width="70"></div>
    <h1 class="app-name">Pata Live</h1>
    <div class="glass-field">
        <div class="prefix">🇧🇩<span>+880</span></div>
        <input type="tel" id="userPhone" placeholder="Phone Number">
    </div>
    <div class="glass-field"><input type="password" id="userPass" placeholder="Password"></div>
    <button class="login-btn" onclick="gLogin()">Log in with Google</button>
    
    <div style="margin: 25px 0; color: #555; font-size: 14px; font-weight: 600;">Or login with</div>
    <div class="social-row">
        <div class="social-circle" onclick="gLogin()"><img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" width="28"></div>
        <div class="social-circle"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" width="28"></div>
    </div>
</div>

<!-- Home Screen -->
<div class="app-shell" id="app-shell">
    <div class="top-nav-home">Pata Live</div>
    <div id="room-list" class="feed-grid"></div>
    
    <div class="nav-bar">
        <div class="nav-link active">🏠<br>Home</div>
        <div class="nav-link">🕒<br>Explore</div>
        <div class="mic-btn-center" onclick="createMyRoom()">🎙️</div>
        <div class="nav-link">💬<br>Chat</div>
        <div class="nav-link">👤<br>Me</div>
    </div>
</div>

<!-- PROFESSIONAL AUDIO ROOM (Fixed Black Screen) -->
<div id="room-view">
    <div class="r-header">
        <div class="r-host-box">
            <img id="host-avatar" class="r-host-img" src="">
            <div class="r-host-info">
                <span id="host-display-name">Host Name</span>
                <span id="room-id-text">ID: 00000</span>
            </div>
        </div>
        <div style="display:flex; gap:12px; align-items:center;">
            <div style="background:rgba(255,255,255,0.15); padding:5px 12px; border-radius:20px; font-size:12px; font-weight:700;">👥 1.4k</div>
            <div onclick="leaveRoom()" style="font-size:26px; padding:5px; cursor:pointer;">✕</div>
        </div>
    </div>

    <!-- ৩x৩ সিট গ্রিড (Poppo Style) -->
    <div class="seat-grid" id="seat-grid-container">
        <script>
            for(let i=1; i<=9; i++) {
                document.write(`
                    <div class="seat" onclick="claimSeat(${i})">
                        <div class="seat-frame" id="frame-${i}">
                            <img src="https://i.ibb.co/h97p68X/crown.png" class="crown-icon">
                            <span style="font-size:22px; opacity:0.25;">🛋️</span>
                            <div class="seat-index">${i}</div>
                        </div>
                        <div class="seat-name" id="label-${i}">Join</div>
                    </div>
                `);
            }
        </script>
    </div>

    <div class="room-chat" id="room-chat-msgs">
        <div class="chat-bubble"><b>System:</b> Welcome to the audio party! Be respectful to others.</div>
    </div>

    <div class="r-footer">
        <div class="ctrl-icon" onclick="toggleMute()">🎙️</div>
        <div class="ctrl-icon">💬</div>
        <div class="gift-box-btn" onclick="alert('Opening Gifting Store...')">🎁</div>
        <div class="ctrl-icon">🎵</div>
        <div class="ctrl-icon">⚙️</div>
    </div>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyD5vRGyz3qdyqhnt2T9qmlPlTeQKV5Hlbw",
        authDomain: "pata-live.firebaseapp.com",
        databaseURL: "https://pata-live-default-rtdb.firebaseio.com/",
        projectId: "pata-live",
        storageBucket: "pata-live.firebasestorage.app",
        messagingSenderId: "644016212127",
        appId: "1:644016212127:web:214bc06f4677c8188e7aaa"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let activeRoomId = null;

    function gLogin() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider);
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-shell').style.display = 'flex';
            initRoomListener();
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('app-shell').style.display = 'none';
        }
    });

    function initRoomListener() {
        db.ref('party_rooms').on('value', snap => {
            const list = document.getElementById('room-list');
            list.innerHTML = '';
            snap.forEach(child => {
                const room = child.val();
                list.innerHTML += `
                    <div class="live-card" onclick="openRoom('${child.key}')">
                        <img src="${room.hostPic}">
                        <div class="card-info">
                            <div style="font-weight:700; font-size:14px;">${room.title}</div>
                            <div style="font-size:10px; color:#ddd;">${room.hostName}</div>
                        </div>
                    </div>`;
            });
        });
    }

    function createMyRoom() {
        const user = auth.currentUser;
        const rid = Math.floor(10000 + Math.random() * 90000);
        db.ref('party_rooms/' + rid).set({
            title: user.displayName + "'s Party",
            hostName: user.displayName,
            hostPic: user.photoURL,
            seats: { 1: { uid: user.uid, name: user.displayName, pic: user.photoURL } }
        });
        openRoom(rid);
    }

    function openRoom(id) {
        activeRoomId = id;
        document.getElementById('room-view').style.display = 'flex';
        
        db.ref('party_rooms/' + id).on('value', snap => {
            const data = snap.val();
            if(!data) return;
            
            document.getElementById('host-avatar').src = data.hostPic;
            document.getElementById('host-display-name').innerText = data.hostName;
            document.getElementById('room-id-text').innerText = "ID: " + id;

            for(let i=1; i<=9; i++) {
                const seatInfo = data.seats ? data.seats[i] : null;
                const frame = document.getElementById('frame-'+i);
                const label = document.getElementById('label-'+i);
                
                if(seatInfo) {
                    frame.innerHTML = `<img src="https://i.ibb.co/h97p68X/crown.png" class="crown-icon" style="display:block"><img src="${seatInfo.pic}" class="user-pic"><div class="seat-index">${i}</div>`;
                    frame.classList.add('occupied');
                    label.innerText = seatInfo.name;
                } else {
                    frame.innerHTML = `<span style="font-size:22px; opacity:0.25;">🛋️</span><div class="seat-index">${i}</div>`;
                    frame.classList.remove('occupied');
                    label.innerText = "Join";
                }
            }
        });
    }

    function claimSeat(num) {
        const user = auth.currentUser;
        const seatRef = db.ref('party_rooms/' + activeRoomId + '/seats/' + num);
        
        seatRef.once('value', snap => {
            if(snap.exists() && snap.val().uid === user.uid) {
                seatRef.remove(); // Leave seat
            } else if(!snap.exists()) {
                // Remove from other seats first
                db.ref('party_rooms/' + activeRoomId + '/seats').once('value', sSnap => {
                    sSnap.forEach(c => { if(c.val().uid === user.uid) c.ref.remove(); });
                    seatRef.set({ uid: user.uid, name: user.displayName, pic: user.photoURL });
                });
            }
        });
    }

    function toggleMute() {
        const btn = event.currentTarget;
        btn.style.background = btn.style.background === 'rgb(255, 45, 85)' ? 'rgba(255,255,255,0.1)' : 'rgb(255, 45, 85)';
    }

    function leaveRoom() {
        if(activeRoomId) {
            db.ref('party_rooms/' + activeRoomId + '/seats').once('value', snap => {
                snap.forEach(c => { if(c.val().uid === auth.currentUser.uid) c.ref.remove(); });
            });
            db.ref('party_rooms/' + activeRoomId).off();
        }
        document.getElementById('room-view').style.display = 'none';
        activeRoomId = null;
    }
</script>

</body>
</html>
