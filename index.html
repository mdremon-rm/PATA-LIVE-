<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pata Live - Original Master Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF2D55;
            --secondary: #8E24AA;
            --bg: #0b0118;
            --card-bg: #1e1e30;
            --text-gray: #b0b0b0;
            --gold: #FFD700;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }

        .app-shell { display: flex; flex-direction: column; min-height: 100vh; }

        /* Auth Screen Styling */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .auth-input { width: 100%; max-width: 300px; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #444; background: #1a1a2e; color: white; }
        .auth-btn { width: 100%; max-width: 300px; padding: 12px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; }

        .top-bar { 
            height: 60px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 15px; background: var(--bg); position: sticky; top: 0; z-index: 1000; 
        }
        .header-tabs-container { flex: 1; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .header-tabs { display: flex; gap: 20px; align-items: center; }
        .h-tab { font-size: 15px; color: var(--text-gray); font-weight: 600; cursor: pointer; padding: 8px 0; position: relative; }
        .h-tab.active { color: white; font-size: 17px; }
        .h-tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: var(--primary); border-radius: 10px; }

        .banner-section { padding: 10px 15px; }
        .banner-container { width: 100%; height: 140px; border-radius: 15px; overflow: hidden; }
        .banner-track { display: flex; width: 300%; height: 100%; transition: 0.5s; }
        .banner-track img { width: 33.33%; height: 100%; object-fit: cover; }

        .screen-container { flex: 1; padding: 12px; padding-bottom: 100px; }
        .feed-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .live-card { aspect-ratio: 1/1.25; border-radius: 20px; overflow: hidden; position: relative; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); }
        .live-card img { width: 100%; height: 100%; object-fit: cover; }
        .live-tag { position: absolute; top: 10px; left: 10px; background: var(--primary); font-size: 9px; font-weight: 800; padding: 3px 8px; border-radius: 20px; z-index: 5; }
        .card-footer { position: absolute; bottom: 0; width: 100%; padding: 12px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); }

        .bottom-nav-pro { 
            position: fixed; bottom: 0; width: 100%; height: 80px; 
            background: rgba(15, 2, 31, 0.98); backdrop-filter: blur(20px); 
            display: flex; align-items: center; justify-content: space-evenly; 
            border-top: 1px solid rgba(255, 255, 255, 0.1); z-index: 2000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-gray); font-size: 10px; cursor: pointer; min-width: 50px; }
        .nav-item.active { color: var(--primary); }
        .nav-item span { font-size: 24px; margin-bottom: 4px; }
        
        .nav-mic-btn { 
            width: 65px; height: 65px; background: linear-gradient(45deg, var(--secondary), var(--primary)); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 30px; color: white; position: relative; top: -25px; 
            border: 4px solid var(--bg); box-shadow: 0 8px 25px rgba(255, 45, 85, 0.5); 
            cursor: pointer; z-index: 2001;
        }

        /* Room Overlay UI */
        #room-overlay { position: fixed; inset: 0; background: linear-gradient(to bottom, #1e0836, #0b0118); z-index: 6000; display: none; flex-direction: column; }
        .room-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .host-pill { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.4); padding: 5px 15px; border-radius: 25px; }
        .host-pill img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--gold); }
        .seats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px; flex: 1; align-content: flex-start; }
        .seat { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .seat-circle { width: 75px; height: 75px; border-radius: 20px; background: rgba(255,255,255,0.05); border: 1px dashed #555; display: flex; align-items: center; justify-content: center; position: relative; }
        .seat-circle img { width: 100%; height: 100%; border-radius: 18px; object-fit: cover; }
        .seat-circle.occupied { border: 2px solid var(--gold); border-style: solid; }
        .chat-box { height: 120px; padding: 15px; overflow-y: auto; background: rgba(0,0,0,0.2); margin: 10px; border-radius: 10px; }
        .room-footer-actions { height: 70px; display: flex; justify-content: space-around; align-items: center; padding-bottom: 10px; }
    </style>
</head>
<body>

<!-- User Auth -->
<div id="auth-overlay">
    <h2 style="margin-bottom: 20px;">Pata Live Login</h2>
    <input type="email" id="userEmail" class="auth-input" placeholder="Email">
    <input type="password" id="userPass" class="auth-input" placeholder="Password">
    <button class="auth-btn" onclick="handleAuth()">Login / Sign Up</button>
</div>

<div class="app-shell" id="appMain" style="display:none;">
    <div class="top-bar">
        <div class="header-tabs-container">
            <div class="header-tabs">
                <div class="h-tab">Follow</div>
                <div class="h-tab active">Popular</div>
                <div class="h-tab">New</div>
                <div class="h-tab">Explore</div>
            </div>
        </div>
        <div style="display:flex; gap:15px; font-size:20px; padding-left:10px;">
            <span>🏆</span>
            <span onclick="editProfile()">👤</span>
        </div>
    </div>

    <div class="banner-section">
        <div class="banner-container">
            <div class="banner-track" id="bTrack">
                <img src="https://picsum.photos/seed/s1/800/400">
                <img src="https://picsum.photos/seed/s2/800/400">
                <img src="https://picsum.photos/seed/s3/800/400">
            </div>
        </div>
    </div>

    <div class="screen-container">
        <div class="feed-grid" id="gridPopular"></div>
    </div>

    <nav class="bottom-nav-pro">
        <div class="nav-item active"><span>🏠</span>Home</div>
        <div class="nav-item"><span>🕒</span>History</div>
        <div class="nav-mic-btn" onclick="startLive()">🎙️</div>
        <div class="nav-item"><span>💬</span>Message</div>
        <div class="nav-item"><span>👤</span>Me</div>
    </nav>
</div>

<!-- Professional Room UI -->
<div id="room-overlay">
    <div class="room-header">
        <div class="host-pill">
            <img id="hostImg" src="https://i.pravatar.cc/100">
            <div>
                <div id="roomTitle" style="font-size: 13px; font-weight: 700;">Party Room</div>
                <div id="roomIdShow" style="font-size: 10px; color: var(--gold);">ID: 000000</div>
            </div>
        </div>
        <div onclick="leaveRoom()" style="font-size: 24px;">✕</div>
    </div>
    
    <div class="seats-grid" id="seatsGrid">
        <!-- 3x3 Seats -->
        <script>
            for(let i=1; i<=9; i++) {
                document.write(`
                    <div class="seat" onclick="takeSeat(${i})">
                        <div class="seat-circle" id="seat-${i}">
                            <span style="font-size: 24px; opacity: 0.1;">🛋️</span>
                        </div>
                        <div id="seat-name-${i}" style="font-size: 10px; color: #888;">Wait</div>
                    </div>
                `);
            }
        </script>
    </div>

    <div class="chat-box" id="roomChat">
        <div style="font-size: 12px; color: var(--gold);">Welcome to Pata Live Room!</div>
    </div>

    <div class="room-footer-actions">
        <div style="font-size: 24px;">🎙️</div>
        <div style="font-size: 24px;" onclick="sendComment()">💬</div>
        <div style="font-size: 35px; background: var(--primary); width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center;" onclick="sendGift()">🎁</div>
        <div style="font-size: 24px;">🎵</div>
        <div style="font-size: 24px;">⚙️</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD5vRGyz3qdyqhnt2T9qmlPlTeQKV5Hlbw",
        authDomain: "pata-live.firebaseapp.com",
        databaseURL: "https://pata-live-default-rtdb.firebaseio.com/",
        projectId: "pata-live",
        storageBucket: "pata-live.firebasestorage.app",
        messagingSenderId: "644016212127",
        appId: "1:644016212127:web:214bc06f4677c8188e7aaa"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    let currentUser = null;
    let activeRoomId = null;

    // --- Authentication ---
    async function handleAuth() {
        const email = document.getElementById('userEmail').value;
        const pass = document.getElementById('userPass').value;
        if(!email || !pass) return alert("Enter details");
        try {
            await auth.signInWithEmailAndPassword(email, pass);
        } catch (e) {
            if(e.code === 'auth/user-not-found') {
                await auth.createUserWithEmailAndPassword(email, pass);
            } else alert(e.message);
        }
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            currentUser = user;
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('appMain').style.display = 'flex';
            loadUserAndRooms();
        } else {
            document.getElementById('auth-overlay').style.display = 'flex';
            document.getElementById('appMain').style.display = 'none';
        }
    });

    function loadUserAndRooms() {
        database.ref('live_rooms').on('value', (snap) => {
            const grid = document.getElementById('gridPopular');
            if(!grid) return;
            grid.innerHTML = '';
            snap.forEach(child => {
                const room = child.val();
                grid.innerHTML += `
                    <div class="live-card" onclick="joinRoom('${child.key}')">
                        <img src="${room.hostAvatar || 'https://picsum.photos/seed/'+child.key+'/400/500'}">
                        <div class="live-tag">LIVE</div>
                        <div class="card-footer">
                            <div style="font-weight:700;">${room.name}</div>
                            <div style="font-size:10px; color:#bbb;">Host: ${room.host}</div>
                        </div>
                    </div>`;
            });
        });
    }

    // --- Profile ---
    function editProfile() {
        const newName = prompt("আপনার নতুন নাম দিন:");
        if(newName) {
            database.ref('users/' + currentUser.uid).update({name: newName});
            alert("প্রোফাইল আপডেট হয়েছে!");
        }
    }

    // --- Room Logic ---
    async function startLive() {
        const name = prompt("রুমের নাম:");
        if(name) {
            const rid = Math.floor(100000 + Math.random() * 900000);
            const userSnap = await database.ref('users/' + currentUser.uid).once('value');
            const userName = userSnap.exists() ? userSnap.val().name : "User_" + rid;
            
            database.ref('live_rooms/' + rid).set({
                name: name,
                host: userName,
                hostUid: currentUser.uid,
                hostAvatar: "https://i.pravatar.cc/150?u=" + currentUser.uid
            });
            joinRoom(rid);
        }
    }

    function joinRoom(id) {
        activeRoomId = id;
        document.getElementById('room-overlay').style.display = 'flex';
        database.ref('live_rooms/' + id).on('value', snap => {
            const data = snap.val();
            if(!data) return;
            document.getElementById('roomTitle').innerText = data.name;
            document.getElementById('roomIdShow').innerText = "ID: " + id;
            document.getElementById('hostImg').src = data.hostAvatar;

            // Update Seats
            for(let i=1; i<=9; i++) {
                const seat = data.seats ? data.seats[i] : null;
                const circle = document.getElementById('seat-'+i);
                const nameLabel = document.getElementById('seat-name-'+i);
                if(seat) {
                    circle.innerHTML = `<img src="${seat.avatar}">`;
                    circle.classList.add('occupied');
                    nameLabel.innerText = seat.name;
                } else {
                    circle.innerHTML = `<span style="font-size: 24px; opacity: 0.1;">🛋️</span>`;
                    circle.classList.remove('occupied');
                    nameLabel.innerText = "Wait";
                }
            }
        });
    }

    function takeSeat(num) {
        database.ref('live_rooms/' + activeRoomId + '/seats/' + num).set({
            uid: currentUser.uid,
            name: currentUser.email.split('@')[0],
            avatar: "https://i.pravatar.cc/150?u=" + currentUser.uid
        });
    }

    function sendComment() {
        const msg = prompt("কমেন্ট লিখুন:");
        if(msg) {
            const chat = document.getElementById('roomChat');
            chat.innerHTML += `<div><b>${currentUser.email.split('@')[0]}:</b> ${msg}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    }

    function sendGift() {
        alert("গিফট পাঠানো হয়েছে!");
        const chat = document.getElementById('roomChat');
        chat.innerHTML += `<div style="color:var(--primary)"><b>${currentUser.email.split('@')[0]}</b> sent a gift 🎁</div>`;
    }

    function leaveRoom() {
        if(activeRoomId) database.ref('live_rooms/' + activeRoomId).off();
        document.getElementById('room-overlay').style.display = 'none';
        activeRoomId = null;
    }

    // --- Banner Logic ---
    let step = 0;
    setInterval(() => {
        step = (step + 1) % 3;
        const track = document.getElementById('bTrack');
        if(track) track.style.transform = `translateX(-${step * 33.33}%)`;
    }, 3000);
</script>

</body>
</html>
